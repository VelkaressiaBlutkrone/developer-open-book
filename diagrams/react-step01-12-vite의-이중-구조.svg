<svg xmlns="http://www.w3.org/2000/svg" width="600" height="612" viewBox="-10 -20 360 367">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="360" height="367" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Vite의 이중 구조</text>
  <rect x="20" y="45" width="300" height="272" rx="40.8" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="170" y="93.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">1. 개발 모드 (vite / vite dev)</text>
  <text x="170" y="111.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 네이티브 ESModule을 그대로 활용</text>
  <text x="170" y="129.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 번들링 없이 개별 파일을 변환·제공</text>
  <text x="170" y="148.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· esbuild로 JSX/TS를 초고속 변환</text>
  <text x="170" y="166.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· HMR으로 변경분만 교체</text>
  <text x="170" y="184.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">2. 프로덕션 빌드 (vite build)</text>
  <text x="170" y="202.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Rollup 기반 번들링</text>
  <text x="170" y="220.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Tree Shaking (미사용 코드 제거)</text>
  <text x="170" y="239.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Code Splitting (동적 임포트 분리)</text>
  <text x="170" y="257.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· CSS 추출·압축</text>
  <text x="170" y="275.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 에셋 해시 (캐시 무효화)</text>
</svg>