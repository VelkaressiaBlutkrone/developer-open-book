<svg xmlns="http://www.w3.org/2000/svg" width="600" height="797" viewBox="-10 -15 582 773">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="582" height="773" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">의존성은 한 방향으로만 흘러야 한다</text>
  <rect x="20" y="50" width="522" height="678" rx="78.3" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">pages/                              │  ← 가장 바깥 (조합만)</text>
  <text x="40" y="109.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 여러 feature를 조합</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· feature를 import 가능</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">import</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">──────────────▼───────────────────────</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">features/                           │  ← 비즈니스 로직</text>
  <text x="40" y="239.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· shared를 import 가능</text>
  <text x="40" y="265.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 다른 feature를 직접 import ❌</text>
  <text x="40" y="291.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· pages를 import ❌</text>
  <text x="40" y="317.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">import</text>
  <text x="40" y="343.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">──────────────▼───────────────────────</text>
  <text x="40" y="369.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">shared/                             │  ← 가장 안쪽 (기반)</text>
  <text x="40" y="395.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· features를 import ❌</text>
  <text x="40" y="421.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· pages를 import ❌</text>
  <text x="40" y="447.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 자체만으로 독립적</text>
  <text x="40" y="473.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">pages → features → shared (단방향!)</text>
  <text x="40" y="499.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">shared ← features ← pages (역방향 import 금지!)</text>
  <text x="40" y="525.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">⚠️ Feature 간 의존성:</text>
  <text x="40" y="551.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">features/cart가 features/products의 ProductCard를 사용하면?</text>
  <text x="40" y="577.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ ProductCard를 shared/로 이동하거나</text>
  <text x="40" y="603.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ page에서 두 feature를 조합하거나</text>
  <text x="40" y="629.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ feature의 public API(index.js)만 사용 (내부 파일 직접 참조 금지)</text>
</svg>