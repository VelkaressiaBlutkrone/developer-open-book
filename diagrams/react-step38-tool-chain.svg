<svg xmlns="http://www.w3.org/2000/svg" width="680" height="550" viewBox="20 -10 680 550">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-10" width="680" height="550" rx="12" fill="#141414"/>
  <text x="210" y="39.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">코드 품질 도구 체인</text>
  <rect x="50" y="60" width="620" height="116" rx="17.4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="360" y="122.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">코드 작성 시 (IDE)</text>
  <text x="70" y="112.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· ESLint → 실시간 경고/에러 표시</text>
  <text x="70" y="134.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Prettier → 저장 시 자동 포매팅</text>
  <text x="70" y="156.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· TypeScript → 실시간 타입 검사</text>
  <rect x="50" y="186" width="620" height="94" rx="14.1" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
  <text x="360" y="237.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">커밋 시 (Git Hook)</text>
  <text x="70" y="238.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Husky → pre-commit 훅 실행</text>
  <text x="70" y="260.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· lint-staged → 변경 파일만 린트 + 포맷</text>
  <rect x="50" y="290" width="620" height="116" rx="17.4" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="360" y="352.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">PR/Push 시 (CI/CD)</text>
  <text x="70" y="342.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· ESLint → 전체 프로젝트 린트</text>
  <text x="70" y="364.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· TypeScript, Vitest/RTL, Playwright</text>
  <text x="70" y="386.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 모든 것이 통과해야 머지/배포 가능</text>
  <rect x="50" y="416" width="620" height="94" rx="14.1" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="360" y="467.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">코드 리뷰 시 (사람)</text>
  <text x="70" y="468.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 아키텍처, 네이밍, 복잡도, 비즈니스 로직</text>
  <text x="70" y="490.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 자동화된 것은 이미 통과 → 고수준 집중 ★</text>
</svg>