<svg xmlns="http://www.w3.org/2000/svg" width="600" height="562" viewBox="-10 -15 548 513">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="548" height="513" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">이 패턴의 구조</text>
  <rect x="20" y="50" width="488" height="418" rx="62.699999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">TodoProvider</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">── TodoContext.Provider (todos 값 제공)</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">── TodoDispatchContext.Provider (dispatch 함수 제공)</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">── children</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">── 어떤 하위 컴포넌트든:</text>
  <text x="40" y="213.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· useTodos() → todos 배열 접근</text>
  <text x="40" y="239.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· useTodoDispatch() → dispatch 함수 접근</text>
  <text x="40" y="265.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Props Drilling 없이 직접 접근!</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Custom Hook으로 캡슐화하면:</text>
  <text x="40" y="317.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Context의 존재를 컴포넌트가 몰라도 된다</text>
  <text x="40" y="343.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Provider 밖에서 사용하면 에러 메시지 표시 (개발자 경험 향상)</text>
  <text x="40" y="369.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Context 구현을 변경해도 Hook 인터페이스는 유지</text>
</svg>