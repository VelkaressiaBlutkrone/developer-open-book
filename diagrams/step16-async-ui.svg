<svg xmlns="http://www.w3.org/2000/svg" width="780" height="475" viewBox="10 -20 780 475">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="10" y="-20" width="780" height="475" rx="12" fill="#141414"/>
  <text x="240" y="35.2" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="28" opacity="1">Async UI 패턴</text>
  <rect x="310" y="70" width="180" height="55" rx="8.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="400" y="103" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22">Async UI</text>
  <defs><marker id="arrow-a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eed"/></marker></defs>
  <path d="M350,125 L230,170" fill="none" stroke="#4a9eed" stroke-width="2" opacity="1" marker-end="url(#arrow-a1)"/>
  <defs><marker id="arrow-a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eed"/></marker></defs>
  <path d="M450,125 L570,170" fill="none" stroke="#4a9eed" stroke-width="2" opacity="1" marker-end="url(#arrow-a2)"/>
  <rect x="40" y="170" width="280" height="50" rx="7.5" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="180" y="200" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20">FutureBuilder</text>
  <text x="50" y="241.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">• future: 비동기 작업</text>
  <text x="50" y="259.9" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">• builder: 상태별 UI</text>
  <text x="50" y="278.09999999999997" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">• AsyncSnapshot</text>
  <text x="50" y="296.29999999999995" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">  - connectionState</text>
  <text x="50" y="314.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">  - hasData</text>
  <text x="50" y="332.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">  - hasError</text>
  <rect x="480" y="170" width="280" height="50" rx="7.5" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="620" y="200" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20">StreamBuilder</text>
  <text x="490" y="241.7" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13" opacity="1">• stream: 데이터 스트림</text>
  <text x="490" y="259.9" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13" opacity="1">• initialData: 초기값</text>
  <text x="490" y="278.09999999999997" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13" opacity="1">• builder: 이벤트마다 재호출</text>
  <rect x="100" y="380" width="600" height="45" rx="6.75" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1" opacity="1"/>
  <text x="400" y="406" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">단순 화면→FutureBuilder  |  실시간→StreamBuilder  |  공유→Provider/Riverpod</text>
</svg>