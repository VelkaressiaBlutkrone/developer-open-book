  <text x="80" y="69.4" fill="#22c55e" font-family="Nunito, sans-serif" font-size="16" opacity="1">const Text('Flutter')</text>
  <rect x="80" y="85" width="300" height="35" rx="5.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
