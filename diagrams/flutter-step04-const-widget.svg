<svg xmlns="http://www.w3.org/2000/svg" width="710" height="225" viewBox="50 -20 710 225">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="50" y="-20" width="710" height="225" rx="12" fill="#141414"/>
