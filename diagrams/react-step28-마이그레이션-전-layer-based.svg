<svg xmlns="http://www.w3.org/2000/svg" width="600" height="745" viewBox="-10 -20 494 613">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="494" height="613" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">마이그레이션 전 (Layer-based):</text>
  <rect x="20" y="45" width="434" height="518" rx="65.1" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">마이그레이션 전 (Layer-based):</text>
  <text x="40" y="104.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">src/components/ProductCard.jsx   ← 상품 관련 코드가</text>
  <text x="40" y="130.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">src/hooks/useProducts.js         ← 4개 폴더에</text>
  <text x="40" y="156.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">src/services/productService.js   ← 흩어져 있다</text>
  <text x="40" y="182.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">src/pages/ProductsPage.jsx       ←</text>
  <text x="40" y="208.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">마이그레이션 후 (Feature-based):</text>
  <text x="40" y="234.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">src/features/products/</text>
  <text x="40" y="260.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">── components/ProductCard.jsx   ← 한 곳에</text>
  <text x="40" y="286.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">── hooks/useProducts.js         ← 모인다!</text>
  <text x="40" y="312.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">── services/productService.js   ←</text>
  <text x="40" y="338.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">── index.js                     ← Public API</text>
  <text x="40" y="364.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">마이그레이션 절차:</text>
  <text x="40" y="391.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. features/ 폴더 생성</text>
  <text x="40" y="421.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. 관련 파일을 feature별로 이동</text>
  <text x="40" y="451.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. 각 feature에 index.js(Barrel Export) 생성</text>
  <text x="40" y="481.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. import 경로 업데이트</text>
  <text x="40" y="511.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. 공통 코드를 shared/로 이동</text>
  <text x="40" y="541.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">6. 점진적으로 진행 (한 feature씩)</text>
</svg>