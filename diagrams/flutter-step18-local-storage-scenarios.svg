<svg xmlns="http://www.w3.org/2000/svg" width="760" height="366" viewBox="20 -20 760 366">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="760" height="366" rx="12" fill="#141414"/>
  <text x="50" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">로컬 저장이 필요한 시나리오</text>
  <rect x="50" y="60" width="700" height="55" rx="8.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="400" y="91.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">① 오프라인 지원  →  네트워크 없어도 최근 데이터 표시</text>
  <rect x="50" y="127" width="700" height="55" rx="8.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="400" y="158.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">② 사용자 설정 유지  →  다크모드, 언어 선택, 알림 ON/OFF</text>
  <rect x="50" y="194" width="700" height="55" rx="8.25" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
  <text x="400" y="225.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">③ 인증 토큰 저장  →  로그인 상태 유지 (Access/RefreshToken)</text>
  <rect x="50" y="261" width="700" height="55" rx="8.25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="400" y="292.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">④ 캐시로 성능 향상  →  API 응답 로컬 저장 → 빠른 초기 로딩</text>
</svg>