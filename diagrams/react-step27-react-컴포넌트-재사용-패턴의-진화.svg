<svg xmlns="http://www.w3.org/2000/svg" width="600" height="785" viewBox="-10 -15 531 695">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="531" height="695" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">React 컴포넌트 재사용 패턴의 진화</text>
  <rect x="20" y="50" width="471" height="600" rx="70.64999999999999" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">2015~2017: Mixins → HOC</text>
  <text x="40" y="109.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Mixins: class 컴포넌트에 로직 주입 (폐기됨)</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· HOC: 컴포넌트를 감싸서 기능 추가 (withRouter, connect)</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">2017~2019: HOC → Render Props</text>
  <text x="40" y="187.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Render Props: 함수를 Props로 전달하여 렌더링 위임</text>
  <text x="40" y="213.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· HOC보다 명시적이고 타입 추론이 용이</text>
  <text x="40" y="239.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">2019~현재: Render Props → Custom Hook ★</text>
  <text x="40" y="265.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Hook이 로직 재사용의 표준이 됨</text>
  <text x="40" y="291.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· HOC와 Render Props의 대부분의 사용 사례를 대체</text>
  <text x="40" y="317.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 더 간결하고, 합성이 쉽고, 테스트가 용이</text>
  <text x="40" y="343.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">병행 사용: Compound Component + Headless Component</text>
  <text x="40" y="369.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Hook과 함께 &quot;UI 구조의 유연성&quot;을 제공하는 패턴</text>
  <text x="40" y="395.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 라이브러리 설계에서 핵심적으로 사용</text>
  <text x="40" y="421.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Radix UI, Headless UI, React Aria 등</text>
  <text x="40" y="447.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">현재 권장:</text>
  <text x="40" y="473.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 로직 재사용 → Custom Hook (Step 16)</text>
  <text x="40" y="499.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· UI 구조 유연성 → Compound Component</text>
  <text x="40" y="525.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 최대 커스터마이즈 → Headless Component</text>
  <text x="40" y="551.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 레거시 유지보수 → HOC, Render Props 이해 필요</text>
</svg>