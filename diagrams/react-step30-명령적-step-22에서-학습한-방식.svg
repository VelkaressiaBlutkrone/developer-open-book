<svg xmlns="http://www.w3.org/2000/svg" width="600" height="983" viewBox="-10 -15 599 981">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="599" height="981" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">명령적 (Step 22에서 학습한 방식):</text>
  <rect x="20" y="50" width="539" height="886" rx="80.85" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">function UserProfile({ userId }) {</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">const [user, setUser] = useState(null);</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">const [isLoading, setIsLoading] = useState(true);</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">const [error, setError] = useState(null);</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">useEffect(() =&gt; { /* fetch + setState */ }, [userId]);</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">if (isLoading) return &lt;Spinner /&gt;;        ← 로딩 처리가</text>
  <text x="40" y="239.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">if (error) return &lt;ErrorMsg /&gt;;            ← 컴포넌트 안에</text>
  <text x="40" y="265.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">return &lt;Profile user={user} /&gt;;            ← 섞여 있다</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">}</text>
  <text x="40" y="317.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 컴포넌트가 &quot;데이터 패칭 + 로딩 처리 + UI 렌더링&quot; 모두 담당</text>
  <text x="40" y="343.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 3가지 관심사가 하나의 컴포넌트에 혼합</text>
  <text x="40" y="369.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 로딩 UI를 바꾸려면 컴포넌트 내부를 수정해야 함</text>
  <text x="40" y="395.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">선언적 (Suspense 방식):</text>
  <text x="40" y="421.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// 로딩은 Suspense가 처리</text>
  <text x="40" y="447.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;Spinner /&gt;}&gt;</text>
  <text x="40" y="473.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">// 에러는 ErrorBoundary가 처리</text>
  <text x="40" y="499.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;ErrorBoundary fallback={&lt;ErrorMsg /&gt;}&gt;</text>
  <text x="40" y="525.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// 컴포넌트는 데이터 사용만</text>
  <text x="40" y="551.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;UserProfile userId={userId} /&gt;</text>
  <text x="40" y="577.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/ErrorBoundary&gt;</text>
  <text x="40" y="603.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="629.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">function UserProfile({ userId }) {</text>
  <text x="40" y="655.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">const user = use(fetchUser(userId));  ← 데이터 사용만!</text>
  <text x="40" y="681.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">return &lt;Profile user={user} /&gt;;       ← UI 렌더링만!</text>
  <text x="40" y="707.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">}</text>
  <text x="40" y="733.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 로딩 → Suspense가 처리 (밖에서 선언)</text>
  <text x="40" y="759.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 에러 → ErrorBoundary가 처리 (밖에서 선언)</text>
  <text x="40" y="785.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 컴포넌트 → 데이터가 있는 상태에서 UI만 렌더링</text>
  <text x="40" y="811.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 3가지 관심사가 각각 분리됨 ★</text>
  <text x="40" y="837.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 로딩 UI를 바꾸려면 Suspense fallback만 수정</text>
</svg>