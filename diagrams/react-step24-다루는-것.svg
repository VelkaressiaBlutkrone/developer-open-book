  <text x="45" y="237.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · 인증 토큰 관리와 자동 갱신</text>
  <text x="45" y="263.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · 로딩/에러 UI의 일관된 패턴</text>
  <text x="45" y="289.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · Phase 3 전체 통합 복습</text>
  <rect x="20" y="338" width="500" height="164" rx="24.599999999999998" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
