<svg xmlns="http://www.w3.org/2000/svg" width="660" height="390" viewBox="50 -20 660 389.6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="50" y="-20" width="660" height="389.6" rx="12" fill="#141414"/>
  <text x="150" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">async/await vs compute() 비교</text>
  <text x="80" y="69.4" fill="#ef4444" font-family="Nunito, sans-serif" font-size="16" opacity="1">async/await만 사용 (UI Jank 발생)</text>
  <rect x="80" y="85" width="600" height="40" rx="6" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="380" y="108.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">메인 Isolate: [UI 렌더링] → [HTTP 대기] → [JSON 파싱 — CPU 100%] → Jank!</text>
  <text x="80" y="169.4" fill="#22c55e" font-family="Nunito, sans-serif" font-size="16" opacity="1">compute() 사용 (UI 60fps 유지)</text>
  <rect x="80" y="185" width="600" height="40" rx="6" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="380" y="208" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12">메인 Isolate: [UI 렌더링] → [HTTP 대기] → [compute 호출] → [결과 수신 → UI 업데이트]</text>
  <text x="460" y="239.9" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="11" opacity="0.6">메시지 전달</text>
  <rect x="80" y="260" width="600" height="40" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="380" y="283.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">백그라운드 Isolate: [JSON 파싱 CPU 점유] → [결과 반환]</text>
  <text x="120" y="332.6" fill="#22c55e" font-family="Nunito, sans-serif" font-size="14" opacity="0.8">UI는 파싱 중에도 60fps를 유지한다</text>
</svg>