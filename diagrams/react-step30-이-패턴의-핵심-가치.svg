<svg xmlns="http://www.w3.org/2000/svg" width="600" height="698" viewBox="-10 -20 460 535">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="460" height="535" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">이 패턴의 핵심 가치</text>
  <rect x="20" y="45" width="400" height="440" rx="60" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">이 패턴의 핵심 가치</text>
  <text x="40" y="105.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. 컴포넌트는 &quot;데이터가 있다&quot;고 가정하고 작성한다</text>
  <text x="40" y="133.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· if (isLoading) return ... → 필요 없음!</text>
  <text x="40" y="159.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· if (error) return ... → 필요 없음!</text>
  <text x="40" y="185.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· &quot;Happy Path&quot;만 작성</text>
  <text x="40" y="213.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. 로딩 처리는 Suspense가 선언적으로 담당한다</text>
  <text x="40" y="241.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· &lt;Suspense fallback={&lt;Skeleton /&gt;}&gt;</text>
  <text x="40" y="267.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· &quot;이 영역이 로딩 중이면 Skeleton을 보여줘&quot;</text>
  <text x="40" y="295.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. 에러 처리는 ErrorBoundary가 선언적으로 담당한다</text>
  <text x="40" y="323.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· &lt;ErrorBoundary fallback={&lt;Error /&gt;}&gt;</text>
  <text x="40" y="349.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· &quot;이 영역에서 에러가 나면 Error를 보여줘&quot;</text>
  <text x="40" y="377.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. 세 가지 관심사가 완전히 분리된다</text>
  <text x="40" y="405.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 데이터 사용 → 컴포넌트</text>
  <text x="40" y="431.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 로딩 처리 → Suspense</text>
  <text x="40" y="457.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 에러 처리 → ErrorBoundary</text>
</svg>