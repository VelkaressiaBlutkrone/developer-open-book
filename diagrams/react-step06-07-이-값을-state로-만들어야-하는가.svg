<svg xmlns="http://www.w3.org/2000/svg" width="600" height="403" viewBox="-10 -20 448.5 301">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="448.5" height="301" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">&quot;이 값을 State로 만들어야 하는가?&quot;</text>
  <rect x="20" y="45" width="388.5" height="206" rx="30.9" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="214.25" y="87.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">시간이 지나도 변하지 않는가?</text>
  <text x="214.25" y="106" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">YES → State 아님 (상수로 선언)</text>
  <text x="214.25" y="124.19999999999999" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Props로 전달받는가?</text>
  <text x="214.25" y="142.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">YES → State 아님 (Props 그대로 사용)</text>
  <text x="214.25" y="160.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">기존 State/Props로 계산 가능한가?</text>
  <text x="214.25" y="178.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">YES → State 아님 (렌더링 중 계산 = Derived State)</text>
  <text x="214.25" y="197" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">위 모두 아닌가?</text>
  <text x="214.25" y="215.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">YES → State로 만든다 ✅</text>
</svg>