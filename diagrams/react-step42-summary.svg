<svg xmlns="http://www.w3.org/2000/svg" width="710" height="364" viewBox="20 -20 710 364">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="710" height="364" rx="12" fill="#141414"/>
  <rect x="50" y="10" width="650" height="304" rx="45.6" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="375" y="167.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22">Step 42 핵심 요약</text>
  <text x="70" y="84.3" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="17" opacity="1">Phase 0~7 학습 흐름</text>
  <text x="80" y="103.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">기반 → 핵심 → Hook → 데이터 → 상태·설계 → 타입·폼·스타일 → 테스트·품질 → 빌드·배포·모니터링</text>
  <text x="80" y="125.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1"></text>
  <text x="70" y="150.3" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="17" opacity="1">10가지 원칙</text>
  <text x="80" y="169.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">선언적 → 합성 → 관심사 분리 → 단방향 → 측정 → 사용자 관점 테스트 → 자동화 → 타입 → 접근성 → 프로덕션</text>
  <text x="80" y="191.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1"></text>
  <text x="70" y="216.3" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="17" opacity="1">핵심 메시지</text>
  <text x="80" y="235.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">기술 선택은 &quot;트레이드오프 이해&quot;에서 나온다</text>
  <text x="80" y="257.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">종합 프로젝트가 학습을 완성한다</text>
  <text x="80" y="279.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">배포는 끝이 아니라 시작이다</text>
</svg>