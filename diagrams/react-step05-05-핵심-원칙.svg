<svg xmlns="http://www.w3.org/2000/svg" width="600" height="392" viewBox="-10 -20 360 235">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="360" height="235" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">핵심 원칙</text>
  <rect x="20" y="45" width="300" height="140" rx="21" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="170" y="82.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 자식은 부모의 State를 직접 수정하지 않는다</text>
  <text x="170" y="100.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 자식은 &quot;이런 일이 일어났다&quot;고 알릴 뿐이다</text>
  <text x="170" y="118.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 부모가 그 알림을 받아 스스로 State를 변경한다</text>
  <text x="170" y="136.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">데이터:  부모  Props  → 자식</text>
  <text x="170" y="154.89999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">이벤트:  부모 ← Callback  자식</text>
</svg>