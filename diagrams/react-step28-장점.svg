<svg xmlns="http://www.w3.org/2000/svg" width="709.5" height="513" viewBox="-10 -15 709.5 513">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="709.5" height="513" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">장점:</text>
  <rect x="20" y="50" width="649.5" height="418" rx="62.699999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 직관적이고 이해하기 쉽다 (초보자 친화적)</text>
  <text x="40" y="109.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· React 튜토리얼과 보일러플레이트에서 흔히 사용</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 기술적 관점에서 파일을 빠르게 찾을 수 있다</text>
  <text x="40" y="161.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 소규모 프로젝트에 적합</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">단점:</text>
  <text x="40" y="213.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· &quot;상품&quot; 관련 코드가 4~5개 폴더에 흩어진다</text>
  <text x="40" y="239.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">components/ProductCard, hooks/useProducts, services/productService,</text>
  <text x="40" y="265.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">stores/productStore, pages/ProductsPage</text>
  <text x="40" y="291.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 하나의 기능을 수정하려면 여러 폴더를 오가야 한다</text>
  <text x="40" y="317.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 프로젝트가 커지면 각 폴더 안의 파일이 수십 개가 됨</text>
  <text x="40" y="343.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 기능 간 경계가 불분명 → 의존성 관리 어려움</text>
  <text x="40" y="369.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">적합한 규모: 소규모 (파일 30개 이하)</text>
</svg>