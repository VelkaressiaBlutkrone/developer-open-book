<svg xmlns="http://www.w3.org/2000/svg" width="600" height="640" viewBox="-10 -15 505.5 539">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="505.5" height="539" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">useSuspenseQuery vs useQuery</text>
  <rect x="20" y="50" width="445.5" height="444" rx="66.6" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">useQuery:</text>
  <text x="40" y="109.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· isLoading, isError, data를 컴포넌트에서 직접 처리</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· data가 undefined일 수 있음 → 조건부 렌더링 필요</text>
  <text x="40" y="161.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 명령적 패턴</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">useSuspenseQuery:</text>
  <text x="40" y="213.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 로딩 → Suspense가 처리, 에러 → ErrorBoundary가 처리</text>
  <text x="40" y="239.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· data가 항상 정의됨 → 조건부 렌더링 불필요</text>
  <text x="40" y="265.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 선언적 패턴</text>
  <text x="40" y="291.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· TanStack Query의 캐싱 + Suspense의 선언적 UX 결합</text>
  <text x="40" y="317.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">선택 기준:</text>
  <text x="40" y="343.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Suspense 경계를 이미 설계한 앱 → useSuspenseQuery</text>
  <text x="40" y="369.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 기존 앱에 점진적 적용 → useQuery (호환성)</text>
  <text x="40" y="395.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 세밀한 로딩 제어 필요 → useQuery</text>
</svg>