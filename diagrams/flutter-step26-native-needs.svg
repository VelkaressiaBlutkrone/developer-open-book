<svg xmlns="http://www.w3.org/2000/svg" width="760" height="433" viewBox="20 -20 760 433">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="760" height="433" rx="12" fill="#141414"/>
  <text x="50" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">Flutter만으로 불가능한 것들 → Native 연동 필요</text>
  <rect x="50" y="60" width="700" height="55" rx="8.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
