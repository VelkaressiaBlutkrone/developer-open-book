  <rect x="50" y="328" width="700" height="55" rx="8.25" fill="#1a4d4d" stroke="#06b6d4" stroke-width="2" opacity="1"/>
  <text x="400" y="359.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">기존 네이티브 코드 재사용  →  C/C++ 라이브러리, 레거시 코드</text>
