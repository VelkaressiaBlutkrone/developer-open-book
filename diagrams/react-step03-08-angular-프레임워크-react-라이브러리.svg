<svg xmlns="http://www.w3.org/2000/svg" width="600" height="377" viewBox="-10 -20 584.5 367">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="584.5" height="367" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Angular (프레임워크)  React (라이브러리)</text>
  <rect x="20" y="45" width="524.5" height="272" rx="40.8" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="282.25" y="93.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  <text x="282.25" y="111.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">라우팅  → 내장 (@angular/router)  → 별도 설치 (react-router)</text>
  <text x="282.25" y="129.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">HTTP 통신  → 내장 (HttpClient)  → 별도 설치 (axios, fetch 사용)</text>
  <text x="282.25" y="148.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">상태 관리  → 내장 (Signals, RxJS)  → 별도 선택 (zustand, redux 등)</text>
  <text x="282.25" y="166.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">폼 관리  → 내장 (ReactiveForms)  → 별도 설치 (react-hook-form)</text>
  <text x="282.25" y="184.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">DI  → 내장 (Dependency Injection)→ 해당 없음</text>
  <text x="282.25" y="202.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">CLI  → 내장 (Angular CLI)  → 별도 도구 (Vite, CRA 등)</text>
  <text x="282.25" y="220.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">테스트  → 내장 설정 (Karma/Jasmine)  → 별도 설정 (Vitest, Jest 등)</text>
  <text x="282.25" y="239.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">언어  → TypeScript 필수  → TypeScript 선택</text>
  <text x="282.25" y="257.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Angular: &quot;필요한 모든 것이 하나의 패키지에 들어있다&quot; (Batteries Included)</text>
  <text x="282.25" y="275.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ React: &quot;UI 렌더링만 제공하고, 나머지는 개발자가 선택한다&quot; (Bring Your Own)</text>
</svg>