<svg xmlns="http://www.w3.org/2000/svg" width="600" height="269" viewBox="10 -20 580 260">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="10" y="-20" width="580" height="260" rx="12" fill="#141414"/>
  <text x="40" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">React Router vs Next.js App Router</text>
  <rect x="50" y="50" width="240" height="160" rx="24" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="1"/>
  <text x="60" y="67.6" fill="#06b6d4" font-family="Nunito, sans-serif" font-size="14" opacity="1">React Router (코드 기반)</text>
  <text x="65" y="89.9" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11" opacity="1">createBrowserRouter([</text>
  <text x="75" y="106.9" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11" opacity="1">{ path: '/', element: &lt;Root&gt; }</text>
  <text x="75" y="123.9" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11" opacity="1">{ path: 'products' }</text>
  <text x="85" y="140.9" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11" opacity="1">{ path: ':id', element: &lt;Detail&gt; }</text>
  <text x="65" y="164.9" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="11" opacity="1">· 유연하지만 명시적 설정 필요</text>
  <text x="65" y="181.9" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="11" opacity="1">· loader/action을 라우트에 연결</text>
  <rect x="320" y="50" width="240" height="160" rx="24" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="330" y="67.6" fill="#22c55e" font-family="Nunito, sans-serif" font-size="14" opacity="1">App Router (파일 기반)</text>
  <text x="335" y="89.9" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11" opacity="1">app/</text>
  <text x="345" y="106.9" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11" opacity="1">├── layout.js  (RootLayout)</text>
  <text x="345" y="123.9" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11" opacity="1">├── page.js    (HomePage)</text>
  <text x="345" y="140.9" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11" opacity="1">├── products/[id]/page.js</text>
  <text x="335" y="164.9" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="11" opacity="1">· 폴더 구조가 곧 라우트 구조</text>
  <text x="335" y="181.9" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="11" opacity="1">· SC + Server Action</text>
</svg>