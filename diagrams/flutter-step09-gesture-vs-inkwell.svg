<svg xmlns="http://www.w3.org/2000/svg" width="700" height="286" viewBox="0 -20 700 285.6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="0" y="-20" width="700" height="285.6" rx="12" fill="#141414"/>
  <text x="130" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">GestureDetector vs InkWell</text>
  <rect x="30" y="55" width="300" height="180" rx="27" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="110" y="74.4" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="16" opacity="1">GestureDetector</text>
  <text x="50" y="101.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">• 시각적 피드백 없음</text>
  <text x="50" y="119.9" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">• 모든 제스처 이벤트 처리 가능</text>
  <text x="50" y="138.1" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">  (pan·scale·drag 등)</text>
  <text x="50" y="156.3" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">• 어떤 위젯에도 적용 가능</text>
  <text x="50" y="174.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">  (Material 위젯 아니어도 됨)</text>
  <text x="50" y="192.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">• 커스텀 게임, 그래픽,</text>
  <text x="50" y="210.89999999999998" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">  지도 등에 적합</text>
  <rect x="370" y="55" width="300" height="180" rx="27" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="470" y="74.4" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="16" opacity="1">InkWell</text>
  <text x="390" y="101.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">• Material Ripple(물결)</text>
  <text x="390" y="119.9" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">  시각 효과 제공</text>
  <text x="390" y="138.1" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">• 탭·롱프레스 등</text>
  <text x="390" y="156.3" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">  기본 제스처만 처리</text>
  <text x="390" y="174.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">• 반드시 Material 위젯 아래</text>
  <text x="390" y="192.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">  있어야 Ripple 동작</text>
  <text x="390" y="210.89999999999998" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">• 버튼·리스트 항목 등</text>
  <text x="390" y="229.1" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="1">  표준 UI에 적합</text>
</svg>