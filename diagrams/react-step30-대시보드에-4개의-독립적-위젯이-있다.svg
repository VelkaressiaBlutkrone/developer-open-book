<svg xmlns="http://www.w3.org/2000/svg" width="616" height="981" viewBox="-10 -15 616 981">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="616" height="981" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">대시보드에 4개의 독립적 위젯이 있다</text>
  <rect x="20" y="50" width="556" height="886" rx="83.39999999999999" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">매출 차트: API A (200ms)</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">방문자 통계: API B (100ms)</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">최근 주문: API C (300ms)</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">알림 목록: API D (150ms)</text>
  <text x="40" y="187.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">❌ 설계 A: 하나의 Suspense로 전체 감싸기</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;DashboardSkeleton /&gt;}&gt;</text>
  <text x="40" y="239.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;RevenueChart /&gt;</text>
  <text x="40" y="265.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;VisitorStats /&gt;</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;RecentOrders /&gt;</text>
  <text x="40" y="317.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Notifications /&gt;</text>
  <text x="40" y="343.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="369.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 300ms(가장 느린 C)까지 전체 스켈레톤 표시</text>
  <text x="40" y="395.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 사용자 체감: 느림</text>
  <text x="40" y="421.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">✅ 설계 B: 위젯별 독립 Suspense</text>
  <text x="40" y="447.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;AsyncBoundary pendingFallback={&lt;ChartSkeleton /&gt;} ...&gt;</text>
  <text x="40" y="473.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;RevenueChart /&gt;          → 200ms 후 표시</text>
  <text x="40" y="499.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/AsyncBoundary&gt;</text>
  <text x="40" y="525.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;AsyncBoundary pendingFallback={&lt;StatsSkeleton /&gt;} ...&gt;</text>
  <text x="40" y="551.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;VisitorStats /&gt;          → 100ms 후 표시 (가장 먼저!)</text>
  <text x="40" y="577.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/AsyncBoundary&gt;</text>
  <text x="40" y="603.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;AsyncBoundary pendingFallback={&lt;OrdersSkeleton /&gt;} ...&gt;</text>
  <text x="40" y="629.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;RecentOrders /&gt;          → 300ms 후 표시 (가장 나중)</text>
  <text x="40" y="655.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/AsyncBoundary&gt;</text>
  <text x="40" y="681.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;AsyncBoundary pendingFallback={&lt;NotiSkeleton /&gt;} ...&gt;</text>
  <text x="40" y="707.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Notifications /&gt;         → 150ms 후 표시</text>
  <text x="40" y="733.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/AsyncBoundary&gt;</text>
  <text x="40" y="759.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 각 위젯이 준비되는 대로 독립적으로 표시</text>
  <text x="40" y="785.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 100ms에 방문자 통계, 150ms에 알림, 200ms에 차트, 300ms에 주문</text>
  <text x="40" y="811.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 사용자 체감: &quot;빠르게 채워지고 있다!&quot;</text>
  <text x="40" y="837.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 한 위젯 에러 → 나머지 위젯 정상 동작 (Graceful Degradation)</text>
</svg>