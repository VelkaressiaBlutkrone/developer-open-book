<svg xmlns="http://www.w3.org/2000/svg" width="641.5" height="1267" viewBox="-10 -15 641.5 1267">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="641.5" height="1267" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">같은 페이지, 다른 Suspense 경계 → 완전히 다른 사용자 경험</text>
  <rect x="20" y="50" width="581.5" height="1172" rx="87.225" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">전략 A: 페이지 전체를 하나의 Suspense로</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;FullPageSkeleton /&gt;}&gt;</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Header /&gt;          ← 모든 것이 하나의 로딩에 묶임</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;UserInfo /&gt;        ← 하나라도 로딩 중이면</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;PostList /&gt;        ← 전체가 스켈레톤</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Sidebar /&gt;</text>
  <text x="40" y="239.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="265.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· UserInfo가 50ms, PostList가 500ms면?</text>
  <text x="40" y="291.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· UserInfo가 빨리 준비되어도 PostList를 기다려야 함</text>
  <text x="40" y="317.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 500ms 동안 전체 페이지가 스켈레톤</text>
  <text x="40" y="343.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 사용자: &quot;너무 느리다&quot;</text>
  <text x="40" y="369.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">전략 B: 각 섹션을 독립 Suspense로</text>
  <text x="40" y="395.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Header /&gt;</text>
  <text x="40" y="421.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;UserInfoSkeleton /&gt;}&gt;</text>
  <text x="40" y="447.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;UserInfo /&gt;                               ← 50ms 후 표시</text>
  <text x="40" y="473.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="499.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;PostListSkeleton /&gt;}&gt;</text>
  <text x="40" y="525.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;PostList /&gt;                               ← 500ms 후 표시</text>
  <text x="40" y="551.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="577.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Sidebar /&gt;</text>
  <text x="40" y="603.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Header와 Sidebar는 즉시 표시 (Suspense 밖)</text>
  <text x="40" y="629.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· UserInfo: 50ms 후 스켈레톤 → 실제 UI</text>
  <text x="40" y="655.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· PostList: 500ms 후 스켈레톤 → 실제 UI</text>
  <text x="40" y="681.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 각 섹션이 독립적으로 로딩 → 더 빠른 체감 속도!</text>
  <text x="40" y="707.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 사용자: &quot;빠르게 채워지고 있다&quot;</text>
  <text x="40" y="733.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">전략 C: 중요도에 따른 계층적 Suspense</text>
  <text x="40" y="759.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;PageShell /&gt;}&gt;         ← 가장 바깥: 페이지 전체</text>
  <text x="40" y="785.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Header /&gt;</text>
  <text x="40" y="811.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;UserInfoSkeleton /&gt;}&gt; ← 핵심 콘텐츠</text>
  <text x="40" y="837.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;UserInfo /&gt;</text>
  <text x="40" y="863.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="889.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;PostListSkeleton /&gt;}&gt; ← 부가 콘텐츠</text>
  <text x="40" y="915.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;PostList /&gt;</text>
  <text x="40" y="941.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="967.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;SidebarSkeleton /&gt;}&gt;  ← 부가 콘텐츠</text>
  <text x="40" y="993.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Sidebar /&gt;</text>
  <text x="40" y="1019.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="1045.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="1071.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 가장 바깥 Suspense: 전체 데이터가 없을 때 기본 셸</text>
  <text x="40" y="1097.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 안쪽 Suspense들: 각 섹션 독립 로딩</text>
  <text x="40" y="1123.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 네트워크가 느려도 셸은 즉시 표시</text>
</svg>