<svg xmlns="http://www.w3.org/2000/svg" width="600" height="1082" viewBox="-10 -20 570.5 1029">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="570.5" height="1029" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Compound Component의 특징</text>
  <rect x="20" y="45" width="510.5" height="934" rx="76.575" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Compound Component의 특징</text>
  <text x="40" y="105.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. 내부 상태(openId)가 Context로 자식에게 암묵적으로 공유된다</text>
  <text x="40" y="133.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 사용자가 openId를 직접 관리하지 않아도 됨</text>
  <text x="40" y="159.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· toggle 로직이 캡슐화됨</text>
  <text x="40" y="187.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. 자식의 순서와 구성을 사용자가 자유롭게 제어한다</text>
  <text x="40" y="215.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Item의 순서를 바꿀 수 있다</text>
  <text x="40" y="241.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Header에 아이콘을 추가할 수 있다</text>
  <text x="40" y="267.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Panel에 어떤 콘텐츠든 넣을 수 있다</text>
  <text x="40" y="293.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 특정 Item만 비활성화할 수 있다</text>
  <text x="40" y="321.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. &quot;닷 표기법&quot;(Accordion.Item)으로 관련 컴포넌트를 묶는다</text>
  <text x="40" y="349.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· import { Accordion } from '...' 하나로 모든 하위 컴포넌트 접근</text>
  <text x="40" y="375.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· IDE 자동완성: Accordion. 입력하면 Item, Header, Panel 제안</text>
  <text x="40" y="403.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. 비교: Props 기반 vs Compound 기반</text>
  <text x="40" y="432.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// Props 기반 — 유연성 제한</text>
  <text x="40" y="458.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Accordion</text>
  <text x="40" y="484.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">items={[</text>
  <text x="40" y="510.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">{ id: 'q1', title: 'React란?', content: '라이브러리입니다.' },</text>
  <text x="40" y="536.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">{ id: 'q2', title: 'Hooks란?', content: 'API입니다.' },</text>
  <text x="40" y="562.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">]}</text>
  <text x="40" y="588.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">/&gt;</text>
  <text x="40" y="614.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// → title에 아이콘을 넣고 싶다면? Props 인터페이스 수정 필요!</text>
  <text x="40" y="640.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// → content에 이미지를 넣고 싶다면? 더 복잡해짐!</text>
  <text x="40" y="666.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// Compound 기반 — 완전한 유연성</text>
  <text x="40" y="692.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Accordion&gt;</text>
  <text x="40" y="718.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Accordion.Item id=&quot;q1&quot;&gt;</text>
  <text x="40" y="744.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Accordion.Header id=&quot;q1&quot;&gt;</text>
  <text x="40" y="770.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Icon name=&quot;react&quot; /&gt; React란?    ← 아이콘 자유롭게 추가</text>
  <text x="40" y="796.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Accordion.Header&gt;</text>
  <text x="40" y="822.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Accordion.Panel id=&quot;q1&quot;&gt;</text>
  <text x="40" y="848.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;p&gt;라이브러리입니다.&lt;/p&gt;</text>
  <text x="40" y="874.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;img src=&quot;react.png&quot; /&gt;           ← 이미지도 자유롭게</text>
  <text x="40" y="900.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Accordion.Panel&gt;</text>
  <text x="40" y="926.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Accordion.Item&gt;</text>
  <text x="40" y="952.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Accordion&gt;</text>
</svg>