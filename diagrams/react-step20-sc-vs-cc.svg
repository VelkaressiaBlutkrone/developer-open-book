<svg xmlns="http://www.w3.org/2000/svg" width="610" height="350" viewBox="20 -20 610 350">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="610" height="350" rx="12" fill="#141414"/>
  <text x="50" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Server Component vs Client Component</text>
  <rect x="50" y="50" width="260" height="250" rx="37.5" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="60" y="68.5" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="15" opacity="1">Server Component (기본값)</text>
  <text x="65" y="90.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">실행: 서버 / 번들: 미포함 ★</text>
  <text x="65" y="115.8" fill="#22c55e" font-family="Nunito, sans-serif" font-size="12" opacity="1">✅ async/await</text>
  <text x="65" y="133.8" fill="#22c55e" font-family="Nunito, sans-serif" font-size="12" opacity="1">✅ DB 직접 조회</text>
  <text x="65" y="151.8" fill="#22c55e" font-family="Nunito, sans-serif" font-size="12" opacity="1">✅ 파일 시스템 접근</text>
  <text x="65" y="169.8" fill="#22c55e" font-family="Nunito, sans-serif" font-size="12" opacity="1">✅ 서버 전용 비밀키</text>
  <text x="65" y="187.8" fill="#22c55e" font-family="Nunito, sans-serif" font-size="12" opacity="1">✅ 무거운 라이브러리</text>
  <text x="65" y="215.8" fill="#ef4444" font-family="Nunito, sans-serif" font-size="12" opacity="1">❌ useState, useEffect</text>
  <text x="65" y="233.8" fill="#ef4444" font-family="Nunito, sans-serif" font-size="12" opacity="1">❌ 브라우저 API</text>
  <text x="65" y="251.8" fill="#ef4444" font-family="Nunito, sans-serif" font-size="12" opacity="1">❌ 이벤트 핸들러</text>
  <text x="65" y="269.8" fill="#ef4444" font-family="Nunito, sans-serif" font-size="12" opacity="1">❌ 브라우저 전용 라이브러리</text>
  <rect x="340" y="50" width="260" height="250" rx="37.5" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="350" y="67.6" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="14" opacity="1">Client Component (&quot;use client&quot;)</text>
  <text x="355" y="90.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">실행: 브라우저 / 번들: 포함</text>
  <text x="355" y="115.8" fill="#22c55e" font-family="Nunito, sans-serif" font-size="12" opacity="1">✅ 모든 Hook</text>
  <text x="355" y="133.8" fill="#22c55e" font-family="Nunito, sans-serif" font-size="12" opacity="1">✅ 이벤트 핸들러</text>
  <text x="355" y="151.8" fill="#22c55e" font-family="Nunito, sans-serif" font-size="12" opacity="1">✅ 브라우저 API</text>
  <text x="355" y="169.8" fill="#22c55e" font-family="Nunito, sans-serif" font-size="12" opacity="1">✅ 상호작용 UI</text>
  <text x="355" y="215.8" fill="#ef4444" font-family="Nunito, sans-serif" font-size="12" opacity="1">❌ async 컴포넌트</text>
  <text x="355" y="233.8" fill="#ef4444" font-family="Nunito, sans-serif" font-size="12" opacity="1">❌ 서버 전용 자원</text>
  <text x="355" y="251.8" fill="#ef4444" font-family="Nunito, sans-serif" font-size="12" opacity="1">❌ SC를 import (역방향 불가)</text>
</svg>