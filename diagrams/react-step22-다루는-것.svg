<svg xmlns="http://www.w3.org/2000/svg" width="600" height="614" viewBox="-10 -15 560 573">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="560" height="573" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">다루는 것</text>
  <rect x="20" y="55" width="500" height="268" rx="40.199999999999996" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
  <text x="35" y="81.2" fill="#22c55e" font-family="Nunito, sans-serif" font-size="18" opacity="1">다루는 것</text>
  <text x="45" y="107.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · REST API 기초 (리소스, HTTP 메서드, 상태 코드)</text>
  <text x="45" y="133.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · fetch API 상세 사용법</text>
  <text x="45" y="159.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · Axios의 특징과 fetch와의 비교</text>
  <text x="45" y="185.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · React에서의 데이터 패칭 상태 관리 패턴</text>
  <text x="45" y="211.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · CRUD 구현 (GET/POST/PUT/DELETE)</text>
  <text x="45" y="237.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · Race Condition, Waterfall 등 수동 패칭의 문제점</text>
  <text x="45" y="263.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · 캐싱 부재, 중복 요청, 에러 재시도 문제</text>
  <text x="45" y="289.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · useFetch Custom Hook의 한계 분석</text>
  <rect x="20" y="338" width="500" height="190" rx="28.5" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
  <text x="35" y="364.2" fill="#ef4444" font-family="Nunito, sans-serif" font-size="18" opacity="1">다루지 않는 것</text>
  <text x="45" y="390.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · TanStack Query (Step 23)</text>
  <text x="45" y="416.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · SWR</text>
  <text x="45" y="442.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · GraphQL</text>
  <text x="45" y="468.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · WebSocket / Server-Sent Events</text>
  <text x="45" y="494.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">  · RSC에서의 패칭 (Step 20~21에서 이미 학습)</text>
</svg>