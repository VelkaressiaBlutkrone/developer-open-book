<svg xmlns="http://www.w3.org/2000/svg" width="660" height="280" viewBox="50 -20 660 280">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="50" y="-20" width="660" height="280" rx="12" fill="#141414"/>
  <text x="120" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">Flutter의 두 가지 Widget</text>
  <rect x="80" y="60" width="280" height="170" rx="25.5" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="220" y="93.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">StatelessWidget</text>
  <text x="220" y="112.10000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">─────────────────</text>
  <text x="220" y="130.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">상태 없음</text>
  <text x="220" y="148.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">한 번 그리면 끝</text>
  <text x="220" y="166.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">단순·경량</text>
  <text x="220" y="184.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">부모에게서 받은</text>
  <text x="220" y="203.10000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">데이터만 표시</text>
  <rect x="400" y="60" width="280" height="170" rx="25.5" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="540" y="93.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">StatefulWidget</text>
  <text x="540" y="112.10000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">──────────────────────</text>
  <text x="540" y="130.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">상태 있음 (State 객체 분리)</text>
  <text x="540" y="148.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setState() 호출 시 rebuild</text>
  <text x="540" y="166.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">생명주기 관리 필요</text>
  <text x="540" y="184.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">자체적으로 변하는 데이터</text>
  <text x="540" y="203.10000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">를 가질 수 있음</text>
</svg>