<svg xmlns="http://www.w3.org/2000/svg" width="600" height="872" viewBox="-10 -20 525 763">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="525" height="763" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Step 2 핵심 요약</text>
  <rect x="20" y="45" width="465" height="668" rx="69.75" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="252.5" y="127.70000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">1. const를 기본으로, 재할당 시 let을, var는 사용하지 않는다</text>
  <text x="252.5" y="145.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ const의 불변은 바인딩 불변이지 값 불변이 아니다</text>
  <text x="252.5" y="164.10000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">2. 화살표 함수는 Lexical this를 가진다</text>
  <text x="252.5" y="182.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 이벤트 핸들러, 콜백에서 안전하게 사용 가능</text>
  <text x="252.5" y="200.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ React 함수 컴포넌트에서 this는 거의 사용하지 않음</text>
  <text x="252.5" y="218.70000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">3. Destructuring은 React의 일상 문법이다</text>
  <text x="252.5" y="236.90000000000003" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Props 수신 (객체), useState (배열)</text>
  <text x="252.5" y="255.10000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 기본값, Rest 패턴과 결합하여 유연한 컴포넌트 설계</text>
  <text x="252.5" y="273.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">4. Spread는 Immutable 업데이트의 핵심 도구이다</text>
  <text x="252.5" y="291.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ State 업데이트: { ...prev, changed: value }</text>
  <text x="252.5" y="309.70000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 배열 추가: [...prev, newItem]</text>
  <text x="252.5" y="327.90000000000003" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Props 전달: &lt;Button {...props} /&gt;</text>
  <text x="252.5" y="346.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">5. 배열 고차 함수가 리스트 렌더링과 State 업데이트를 담당한다</text>
  <text x="252.5" y="364.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ map: 리스트 렌더링, 항목 수정</text>
  <text x="252.5" y="382.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ filter: 항목 삭제, 조건부 표시</text>
  <text x="252.5" y="400.70000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ reduce: 집계, 그룹화</text>
  <text x="252.5" y="418.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 원본을 변경하는 메서드(push, sort 등)는 주의</text>
  <text x="252.5" y="437.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">6. Optional Chaining(?.)과 Nullish Coalescing(??)으로</text>
  <text x="252.5" y="455.30000000000007" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">API 데이터를 안전하게 처리한다</text>
  <text x="252.5" y="473.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ ?? 는 null/undefined만, || 는 모든 falsy를 대체</text>
  <text x="252.5" y="491.70000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">7. async/await로 비동기 코드를 작성하되,</text>
  <text x="252.5" y="509.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">useEffect에서의 사용 패턴을 기억한다</text>
  <text x="252.5" y="528.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ useEffect 콜백 자체는 async가 될 수 없다</text>
  <text x="252.5" y="546.3000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">8. 클로저는 Hook의 동작 원리이다</text>
  <text x="252.5" y="564.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 각 렌더링의 값을 기억하는 메커니즘</text>
  <text x="252.5" y="582.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Stale Closure 문제의 근원 (Step 6에서 학습)</text>
  <text x="252.5" y="600.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">9. &amp;&amp; 조건부 렌더링에서 0과 빈 문자열에 주의한다</text>
  <text x="252.5" y="619.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 0은 React가 화면에 출력한다</text>
  <text x="252.5" y="637.3000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ count &gt; 0 &amp;&amp; ... 또는 !!count &amp;&amp; ... 사용</text>
</svg>