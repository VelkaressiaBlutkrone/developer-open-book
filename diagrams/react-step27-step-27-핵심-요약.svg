<svg xmlns="http://www.w3.org/2000/svg" width="600" height="1008" viewBox="-10 -20 519.5 873">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="519.5" height="873" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Step 27 핵심 요약</text>
  <rect x="20" y="45" width="459.5" height="778" rx="68.925" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">Step 27 핵심 요약</text>
  <text x="40" y="105.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. 패턴의 진화: HOC → Render Props → Hook → Compound</text>
  <text x="40" y="133.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 로직 재사용: Custom Hook이 현재 표준 (Step 16)</text>
  <text x="40" y="159.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ UI 구조 유연성: Compound Component가 핵심 패턴</text>
  <text x="40" y="185.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ HOC/Render Props: 레거시 이해용 + 특수 사례에서만 사용</text>
  <text x="40" y="213.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. Compound Component = 여러 컴포넌트가 상태를 공유하며 동작</text>
  <text x="40" y="241.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Context로 내부 상태 암묵적 공유</text>
  <text x="40" y="267.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 닷 표기법(Parent.Child)으로 네임스페이스 구성</text>
  <text x="40" y="293.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 사용자가 구조와 내용을 완전히 제어</text>
  <text x="40" y="319.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Accordion, Tabs, Dropdown, Modal 등에 적합</text>
  <text x="40" y="347.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. Headless Component = UI 없이 로직만 제공</text>
  <text x="40" y="375.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Custom Hook으로 구현</text>
  <text x="40" y="401.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Props Getter 패턴: 접근성 + 로직을 요소에 적용</text>
  <text x="40" y="427.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 어떤 디자인 시스템에도 적용 가능</text>
  <text x="40" y="453.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 라이브러리 설계의 핵심 패턴</text>
  <text x="40" y="481.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. 유연성의 단계 (Flexibility Ladder)</text>
  <text x="40" y="509.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Props 기반 &lt; Slot &lt; Compound &lt; Headless</text>
  <text x="40" y="535.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 단순한 컴포넌트 → Props 기반</text>
  <text x="40" y="561.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 복합 UI → Compound</text>
  <text x="40" y="587.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 라이브러리 수준 → Headless</text>
  <text x="40" y="615.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. 컴포넌트 API 설계 원칙</text>
  <text x="40" y="643.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 합리적 기본값 + 탈출구 (80/20 원칙)</text>
  <text x="40" y="669.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 일관된 Props 네이밍 (is-, on-, variant 등)</text>
  <text x="40" y="695.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ &quot;Pit of Success&quot;: 쉬운 방법 = 올바른 방법</text>
  <text x="40" y="723.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">6. Presentational/Container는 현대에서 Hook으로 대체</text>
  <text x="40" y="751.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Custom Hook = Container 역할 (로직)</text>
  <text x="40" y="777.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 컴포넌트 = Presentational 역할 (UI)</text>
  <text x="40" y="803.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 폴더 분리보다 &quot;관심사 분리 원칙&quot;을 유지하는 것이 중요</text>
</svg>