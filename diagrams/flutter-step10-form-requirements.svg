<svg xmlns="http://www.w3.org/2000/svg" width="680" height="355" viewBox="10 -20 680 354.6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="10" y="-20" width="680" height="354.6" rx="12" fill="#141414"/>
  <text x="120" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">로그인 폼 하나에 필요한 것들</text>
  <rect x="40" y="55" width="280" height="35" rx="5.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="180" y="75.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">① 텍스트 입력 받기 — TextField</text>
  <rect x="340" y="55" width="320" height="35" rx="5.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="500" y="75.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">② 입력값 실시간 읽기 — TextEditingController</text>
  <rect x="40" y="100" width="280" height="35" rx="5.25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="180" y="120.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">③ 유효성 검사 — validator 함수</text>
  <rect x="340" y="100" width="320" height="35" rx="5.25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="500" y="120.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">④ 폼 전체 일괄 검증 — Form + GlobalKey</text>
  <rect x="40" y="145" width="280" height="35" rx="5.25" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1" opacity="1"/>
  <text x="180" y="165.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">⑤ 비밀번호 마스킹 — obscureText</text>
  <rect x="340" y="145" width="320" height="35" rx="5.25" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1" opacity="1"/>
  <text x="500" y="165.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">⑥ 키보드 타입 지정 — keyboardType</text>
  <rect x="40" y="190" width="280" height="35" rx="5.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="180" y="210.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">⑦ 포커스 이동 — FocusNode</text>
  <rect x="340" y="190" width="320" height="35" rx="5.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="500" y="210.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">⑧ 제출 시 저장 — FormState.save()</text>
  <rect x="170" y="235" width="340" height="35" rx="5.25" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="1"/>
  <text x="340" y="255.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">⑨ 오류 초기화 — FormState.reset()</text>
  <text x="100" y="297.6" fill="#22c55e" font-family="Nunito, sans-serif" font-size="14" opacity="1">Flutter Form 시스템은 이 모든 것을 체계적으로 처리한다</text>
