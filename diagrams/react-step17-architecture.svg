<svg xmlns="http://www.w3.org/2000/svg" width="600" height="449" viewBox="20 -20 530 396.8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="530" height="396.8" rx="12" fill="#141414"/>
  <text x="60" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">React 에러 처리 아키텍처</text>
  <rect x="50" y="55" width="470" height="55" rx="8.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="60" y="72.6" fill="#22c55e" font-family="Nunito, sans-serif" font-size="14" opacity="1">렌더링 중 에러 (컴포넌트 함수 본문)</text>
  <text x="70" y="92.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">→ Error Boundary (getDerivedStateFromError)</text>
  <rect x="50" y="120" width="470" height="55" rx="8.25" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1" opacity="1"/>
  <text x="60" y="137.6" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="14" opacity="1">이벤트 핸들러 에러 (onClick, onChange 등)</text>
  <text x="70" y="157.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">→ try/catch + State / showBoundary()</text>
  <rect x="50" y="185" width="470" height="55" rx="8.25" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="1"/>
  <text x="60" y="202.6" fill="#06b6d4" font-family="Nunito, sans-serif" font-size="14" opacity="1">비동기 에러 (fetch, setTimeout, Promise)</text>
  <text x="70" y="222.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">→ try/catch + State (기존) / use() + Error Boundary (React 19)</text>
  <text x="60" y="273.5" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="15" opacity="1">계층적 방어선:</text>
  <rect x="50" y="290" width="110" height="30" rx="4.5" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="105" y="308.25" text-anchor="middle" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13">전역</text>
  <rect x="170" y="290" width="110" height="30" rx="4.5" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="225" y="308.25" text-anchor="middle" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13">라우트</text>
  <rect x="290" y="290" width="110" height="30" rx="4.5" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="345" y="308.25" text-anchor="middle" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13">기능</text>
  <rect x="410" y="290" width="110" height="30" rx="4.5" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="465" y="308.25" text-anchor="middle" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13">컴포넌트</text>
  <text x="60" y="340.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">(폭발 반경 최소화 = Graceful Degradation)</text>
</svg>