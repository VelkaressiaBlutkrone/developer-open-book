<svg xmlns="http://www.w3.org/2000/svg" width="600" height="697" viewBox="-10 -20 448.5 521">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="448.5" height="521" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Step 05 핵심 개념 관계도</text>
  <rect x="20" y="45" width="388.5" height="426" rx="58.275" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="214.25" y="106.80000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">부모 컴포넌트</text>
  <text x="214.25" y="125.00000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Props (읽기 전용 객체)</text>
  <text x="214.25" y="143.20000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 데이터 전달: name, age, items 등</text>
  <text x="214.25" y="161.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 콜백 전달: onClick, onChange 등</text>
  <text x="214.25" y="179.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· children: JSX 자식 요소</text>
  <text x="214.25" y="197.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="214.25" y="216" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">자식 컴포넌트</text>
  <text x="214.25" y="234.20000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Props를 읽기만 한다 (수정 불가)</text>
  <text x="214.25" y="252.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 콜백 Props를 호출하여 부모에게 이벤트 전달</text>
  <text x="214.25" y="270.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">데이터 흐름:</text>
  <text x="214.25" y="288.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">부모 → 자식 (Props, 단방향)</text>
  <text x="214.25" y="307" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">자식 → 부모 (콜백 호출, 역방향 통신)</text>
  <text x="214.25" y="325.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">State 배치 원칙:</text>
  <text x="214.25" y="343.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">공유 데이터 → 가장 가까운 공통 부모 (Lifting State Up)</text>
  <text x="214.25" y="361.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">재사용 전략:</text>
  <text x="214.25" y="379.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">상속 ✗ → 합성(Composition) + children prop ✓</text>
  <text x="214.25" y="398" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">한계:</text>
  <text x="214.25" y="416.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Props Drilling → Context API(Step 25)로 해결</text>
</svg>