<svg xmlns="http://www.w3.org/2000/svg" width="600" height="389" viewBox="20 -20 540 350">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="540" height="350" rx="12" fill="#141414"/>
  <text x="80" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">에러 처리의 계층 구조</text>
  <rect x="50" y="55" width="480" height="50" rx="7.5" fill="#5c1a1a" stroke="#ef4444" stroke-width="1" opacity="1"/>
  <text x="60" y="72.6" fill="#ef4444" font-family="Nunito, sans-serif" font-size="14" opacity="1">최상위</text>
  <text x="140" y="72.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">전역 Error Boundary</text>
  <text x="80" y="93.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">앱 전체의 최후 방어선</text>
  <rect x="70" y="120" width="460" height="50" rx="7.5" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1" opacity="1"/>
  <text x="80" y="137.6" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="14" opacity="1">페이지</text>
  <text x="160" y="137.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">라우트별 Error Boundary</text>
  <text x="100" y="158.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">특정 페이지 에러 격리</text>
  <rect x="90" y="185" width="440" height="50" rx="7.5" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="1"/>
  <text x="100" y="202.6" fill="#06b6d4" font-family="Nunito, sans-serif" font-size="14" opacity="1">섹션</text>
  <text x="180" y="202.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">기능별 Error Boundary</text>
  <text x="120" y="223.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">위젯/패널 에러 격리</text>
  <rect x="110" y="250" width="420" height="50" rx="7.5" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="120" y="267.6" fill="#22c55e" font-family="Nunito, sans-serif" font-size="14" opacity="1">컴포넌트</text>
  <text x="200" y="267.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">try/catch + State</text>
  <text x="140" y="288.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">이벤트 핸들러, 비동기 에러</text>
