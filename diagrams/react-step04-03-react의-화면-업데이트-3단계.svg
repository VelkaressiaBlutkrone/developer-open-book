<svg xmlns="http://www.w3.org/2000/svg" width="600" height="672" viewBox="-10 -20 406 455">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="406" height="455" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">React의 화면 업데이트 3단계</text>
  <rect x="20" y="45" width="346" height="360" rx="51.9" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="193" y="101.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">1. Trigger  &quot;무언가&quot;가 렌더링을 촉발한다</text>
  <text x="193" y="119.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 초기 마운트</text>
  <text x="193" y="137.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· State 변경 (Step 6에서 학습)</text>
  <text x="193" y="155.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Props 변경</text>
  <text x="193" y="173.89999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 부모 재렌더링</text>
  <text x="193" y="192.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="193" y="210.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">2. Render  컴포넌트 함수를 호출한다 ★</text>
  <text x="193" y="228.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(렌더링)  · 함수 본문 전체가 실행됨</text>
  <text x="193" y="246.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 새로운 React Element 트리 생성</text>
  <text x="193" y="264.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 이전 트리와 비교 (Reconciliation, Step 7)</text>
  <text x="193" y="283.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· ※ DOM을 건드리지 않는다!</text>
  <text x="193" y="301.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="193" y="319.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">3. Commit  변경 사항을 실제 DOM에 반영한다</text>
  <text x="193" y="337.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(커밋)  · 변경된 부분만 DOM에 적용</text>
  <text x="193" y="355.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 브라우저가 화면을 다시 그림 (Repaint)</text>
</svg>