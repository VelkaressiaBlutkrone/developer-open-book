<svg xmlns="http://www.w3.org/2000/svg" width="700" height="227" viewBox="0 -15 700 226.6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="0" y="-15" width="700" height="226.6" rx="12" fill="#141414"/>
  <text x="140" y="33" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">CSR vs SSR 배포 아키텍처</text>
  <rect x="30" y="55" width="300" height="40" rx="6" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="180" y="78.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">CSR (Vite + React Router)</text>
  <text x="40" y="114.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">빌드 → dist/ (정적 파일)</text>
  <text x="40" y="134.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">배포: Vercel / Netlify / S3+CloudFront</text>
  <text x="40" y="154.6" fill="#22c55e" font-family="Nunito, sans-serif" font-size="14" opacity="1">서버 불필요, 가장 저렴, 빠름</text>
  <text x="40" y="174.6" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="14" opacity="1">SPA Fallback 라우팅 설정 필요</text>
  <rect x="370" y="55" width="300" height="40" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="520" y="78.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">SSR (Next.js)</text>
  <text x="380" y="114.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">빌드 → .next/ (서버+정적)</text>
  <text x="380" y="134.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">배포: Vercel / Docker + ECS</text>
  <text x="380" y="154.6" fill="#ef4444" font-family="Nunito, sans-serif" font-size="14" opacity="1">Node.js 서버 필요</text>
  <text x="380" y="174.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">또는 output:'export'로 정적 내보내기</text>
</svg>