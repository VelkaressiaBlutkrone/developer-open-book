<svg xmlns="http://www.w3.org/2000/svg" width="680" height="594" viewBox="20 -10 680 594">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-10" width="680" height="594" rx="12" fill="#141414"/>
  <text x="210" y="39.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">프로덕션 모니터링 전체 구조</text>
  <rect x="50" y="60" width="620" height="116" rx="17.4" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="360" y="122.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">1. 에러 모니터링 — &quot;무엇이 깨졌는가&quot;</text>
  <text x="70" y="112.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· JavaScript 에러 자동 수집</text>
  <text x="70" y="134.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 스택 트레이스, 사용자 컨텍스트, 빈도</text>
  <text x="70" y="156.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 도구: Sentry, Datadog, Bugsnag</text>
  <rect x="50" y="186" width="620" height="116" rx="17.4" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
  <text x="360" y="248.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">2. 성능 모니터링 — &quot;느려지고 있는가&quot;</text>
  <text x="70" y="238.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Core Web Vitals (LCP, INP, CLS)</text>
  <text x="70" y="260.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 페이지 로드 시간, API 응답 시간</text>
  <text x="70" y="282.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 도구: Sentry Performance, web-vitals</text>
  <rect x="50" y="312" width="620" height="116" rx="17.4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="360" y="374.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">3. 사용자 분석 — &quot;무엇을 하는가&quot;</text>
  <text x="70" y="364.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 페이지뷰, 클릭 이벤트, 전환율</text>
  <text x="70" y="386.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 사용자 흐름, 이탈 지점</text>
  <text x="70" y="408.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 도구: Google Analytics, Posthog</text>
  <rect x="50" y="438" width="620" height="116" rx="17.4" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="360" y="500.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">세 축의 상호 관계</text>
  <text x="70" y="490.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 에러 급증 → 이탈 증가 → 전환율 하락</text>
  <text x="70" y="512.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 성능 저하 → 페이지 이탈 → DAU 감소</text>
  <text x="70" y="534.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 세 축을 함께 보아야 전체 그림이 보인다</text>
</svg>