  <rect x="40" y="235" width="600" height="35" rx="5.25" fill="#5c1a1a" stroke="#ef4444" stroke-width="1" opacity="1"/>
  <text x="340" y="256" text-anchor="middle" fill="#ef4444" font-family="Nunito, sans-serif" font-size="14">⑤ 로직과 UI의 분리 한계</text>
