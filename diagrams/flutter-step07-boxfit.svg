<svg xmlns="http://www.w3.org/2000/svg" width="600" height="559" viewBox="50 -20 461.6 430">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="50" y="-20" width="461.6" height="430" rx="12" fill="#141414"/>
  <text x="150" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">BoxFit 옵션 비교</text>
  <text x="80" y="59.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="0.7">원본 이미지: 가로형 (3:2) / Container: 정사각형 (1:1)</text>
  <rect x="80" y="75" width="220" height="35" rx="5.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="190" y="96" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">BoxFit.cover</text>
  <text x="310" y="94.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="0.8">꽉 채움, 일부 잘릴 수 있음 ← 카드 배경</text>
  <rect x="80" y="120" width="220" height="35" rx="5.25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="190" y="141" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">BoxFit.contain</text>
  <text x="310" y="139.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="0.8">전체 표시, 여백 발생 ← 로고, 아이콘</text>
  <rect x="80" y="165" width="220" height="35" rx="5.25" fill="#5c1a1a" stroke="#ef4444" stroke-width="1" opacity="1"/>
  <text x="190" y="186" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">BoxFit.fill</text>
  <text x="310" y="184.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="0.8">꽉 채움, 비율 무시 (왜곡)</text>
  <rect x="80" y="210" width="220" height="35" rx="5.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="190" y="231" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">BoxFit.fitWidth</text>
  <text x="310" y="229.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="0.8">너비 맞춤, 높이 비율 유지</text>
  <rect x="80" y="255" width="220" height="35" rx="5.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="190" y="276" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">BoxFit.fitHeight</text>
  <text x="310" y="274.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="0.8">높이 맞춤, 너비 비율 유지</text>
  <rect x="80" y="300" width="220" height="35" rx="5.25" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1" opacity="1"/>
  <text x="190" y="321" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">BoxFit.none</text>
  <text x="310" y="319.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="0.8">원본 크기 그대로</text>
  <rect x="80" y="345" width="220" height="35" rx="5.25" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="1"/>
  <text x="190" y="366" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">BoxFit.scaleDown</text>
  <text x="310" y="364.7" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="13" opacity="0.8">contain과 동일, 확대 안 함</text>
</svg>