<svg xmlns="http://www.w3.org/2000/svg" width="600" height="756" viewBox="-10 -20 528 665">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="528" height="665" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">과제 (개념적 분석):</text>
  <rect x="20" y="45" width="468" height="570" rx="70.2" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">과제 (개념적 분석):</text>
  <text x="40" y="104.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">아래 컴포넌트 구조에서 Streaming SSR이 어떻게 동작하는지 분석하라.</text>
  <text x="40" y="130.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Layout&gt;</text>
  <text x="40" y="156.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Header /&gt;                          ← 즉시 HTML</text>
  <text x="40" y="182.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;HeroSkeleton /&gt;}&gt;</text>
  <text x="40" y="208.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;HeroSection /&gt;                   ← 데이터 패칭 200ms</text>
  <text x="40" y="234.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="260.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;ProductsSkeleton /&gt;}&gt;</text>
  <text x="40" y="286.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;ProductGrid /&gt;                   ← 데이터 패칭 400ms</text>
  <text x="40" y="312.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="338.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;ReviewsSkeleton /&gt;}&gt;</text>
  <text x="40" y="364.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;ReviewSection /&gt;                 ← 데이터 패칭 600ms</text>
  <text x="40" y="390.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="416.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Footer /&gt;                          ← 즉시 HTML</text>
  <text x="40" y="442.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Layout&gt;</text>
  <text x="40" y="468.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">작성할 것:</text>
  <text x="40" y="495.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. 서버에서 전송되는 HTML 청크의 순서와 시점</text>
  <text x="40" y="525.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. 각 시점에서 사용자가 보는 화면의 상태</text>
  <text x="40" y="555.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. Hydration이 어떤 순서로 진행되는지</text>
  <text x="40" y="585.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. 사용자가 HeroSection을 클릭하면 어떤 시점부터 반응하는지</text>
</svg>