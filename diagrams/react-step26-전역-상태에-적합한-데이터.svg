<svg xmlns="http://www.w3.org/2000/svg" width="600" height="620" viewBox="-10 -15 446 461">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="446" height="461" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">전역 상태에 적합한 데이터</text>
  <rect x="20" y="50" width="386" height="366" rx="54.9" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">✅ 인증 상태 (로그인한 사용자 정보)</text>
  <text x="40" y="109.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">✅ UI 전역 상태 (테마, 사이드바 열림, 활성 모달)</text>
  <text x="40" y="135.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">✅ 장바구니 (여러 페이지에서 접근)</text>
  <text x="40" y="161.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">✅ 알림/토스트 (어디서든 추가 가능)</text>
  <text x="40" y="187.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">✅ 앱 설정 (언어, 시간대, 표시 옵션)</text>
  <text x="40" y="213.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">❌ 서버 데이터 → TanStack Query</text>
  <text x="40" y="239.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">❌ 폼 입력값 → 로컬 State</text>
  <text x="40" y="265.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">❌ URL 상태 → useSearchParams (Step 18)</text>
  <text x="40" y="291.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">❌ 파생 데이터 → selector로 계산</text>
  <text x="40" y="317.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">❌ 한 컴포넌트에서만 사용하는 State → 로컬 useState</text>
</svg>