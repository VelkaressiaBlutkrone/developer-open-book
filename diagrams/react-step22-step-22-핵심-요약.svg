<svg xmlns="http://www.w3.org/2000/svg" width="600" height="963" viewBox="-10 -20 528 847">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="528" height="847" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Step 22 핵심 요약</text>
  <rect x="20" y="45" width="468" height="752" rx="70.2" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">Step 22 핵심 요약</text>
  <text x="40" y="105.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. REST API = 리소스(URL) + HTTP 메서드(동사) + 상태 코드</text>
  <text x="40" y="133.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ GET(조회), POST(생성), PUT/PATCH(수정), DELETE(삭제)</text>
  <text x="40" y="159.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 2xx(성공), 4xx(클라이언트 에러), 5xx(서버 에러)</text>
  <text x="40" y="187.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. fetch는 HTTP 에러에서 reject되지 않는다!</text>
  <text x="40" y="215.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ response.ok 확인 필수</text>
  <text x="40" y="241.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ response.json()도 await 필요</text>
  <text x="40" y="267.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ AbortController로 요청 취소</text>
  <text x="40" y="295.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. Axios는 fetch 위에 편의 기능을 추가한다</text>
  <text x="40" y="323.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 인터셉터, baseURL, 자동 JSON 변환, HTTP 에러 reject</text>
  <text x="40" y="349.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 인증 토큰, 에러 변환, 로깅 등에 유용</text>
  <text x="40" y="375.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 번들 크기(~13KB) vs 편의성 트레이드오프</text>
  <text x="40" y="403.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. Server State와 Client State를 구분해야 한다</text>
  <text x="40" y="431.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Server State: 서버가 소유, 비동기, stale 가능</text>
  <text x="40" y="457.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Client State: 클라이언트가 소유, 동기, 항상 최신</text>
  <text x="40" y="483.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 같은 도구로 관리하면 복잡성 증가</text>
  <text x="40" y="511.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. 수동 패칭은 매 컴포넌트마다 보일러플레이트를 반복한다</text>
  <text x="40" y="539.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ loading/error/data State + useEffect + Cleanup</text>
  <text x="40" y="565.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ useFetch Custom Hook으로 추출 가능하지만 한계가 있다</text>
  <text x="40" y="593.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">6. 수동 패칭의 7가지 한계</text>
  <text x="40" y="621.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Race Condition, 캐싱 부재, Stale Data</text>
  <text x="40" y="647.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Waterfall, 에러 재시도, 낙관적 업데이트, 보일러플레이트</text>
  <text x="40" y="673.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 이 문제들을 해결하는 것이 TanStack Query (Step 23)</text>
  <text x="40" y="701.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">7. 병렬 요청: Promise.all / Promise.allSettled</text>
  <text x="40" y="729.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 독립적 데이터: Promise.all로 병렬 패칭</text>
  <text x="40" y="755.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 부분 실패 허용: Promise.allSettled</text>
  <text x="40" y="781.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 의존적 데이터: Waterfall이 불가피 (라이브러리로 최적화)</text>
</svg>