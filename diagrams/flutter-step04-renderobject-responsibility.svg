<svg xmlns="http://www.w3.org/2000/svg" width="600" height="350" viewBox="50 -20 480 280">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="50" y="-20" width="480" height="280" rx="12" fill="#141414"/>
  <text x="150" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">RenderObject의 핵심 책임</text>
  <rect x="80" y="60" width="420" height="35" rx="5.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="290" y="81" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">1. 크기 계산 — Constraints로 자신의 크기 결정</text>
  <rect x="80" y="105" width="420" height="35" rx="5.25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="290" y="126" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">2. 위치 계산 — 부모가 자신의 위치를 결정</text>
  <rect x="80" y="150" width="420" height="35" rx="5.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="290" y="171" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">3. 그리기 — Canvas에 실제 픽셀 명령 생성</text>
  <rect x="80" y="195" width="420" height="35" rx="5.25" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1" opacity="1"/>
  <text x="290" y="216" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">4. Hit Testing — 터치 이벤트 판단</text>
</svg>