<svg xmlns="http://www.w3.org/2000/svg" width="770" height="340" viewBox="20 -10 770 340">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-10" width="770" height="340" rx="12" fill="#141414"/>
  <text x="220" y="45.2" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="28" opacity="1">REST vs GraphQL</text>
  <rect x="50" y="80" width="340" height="45" rx="6.75" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="220" y="107.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20">REST</text>
  <rect x="420" y="80" width="340" height="45" rx="6.75" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="590" y="107.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20">GraphQL</text>
  <rect x="50" y="140" width="340" height="50" rx="7.5" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="220" y="159.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">GET /users/42</text>
  <text x="220" y="177.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 전체 필드 반환</text>
  <rect x="420" y="140" width="340" height="50" rx="7.5" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="590" y="159.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">query { user(id:42)</text>
  <text x="590" y="177.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">  { name, email } }</text>
  <rect x="50" y="200" width="340" height="45" rx="6.75" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="220" y="226" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Over-fetching: 불필요 데이터</text>
  <rect x="420" y="200" width="340" height="45" rx="6.75" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="590" y="226" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">필요한 데이터만 요청</text>
  <rect x="50" y="255" width="340" height="45" rx="6.75" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="220" y="281" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Under-fetching: 여러 번 요청</text>
  <rect x="420" y="255" width="340" height="45" rx="6.75" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="590" y="281" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">단일 요청으로 완료</text>
</svg>