<svg xmlns="http://www.w3.org/2000/svg" width="600" height="455" viewBox="-10 -15 539.5 409">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="539.5" height="409" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Props Drilling과 비교</text>
  <rect x="20" y="50" width="479.5" height="314" rx="47.1" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Props Drilling:</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">App(theme) → Main(theme) → Sidebar(theme)</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Main이 theme을 전달만 하기 위해 Props에 포함</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Context:</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">App: &lt;ThemeContext.Provider value={theme}&gt;</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Sidebar: const theme = useContext(ThemeContext)</text>
  <text x="40" y="239.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Main은 theme의 존재를 모른다! ★</text>
  <text x="40" y="265.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Sidebar가 Context에서 직접 접근</text>
</svg>