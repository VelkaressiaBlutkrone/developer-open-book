<svg xmlns="http://www.w3.org/2000/svg" width="600" height="766" viewBox="-10 -15 463 591">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="463" height="591" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">어디에서 어떤 에러를 처리하는가</text>
  <rect x="20" y="50" width="403" height="496" rx="60.449999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Layer 1 (HTTP 클라이언트):</text>
  <text x="40" y="109.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 네트워크 에러 → 표준화된 ApiError로 변환</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 401 → 자동 토큰 갱신 시도</text>
  <text x="40" y="161.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 모든 에러를 표준 형태로 통일</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Layer 3 (Hook):</text>
  <text x="40" y="213.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· TanStack Query의 retry로 자동 재시도</text>
  <text x="40" y="239.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· onError 콜백으로 전역 에러 처리 (토스트 등)</text>
  <text x="40" y="265.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· useMutation의 onError로 Mutation 에러 처리</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Layer 4 (컴포넌트):</text>
  <text x="40" y="317.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· isError + error.message로 에러 UI 표시</text>
  <text x="40" y="343.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· Error Boundary로 렌더링 에러 catch</text>
  <text x="40" y="369.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 검증 에러(422) → 폼 필드별 에러 표시</text>
  <text x="40" y="395.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">전역 (QueryClient):</text>
  <text x="40" y="421.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 모든 쿼리/뮤테이션의 기본 에러 처리</text>
  <text x="40" y="447.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 에러 로깅, 모니터링 서비스 전송</text>
</svg>