<svg xmlns="http://www.w3.org/2000/svg" width="600" height="567" viewBox="-10 -20 491 464">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="491" height="464" rx="12" fill="#141414"/>
  <rect x="20" y="10" width="431" height="404" rx="60.599999999999994" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="235.5" y="69.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">React가 결정하지 않는 것들 (= 개발자가 선택해야 하는 것들):</text>
  <text x="235.5" y="88.10000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">영역  React의 입장</text>
  <text x="235.5" y="106.30000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">라우팅  제공하지 않음</text>
  <text x="235.5" y="124.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">데이터 패칭  제공하지 않음</text>
  <text x="235.5" y="142.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">전역 상태 관리  Context만 제공 (최소한)</text>
  <text x="235.5" y="160.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">폼 관리  제공하지 않음</text>
  <text x="235.5" y="179.10000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">스타일링  제공하지 않음</text>
  <text x="235.5" y="197.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">폴더 구조  강제하지 않음</text>
  <text x="235.5" y="215.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">빌드 도구  제공하지 않음</text>
  <text x="235.5" y="233.70000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">서버 연동  제공하지 않음</text>
  <text x="235.5" y="251.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">React가 제공하는 것:</text>
  <text x="235.5" y="270.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 컴포넌트 모델 (함수 컴포넌트)</text>
  <text x="235.5" y="288.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 상태 관리 기본 도구 (useState, useReducer)</text>
  <text x="235.5" y="306.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 부수 효과 관리 (useEffect)</text>
  <text x="235.5" y="324.70000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 가상 DOM과 Reconciliation</text>
  <text x="235.5" y="342.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Context API (기본적인 데이터 공유)</text>
  <text x="235.5" y="361.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ &quot;UI를 구축하기 위한 JavaScript 라이브러리&quot; (React 공식 설명)</text>
</svg>