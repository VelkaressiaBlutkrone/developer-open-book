<svg xmlns="http://www.w3.org/2000/svg" width="600" height="587" viewBox="-10 -20 397.5 389">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="397.5" height="389" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">다루는 것</text>
  <rect x="20" y="45" width="337.5" height="294" rx="44.1" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="188.75" y="95.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 조건부 렌더링 6가지 패턴과 선택 기준</text>
  <text x="188.75" y="113.60000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· &amp;&amp; 연산자의 함정과 방지법</text>
  <text x="188.75" y="131.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· React가 렌더링하지 않는 값 / 렌더링하는 값</text>
  <text x="188.75" y="150" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 리스트 렌더링의 map 패턴과 key 복습</text>
  <text x="188.75" y="168.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 빈 배열, 로딩, 에러 상태의 UI 설계</text>
  <text x="188.75" y="186.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 리스트 필터링, 정렬, 그룹화 패턴</text>
  <text x="188.75" y="204.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 중첩 리스트와 트리 구조 렌더링</text>
  <text x="188.75" y="222.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">다루지 않는 것</text>
  <text x="188.75" y="241" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 가상화(Virtualization) — 대규모 리스트 최적화</text>
  <text x="188.75" y="259.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Suspense 기반 로딩 UI (Step 30)</text>
  <text x="188.75" y="277.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Error Boundary (Step 17)</text>
  <text x="188.75" y="295.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 서버 데이터 패칭 패턴 (Step 22~23)</text>
</svg>