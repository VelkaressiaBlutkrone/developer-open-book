<svg xmlns="http://www.w3.org/2000/svg" width="600" height="540" viewBox="-10 -15 599 539">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="599" height="539" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">요구사항:</text>
  <rect x="20" y="50" width="539" height="444" rx="66.6" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 대시보드에 3개 위젯: 사용자 정보(100ms), 통계(300ms), 최근 활동(500ms)</text>
  <text x="40" y="109.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 인위적 지연: await new Promise(r =&gt; setTimeout(r, delay))</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 3가지 설계로 구현:</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">A: 전체를 하나의 Suspense로</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">B: 위젯별 독립 Suspense</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">C: 계층적 Suspense (바깥=페이지 셸, 안쪽=위젯별)</text>
  <text x="40" y="239.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 각 설계에서 &quot;첫 콘텐츠가 보이는 시간&quot;과 &quot;전체 완료 시간&quot; 기록</text>
  <text x="40" y="265.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">기록표:</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">| 설계 | 첫 콘텐츠 표시 | 전체 완료 | 중간 상태 |</text>
  <text x="40" y="317.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">|-----|--------------|----------|----------|</text>
  <text x="40" y="343.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">|  A  | ?ms          | ?ms      | 전체 스켈레톤 |</text>
  <text x="40" y="369.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">|  B  | ?ms          | ?ms      | 개별 스켈레톤 |</text>
  <text x="40" y="395.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">|  C  | ?ms          | ?ms      | 셸+개별 스켈레톤 |</text>
</svg>