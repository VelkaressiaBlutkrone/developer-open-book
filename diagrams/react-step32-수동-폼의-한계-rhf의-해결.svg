<svg xmlns="http://www.w3.org/2000/svg" width="600" height="395" viewBox="-10 -15 582 383">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="582" height="383" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">수동 폼의 한계              RHF의 해결</text>
  <rect x="20" y="50" width="522" height="288" rx="43.199999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">State 4개 관리           → useForm() 한 줄로 전부 관리</text>
  <text x="40" y="109.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">매 입력마다 리렌더링     → Uncontrolled 기반 → 리렌더링 최소화 ★</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">validate 수동 작성       → Zod 스키마로 자동 검증 + 타입 추론</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">touched 수동 추적        → formState.touchedFields 자동 관리</text>
  <text x="40" y="187.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">에러 표시 로직 반복      → formState.errors 자동 관리</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">배열 필드 구현 어려움    → useFieldArray 내장</text>
  <text x="40" y="239.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">서버 에러 반영 어려움    → setError로 서버 에러 통합</text>
</svg>