<svg xmlns="http://www.w3.org/2000/svg" width="600" height="520" viewBox="-10 -20 474 411">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="474" height="411" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">브라우저가 http://localhost:5173/ 요청</text>
  <rect x="20" y="45" width="414" height="316" rx="47.4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="227" y="97.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="227" y="115.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Vite Dev Server</text>
  <text x="227" y="133.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">1. index.html 제공</text>
  <text x="227" y="151.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ &lt;script type=&quot;module&quot; src=&quot;/src/main.jsx&quot;&gt;</text>
  <text x="227" y="170.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">2. 브라우저가 main.jsx 요청</text>
  <text x="227" y="188.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Vite가 JSX → JS 변환 후 제공</text>
  <text x="227" y="206.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(esbuild 사용, ~1ms)</text>
  <text x="227" y="224.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">3. main.jsx 안의 import 문 발견</text>
  <text x="227" y="242.89999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ import App from './App.jsx'</text>
  <text x="227" y="261.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 브라우저가 App.jsx 요청</text>
  <text x="227" y="279.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Vite가 App.jsx 변환 후 제공</text>
  <text x="227" y="297.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">4. 연쇄적으로 필요한 파일만 변환·제공</text>
  <text x="227" y="315.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 사용하지 않는 파일은 변환하지 않음!</text>
</svg>