<svg xmlns="http://www.w3.org/2000/svg" width="600" height="496" viewBox="20 -20 520 430">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="520" height="430" rx="12" fill="#141414"/>
  <text x="80" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">useReducer 구성 요소 관계</text>
  <rect x="50" y="50" width="460" height="35" rx="5.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="60" y="69.6" fill="#06b6d4" font-family="Nunito, sans-serif" font-size="14" opacity="1">useReducer(reducer, initialState, init?)</text>
  <rect x="50" y="115" width="130" height="35" rx="5.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="115" y="136" text-anchor="middle" fill="#22c55e" font-family="Nunito, sans-serif" font-size="14">[state]</text>
  <text x="55" y="168.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">→ JSX 렌더링</text>
  <rect x="230" y="115" width="280" height="35" rx="5.25" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="1"/>
  <text x="370" y="135.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">reducer(currentState, action)</text>
  <rect x="310" y="170" width="200" height="35" rx="5.25" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1" opacity="1"/>
  <text x="410" y="190.75" text-anchor="middle" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="13">{ type, payload? }</text>
  <rect x="310" y="225" width="200" height="35" rx="5.25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="410" y="245.75" text-anchor="middle" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13">dispatch(action) 호출</text>
  <rect x="330" y="280" width="160" height="35" rx="5.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="410" y="300.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">이벤트 핸들러</text>
  <text x="330" y="327.9" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="11" opacity="1">(사용자 상호작용)</text>
  <rect x="50" y="350" width="460" height="30" rx="4.5" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="55" y="367.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">핵심: 사용자 → dispatch(action) → reducer → newState → 재렌더링</text>
