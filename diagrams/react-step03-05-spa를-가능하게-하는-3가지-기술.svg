<svg xmlns="http://www.w3.org/2000/svg" width="600" height="462" viewBox="-10 -20 448.5 345">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="448.5" height="345" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">SPA를 가능하게 하는 3가지 기술</text>
  <rect x="20" y="45" width="388.5" height="250" rx="37.5" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="214.25" y="91.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">1. History API (window.history.pushState)</text>
  <text x="214.25" y="109.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 서버 요청 없이 브라우저 URL을 변경</text>
  <text x="214.25" y="128" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 뒤로 가기/앞으로 가기 동작 유지</text>
  <text x="214.25" y="146.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· React Router가 이 API를 추상화</text>
  <text x="214.25" y="164.39999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">2. JavaScript에 의한 DOM 조작</text>
  <text x="214.25" y="182.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 페이지 전체를 교체하지 않고 필요한 부분만 업데이트</text>
  <text x="214.25" y="200.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· React의 Reconciliation이 효율적으로 처리</text>
  <text x="214.25" y="219" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">3. 비동기 데이터 통신 (fetch / XMLHttpRequest)</text>
  <text x="214.25" y="237.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 페이지 전환 시 필요한 데이터만 JSON으로 요청</text>
  <text x="214.25" y="255.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 전체 HTML 문서를 다시 받을 필요 없음</text>
</svg>