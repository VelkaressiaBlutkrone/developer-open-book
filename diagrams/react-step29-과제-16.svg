  <text x="40" y="275.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Tree Shaking으로 미사용 코드 제거?</text>
  <text x="40" y="303.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. 최적화 적용 후 번들 크기 비교</text>
