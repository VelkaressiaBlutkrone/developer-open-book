<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="50 -20 580 435">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="50" y="-20" width="580" height="435" rx="12" fill="#141414"/>
  <text x="200" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">Widget 종류 개념 지도</text>
  <rect x="250" y="55" width="180" height="40" rx="6" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="340" y="79" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">Widget 종류</text>
  <rect x="80" y="130" width="220" height="40" rx="6" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="190" y="154" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">StatelessWidget</text>
  <rect x="110" y="195" width="180" height="30" rx="4.5" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
  <text x="200" y="213.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">build() 하나만 구현</text>
  <rect x="360" y="130" width="220" height="40" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="470" y="154" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">StatefulWidget</text>
  <rect x="380" y="195" width="200" height="30" rx="4.5" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
  <text x="480" y="213.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">createState() → State</text>
  <rect x="350" y="245" width="250" height="140" rx="21" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
  <text x="475" y="253.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11">State 객체</text>
  <text x="475" y="267.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11">├── 프로퍼티 (가변 상태)</text>
  <text x="475" y="282" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11">├── Lifecycle 메서드</text>
  <text x="475" y="296.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11">│   initState()</text>
  <text x="475" y="310.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11">│   didChangeDependencies()</text>
  <text x="475" y="324.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11">│   build()</text>
  <text x="475" y="339.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11">│   didUpdateWidget()</text>
  <text x="475" y="353.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11">│   deactivate()</text>
  <text x="475" y="367.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11">│   dispose()</text>
  <text x="475" y="382.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="11">└── setState() → rebuild</text>
</svg>