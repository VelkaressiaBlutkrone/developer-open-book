<svg xmlns="http://www.w3.org/2000/svg" width="600" height="476" viewBox="-10 -15 548 435">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="548" height="435" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">시나리오: 사용자 A가 상품 목록을 보는 동안</text>
  <rect x="20" y="50" width="488" height="340" rx="51" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">다른 사용자 B가 새 상품을 추가했다</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">수동 패칭: 사용자 A는 페이지를 새로고침하지 않는 한</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">새 상품을 볼 수 없다</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">TanStack Query: windowFocus 시 자동 리패칭, 주기적 폴링 등으로</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">최신 데이터를 자동으로 가져온다</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">수동 구현 시:</text>
  <text x="40" y="239.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· setInterval로 주기적 패칭? → 비효율, 정리 관리 복잡</text>
  <text x="40" y="265.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· focus 이벤트 리스너? → 직접 구현 + 정리 필요</text>
  <text x="40" y="291.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· WebSocket? → 추가 인프라 필요</text>
</svg>