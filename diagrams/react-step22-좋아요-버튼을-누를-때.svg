<svg xmlns="http://www.w3.org/2000/svg" width="600" height="664" viewBox="-10 -20 460 509">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="460" height="509" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">좋아요 버튼을 누를 때</text>
  <rect x="20" y="45" width="400" height="414" rx="60" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">좋아요 버튼을 누를 때</text>
  <text x="40" y="104.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">일반 업데이트:</text>
  <text x="40" y="130.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">클릭 → 서버 요청 (300ms) → 성공 → UI 반영</text>
  <text x="40" y="156.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">사용자: &quot;왜 반응이 느리지?&quot;</text>
  <text x="40" y="182.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">낙관적 업데이트:</text>
  <text x="40" y="208.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">클릭 → UI 즉시 반영 + 서버 요청 → 성공 시 확정, 실패 시 롤백</text>
  <text x="40" y="234.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">사용자: &quot;즉시 반응하네!&quot;</text>
  <text x="40" y="260.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">수동 구현의 복잡성:</text>
  <text x="40" y="287.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. 현재 State 백업</text>
  <text x="40" y="317.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. 낙관적으로 State 업데이트</text>
  <text x="40" y="347.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. 서버 요청</text>
  <text x="40" y="377.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. 성공: 서버 응답으로 State 확정</text>
  <text x="40" y="407.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. 실패: 백업한 State로 롤백 + 에러 표시</text>
  <text x="40" y="437.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">6. 동시에 여러 낙관적 업데이트가 발생하면? → 매우 복잡</text>
</svg>