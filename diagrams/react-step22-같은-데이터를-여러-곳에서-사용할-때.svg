<svg xmlns="http://www.w3.org/2000/svg" width="600" height="521" viewBox="-10 -15 531 461">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="531" height="461" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">같은 데이터를 여러 곳에서 사용할 때</text>
  <rect x="20" y="50" width="471" height="366" rx="54.9" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Header:    GET /api/user/me → 사용자 정보 (아바타, 이름)</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Sidebar:   GET /api/user/me → 같은 사용자 정보!</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Profile:   GET /api/user/me → 또 같은 사용자 정보!</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">캐싱 없이: 3개의 동일한 API 요청 → 서버 부하 × 3, 네트워크 비용 × 3</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">캐싱 있으면: 1번만 요청, 3곳에서 캐시 공유</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">수동 구현 시:</text>
  <text x="40" y="239.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 전역 캐시 객체를 직접 관리해야 한다</text>
  <text x="40" y="265.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 캐시 무효화 로직을 직접 구현해야 한다</text>
  <text x="40" y="291.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· &quot;이 데이터가 오래되었는가?&quot; 판단을 직접 해야 한다</text>
  <text x="40" y="317.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 사실상 TanStack Query를 직접 만드는 것과 같다</text>
</svg>