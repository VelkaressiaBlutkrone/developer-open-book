<svg xmlns="http://www.w3.org/2000/svg" width="600" height="571" viewBox="-10 -20 431.5 411">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="431.5" height="411" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Step 6에서 배운 3단계 흐름</text>
  <rect x="20" y="45" width="371.5" height="316" rx="47.4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="205.75" y="97.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">1. Trigger  (setState 호출 등)</text>
  <text x="205.75" y="115.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="205.75" y="133.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">2. Render Phase</text>
  <text x="205.75" y="151.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">컴포넌트 함수 호출</text>
  <text x="205.75" y="170.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 새 React Element 트리 생성</text>
  <text x="205.75" y="188.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Reconciliation (Diff) ★  ← 이 Step의 주제</text>
  <text x="205.75" y="206.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">이전 트리 vs 새 트리 비교</text>
