<svg xmlns="http://www.w3.org/2000/svg" width="610" height="345" viewBox="20 -20 610 345">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="610" height="345" rx="12" fill="#141414"/>
  <text x="100" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">useState vs useRef 비교</text>
  <rect x="50" y="55" width="260" height="240" rx="36" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="1"/>
  <text x="100" y="81.2" fill="#06b6d4" font-family="Nunito, sans-serif" font-size="18" opacity="1">useState</text>
  <text x="70" y="111.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">값 변경: setValue(new)</text>
  <text x="70" y="146.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">재렌더링: 트리거됨 ★</text>
  <text x="70" y="181.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">읽기 시점: 렌더링 스냅샷</text>
  <text x="70" y="216.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">불변: 직접 변경 금지</text>
  <text x="70" y="251.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">용도: UI에 표시되는 데이터</text>
  <rect x="340" y="55" width="260" height="240" rx="36" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="400" y="81.2" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="18" opacity="1">useRef</text>
  <text x="360" y="111.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">값 변경: ref.current = new</text>
  <text x="360" y="146.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">재렌더링: 트리거 안 됨 ★</text>
  <text x="360" y="181.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">읽기 시점: 항상 최신 값</text>
  <text x="360" y="216.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">가변: 직접 변경 가능</text>
  <text x="360" y="251.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">용도: UI 비표시 값 + DOM</text>
</svg>