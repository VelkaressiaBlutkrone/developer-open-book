  <rect x="70" y="-20" width="520" height="265" rx="12" fill="#141414"/>
  <text x="180" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">FocusNode의 역할</text>
  <rect x="100" y="55" width="460" height="160" rx="24" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="250" y="78.2" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="18" opacity="1">FocusNode</text>
