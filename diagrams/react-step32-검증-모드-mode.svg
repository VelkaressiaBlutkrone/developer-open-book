<svg xmlns="http://www.w3.org/2000/svg" width="600" height="403" viewBox="-10 -15 531 357">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="531" height="357" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">검증 모드 (mode)</text>
  <rect x="20" y="50" width="471" height="262" rx="39.3" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">'onSubmit' (기본): 제출 시에만 검증 → 가장 가벼움</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">'onBlur':          필드를 떠날 때 검증 → 균형잡힌 UX</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">'onChange':        입력할 때마다 검증 → 가장 반응적 (비용 높음)</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">'all':             onBlur + onChange → 가장 적극적</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">권장: 'onBlur' — 사용자가 필드를 떠날 때 피드백 제공</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">입력 중에는 방해하지 않으면서 즉각적 피드백</text>
</svg>