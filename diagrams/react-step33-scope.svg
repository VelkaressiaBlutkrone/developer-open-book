<svg xmlns="http://www.w3.org/2000/svg" width="680" height="398" viewBox="20 -20 680 397.6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="680" height="397.6" rx="12" fill="#141414"/>
  <rect x="50" y="10" width="620" height="336" rx="50.4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="360" y="183" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20">Step 33 — 폼 UX 패턴과 접근성</text>
  <rect x="60" y="50" width="600" height="196" rx="29.4" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="360" y="152" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">다루는 것</text>
  <text x="80" y="94.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 검증 시점 전략 (인라인 / 제출 시 / 실시간)</text>
  <text x="80" y="116.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 에러 메시지의 시각적·의미적 설계</text>
  <text x="80" y="138.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 폼 접근성(a11y): ARIA 속성, 키보드 네비게이션</text>
  <text x="80" y="160.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 접근성을 갖춘 FormField 컴포넌트 설계</text>
  <text x="80" y="182.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 자동 저장(Auto-save) 패턴</text>
  <text x="80" y="204.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 폼 상태 시각화 (progress, dirty indicator)</text>
  <text x="80" y="226.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 에러 포커스 자동 이동</text>
  <text x="80" y="248.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 성공/실패 피드백 UX</text>
  <rect x="60" y="252" width="600" height="86" rx="12.9" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="360" y="299" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">다루지 않는 것</text>
  <text x="80" y="296.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· RHF/Zod 기본 사용법 (Step 32에서 학습)</text>
  <text x="80" y="318.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 디자인 시스템 구축 (Step 34)</text>
  <text x="80" y="340.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 스크린 리더 상세 작동 원리</text>
</svg>