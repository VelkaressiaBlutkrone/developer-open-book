<svg xmlns="http://www.w3.org/2000/svg" width="680" height="468" viewBox="20 -10 680 468">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-10" width="680" height="468" rx="12" fill="#141414"/>
  <text x="210" y="39.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">롤백, Feature Flag, Preview 배포</text>
  <rect x="50" y="60" width="620" height="116" rx="17.4" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="360" y="122.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">Feature Flag</text>
  <text x="70" y="112.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 배포와 릴리스 분리: 코드 배포 ≠ 사용자 노출</text>
  <text x="70" y="134.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 점진적 롤아웃: 1% → 10% → 50% → 100%</text>
  <text x="70" y="156.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 즉각 비활성화: 플래그 OFF → 재배포 불필요 ★</text>
  <rect x="50" y="186" width="620" height="116" rx="17.4" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="360" y="248.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">롤백</text>
  <text x="70" y="238.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Vercel Promote: 이전 배포를 프로덕션으로 승격</text>
  <text x="70" y="260.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Git Revert: main 되돌리기 → CI/CD 재실행</text>
  <text x="70" y="282.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Docker Tag: 이전 이미지 버전으로 재배포</text>
  <rect x="50" y="312" width="620" height="116" rx="17.4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="360" y="374.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">Preview 배포</text>
  <text x="70" y="364.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· PR마다 고유 URL 생성</text>
  <text x="70" y="386.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 코드 리뷰 + 실제 동작 동시 확인</text>
  <text x="70" y="408.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 머지 전 최종 검증</text>
</svg>