  <rect x="20" y="-20" width="483" height="387" rx="12" fill="#141414"/>
  <text x="50" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">FIRST 테스트 원칙</text>
