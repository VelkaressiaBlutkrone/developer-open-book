  <text x="215" y="144.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">Isolated (독립)</text>
  <text x="330" y="137.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">테스트 간 의존성 없음, 순서 무관</text>
  <rect x="50" y="176" width="55" height="45" rx="6.75" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
