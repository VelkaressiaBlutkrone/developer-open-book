  <text x="215" y="86.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">Fast (빠름)</text>
  <text x="330" y="79.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">모든 단위 테스트를 1분 이내에 실행</text>
