  <text x="330" y="253.7" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="13" opacity="1">expect()로 자동 판단</text>
  <rect x="50" y="292" width="55" height="45" rx="6.75" fill="#1a4d4d" stroke="#06b6d4" stroke-width="2" opacity="1"/>
