  <text x="330" y="195.7" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13" opacity="1">언제 어디서 실행해도 같은 결과</text>
  <rect x="50" y="234" width="55" height="45" rx="6.75" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
