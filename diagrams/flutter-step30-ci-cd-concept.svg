  <text x="440" y="187.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">스토어 자동 업로드</text>
  <text x="60" y="215.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">Lint, 정적 분석</text>
  <text x="440" y="215.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">버전 관리 자동화</text>
