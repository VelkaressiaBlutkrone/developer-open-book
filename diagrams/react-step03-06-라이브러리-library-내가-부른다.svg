<svg xmlns="http://www.w3.org/2000/svg" width="600" height="482" viewBox="-10 -20 457 367">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="457" height="367" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">라이브러리 (Library) — &quot;내가 부른다&quot;</text>
  <rect x="20" y="45" width="397" height="272" rx="40.8" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="218.5" y="93.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">개발자의 코드  호출  → 라이브러리 기능</text>
  <text x="218.5" y="111.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 개발자가 실행 흐름을 결정한다</text>
  <text x="218.5" y="129.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 필요한 부분만 골라서 사용한다</text>
  <text x="218.5" y="148.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 다른 라이브러리와 자유롭게 조합한다</text>
  <text x="218.5" y="166.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">예: React, Lodash, Axios, D3.js</text>
  <text x="218.5" y="184.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">프레임워크 (Framework) — &quot;프레임워크가 나를 부른다&quot;</text>
  <text x="218.5" y="202.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">프레임워크  호출  → 개발자의 코드</text>
  <text x="218.5" y="220.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 프레임워크가 실행 흐름을 결정한다 (IoC: 제어의 역전)</text>
  <text x="218.5" y="239.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 정해진 구조와 규칙을 따라야 한다</text>
  <text x="218.5" y="257.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 라우팅, 빌드, 데이터 처리 등 통합 제공</text>
  <text x="218.5" y="275.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">예: Angular, Next.js, Remix, Django, Spring</text>
</svg>