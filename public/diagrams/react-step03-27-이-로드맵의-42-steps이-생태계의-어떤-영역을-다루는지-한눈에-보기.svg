<svg xmlns="http://www.w3.org/2000/svg" width="600" height="759" viewBox="-10 -20 516.5 653">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="516.5" height="653" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">이 로드맵의 42 Steps이 생태계의 어떤 영역을 다루는지 한눈에 보기</text>
  <rect x="20" y="45" width="456.5" height="558" rx="68.475" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="248.25" y="118.20000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Phase 0 (Step 1~3)</text>
  <text x="248.25" y="136.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">개발 환경  → Node.js, Vite</text>
  <text x="248.25" y="154.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">JS 문법  → ES6+ 복습</text>
  <text x="248.25" y="172.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">생태계 조감  → 이 문서 ★</text>
  <text x="248.25" y="191" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Phase 1 (Step 4~10)</text>
  <text x="248.25" y="209.20000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">React Core  → react, react-dom, JSX, Hooks 기초</text>
  <text x="248.25" y="227.40000000000003" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Phase 2 (Step 11~17)</text>
  <text x="248.25" y="245.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">React Core  → Hooks 심화, 부수 효과, 에러 처리</text>
  <text x="248.25" y="263.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Phase 3 (Step 18~24)</text>
  <text x="248.25" y="282" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">라우팅  → React Router, Next.js Router</text>
  <text x="248.25" y="300.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">렌더링 전략  → CSR, SSR, SSG, RSC</text>
  <text x="248.25" y="318.40000000000003" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">데이터  → TanStack Query, fetch/Axios</text>
  <text x="248.25" y="336.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Phase 4 (Step 25~30)</text>
  <text x="248.25" y="354.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">상태 관리  → Context, Zustand, Redux Toolkit, Jotai</text>
  <text x="248.25" y="373" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">아키텍처  → 폴더 구조, 컴포넌트 패턴, Code Splitting</text>
  <text x="248.25" y="391.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Phase 5 (Step 31~35)</text>
  <text x="248.25" y="409.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">타입  → TypeScript, Zod</text>
  <text x="248.25" y="427.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">폼  → React Hook Form</text>
  <text x="248.25" y="445.80000000000007" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">스타일링  → Tailwind, CSS Modules, CSS-in-JS</text>
  <text x="248.25" y="464" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">애니메이션  → Framer Motion</text>
  <text x="248.25" y="482.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Phase 6 (Step 36~38)</text>
  <text x="248.25" y="500.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">테스트·품질 → Vitest, RTL, MSW, Playwright, Lighthouse</text>
  <text x="248.25" y="518.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Phase 7 (Step 39~42)</text>
  <text x="248.25" y="536.8000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">빌드·배포  → Vite 심화, Vercel, Docker, CI/CD, 보안</text>
</svg>