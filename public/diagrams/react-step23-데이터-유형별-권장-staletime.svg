<svg xmlns="http://www.w3.org/2000/svg" width="600" height="732" viewBox="-10 -15 463 565">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="463" height="565" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">데이터 유형별 권장 staleTime</text>
  <rect x="20" y="50" width="403" height="470" rx="60.449999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">실시간 데이터 (주식, 채팅):</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">staleTime: 0 (기본값)</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">+ refetchInterval: 1000~5000 (1~5초 폴링)</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">자주 변하는 데이터 (알림, 피드):</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">staleTime: 1000 * 30 (30초)</text>
  <text x="40" y="213.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 30초간은 캐시 사용, 이후 트리거 시 갱신</text>
  <text x="40" y="239.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">보통 데이터 (상품 목록, 게시글):</text>
  <text x="40" y="265.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">staleTime: 1000 * 60 (1분)</text>
  <text x="40" y="291.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 1분간 캐시 사용</text>
  <text x="40" y="317.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">드물게 변하는 데이터 (카테고리, 설정):</text>
  <text x="40" y="343.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">staleTime: 1000 * 60 * 10 (10분)</text>
  <text x="40" y="369.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">거의 변하지 않는 데이터 (국가 코드, 환율 기준):</text>
  <text x="40" y="395.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">staleTime: Infinity</text>
  <text x="40" y="421.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 수동 무효화만으로 갱신</text>
</svg>