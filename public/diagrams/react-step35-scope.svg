  <text x="80" y="340.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 번역 관리 플랫폼 연동</text>
  <text x="80" y="362.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· WCAG AAA 수준 상세</text>
  <text x="80" y="384.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 스크린 리더 내부 동작 상세</text>
