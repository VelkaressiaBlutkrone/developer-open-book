<svg xmlns="http://www.w3.org/2000/svg" width="680" height="442" viewBox="20 -20 680 441.6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="680" height="441.6" rx="12" fill="#141414"/>
  <rect x="50" y="10" width="620" height="380" rx="57" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="360" y="205" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20">Step 35 — i18n + a11y</text>
  <rect x="60" y="50" width="600" height="218" rx="32.699999999999996" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="360" y="163" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">다루는 것</text>
  <text x="80" y="94.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· i18n 아키텍처: react-i18next 기반</text>
  <text x="80" y="116.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 번역 키 관리, 네임스페이스, 동적 언어 전환</text>
  <text x="80" y="138.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 날짜/숫자/통화 포맷팅 (Intl API)</text>
  <text x="80" y="160.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· WCAG 4대 원칙과 핵심 기준</text>
  <text x="80" y="182.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 시맨틱 HTML: 올바른 요소 선택</text>
  <text x="80" y="204.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· ARIA: 역할, 상태, 속성</text>
  <text x="80" y="226.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 키보드 접근성: 포커스 관리, Tab 순서</text>
  <text x="80" y="248.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 색상 대비, 텍스트 크기, 모션 감소</text>
  <text x="80" y="270.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 접근성 진단 도구 (axe, Lighthouse)</text>
  <rect x="60" y="274" width="600" height="108" rx="16.2" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="360" y="332" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">다루지 않는 것</text>
