<svg xmlns="http://www.w3.org/2000/svg" width="760" height="433" viewBox="20 -20 760 433">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="760" height="433" rx="12" fill="#141414"/>
  <text x="50" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">애니메이션의 UX 역할</text>
  <rect x="50" y="60" width="700" height="55" rx="8.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="400" y="91.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">① 공간 인지  →  카드 확장 → &quot;이 화면이 그 카드에서 왔다&quot;</text>
  <rect x="50" y="127" width="700" height="55" rx="8.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="400" y="158.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">② 피드백 제공  →  버튼 눌릴 때 눌리는 느낌 → 동작 확인</text>
  <rect x="50" y="194" width="700" height="55" rx="8.25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="400" y="225.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">③ 시선 유도  →  중요한 변경사항을 부드럽게 강조</text>
  <rect x="50" y="261" width="700" height="55" rx="8.25" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
  <text x="400" y="292.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">④ 상태 전이  →  로딩 → 완료 전환을 매끄럽게 표현</text>
  <rect x="50" y="328" width="700" height="55" rx="8.25" fill="#1a4d4d" stroke="#06b6d4" stroke-width="2" opacity="1"/>
  <text x="400" y="359.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">⑤ 브랜드 개성  →  앱만의 고유한 움직임 언어 표현</text>
</svg>