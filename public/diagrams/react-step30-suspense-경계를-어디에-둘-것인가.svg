<svg xmlns="http://www.w3.org/2000/svg" width="600" height="630" viewBox="-10 -20 460 483">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="460" height="483" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Suspense 경계를 어디에 둘 것인가?</text>
  <rect x="20" y="45" width="400" height="388" rx="58.199999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Suspense 경계를 어디에 둘 것인가?</text>
  <text x="40" y="105.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. &quot;이 영역이 독립적으로 로딩되어야 하는가?&quot;</text>
  <text x="40" y="134.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">YES → 별도 Suspense 경계 생성</text>
  <text x="40" y="160.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">NO → 부모 Suspense에 포함</text>
  <text x="40" y="187.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. &quot;로딩 중에 이 영역 대신 무엇을 보여줄 것인가?&quot;</text>
  <text x="40" y="215.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 이것이 Skeleton UI 설계의 기준</text>
  <text x="40" y="243.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. &quot;이 데이터의 로딩 시간이 다른 것과 크게 다른가?&quot;</text>
  <text x="40" y="272.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">YES → 분리 (느린 것이 빠른 것을 차단하지 않도록)</text>
  <text x="40" y="298.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">NO → 합칠 수 있음</text>
  <text x="40" y="325.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. &quot;부분적으로 표시하는 것이 의미가 있는가?&quot;</text>
  <text x="40" y="354.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">프로필 + 게시글: 프로필만 먼저 보여주는 것이 의미 있음 → 분리</text>
  <text x="40" y="380.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">결제 폼: 부분만 보이면 혼란 → 하나로 묶기</text>
  <text x="40" y="406.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">원칙: &quot;사용자가 가장 빨리, 가장 많은 콘텐츠를 볼 수 있도록&quot; 배치</text>
</svg>