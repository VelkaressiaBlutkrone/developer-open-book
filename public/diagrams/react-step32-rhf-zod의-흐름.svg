<svg xmlns="http://www.w3.org/2000/svg" width="600" height="355" viewBox="-10 -20 596 353">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="596" height="353" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">RHF + Zod의 흐름</text>
  <rect x="20" y="45" width="536" height="258" rx="38.699999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">RHF + Zod의 흐름</text>
  <text x="40" y="105.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. Zod 스키마 정의 → 검증 규칙 + TypeScript 타입 동시 생성</text>
  <text x="40" y="135.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. zodResolver(schema) → RHF의 resolver에 연결</text>
  <text x="40" y="165.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. register('fieldName') → input을 RHF에 등록 (Uncontrolled)</text>
  <text x="40" y="195.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. 사용자 입력 → DOM이 값 보관 (리렌더링 없음!)</text>
  <text x="40" y="225.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. handleSubmit 호출 → DOM에서 값 수집 → Zod 스키마로 검증</text>
  <text x="40" y="255.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">6. 검증 실패 → formState.errors에 Zod 에러 메시지 반영</text>
  <text x="40" y="285.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">7. 검증 성공 → onSubmit(data) 호출 — data는 타입 안전!</text>
</svg>