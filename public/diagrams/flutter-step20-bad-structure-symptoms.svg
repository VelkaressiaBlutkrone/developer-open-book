  <rect x="50" y="288" width="700" height="45" rx="6.75" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="400" y="314.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">&quot;기능 하나 추가했더니 다른 기능이 깨졌다&quot;</text>
