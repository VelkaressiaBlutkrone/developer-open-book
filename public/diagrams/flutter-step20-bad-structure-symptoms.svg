<svg xmlns="http://www.w3.org/2000/svg" width="760" height="383" viewBox="20 -20 760 383">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="760" height="383" rx="12" fill="#141414"/>
  <text x="50" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">나쁜 프로젝트 구조의 증상</text>
  <rect x="50" y="60" width="700" height="45" rx="6.75" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="400" y="86.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">&quot;이 비즈니스 로직이 어느 파일에 있지?&quot;</text>
  <rect x="50" y="117" width="700" height="45" rx="6.75" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="400" y="143.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">&quot;API 변경 시 수십 개 파일을 수정해야 한다&quot;</text>
  <rect x="50" y="174" width="700" height="45" rx="6.75" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
  <text x="400" y="200.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">&quot;이 위젯을 테스트하려면 서버가 필요하다&quot;</text>
