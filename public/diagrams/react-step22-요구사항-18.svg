<svg xmlns="http://www.w3.org/2000/svg" width="600" height="508" viewBox="-10 -15 514 435">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="514" height="435" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">요구사항:</text>
  <rect x="20" y="50" width="454" height="340" rx="51" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· API 인스턴스 생성 (baseURL, timeout, 기본 headers)</text>
  <text x="40" y="109.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 요청 인터셉터: 모든 요청에 타임스탬프 헤더 추가</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 응답 인터셉터: 응답 시간 로깅 (요청 시작~응답 도착)</text>
  <text x="40" y="161.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 에러 인터셉터: 에러 코드별 다른 메시지 변환</text>
  <text x="40" y="187.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">- 401 → &quot;로그인이 필요합니다&quot;</text>
  <text x="40" y="213.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">- 403 → &quot;접근 권한이 없습니다&quot;</text>
  <text x="40" y="239.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">- 404 → &quot;요청한 데이터를 찾을 수 없습니다&quot;</text>
  <text x="40" y="265.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">- 500 → &quot;서버 오류가 발생했습니다&quot;</text>
  <text x="40" y="291.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 이 인스턴스를 사용하여 실습 1의 CRUD를 리팩토링</text>
</svg>