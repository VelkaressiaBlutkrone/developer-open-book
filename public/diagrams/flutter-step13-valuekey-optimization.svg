<svg xmlns="http://www.w3.org/2000/svg" width="700" height="255" viewBox="0 -20 700 255">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="0" y="-20" width="700" height="255" rx="12" fill="#141414"/>
  <text x="100" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">ValueKey의 rebuild 최적화 효과</text>
  <rect x="30" y="55" width="300" height="150" rx="22.5" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="110" y="74.4" fill="#ef4444" font-family="Nunito, sans-serif" font-size="16" opacity="1">Key 없음</text>
  <text x="50" y="95.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">[A, B, C] → [NEW, A, B, C]</text>
  <text x="50" y="112.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1"></text>
  <text x="50" y="129.39999999999998" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">위치 0: B가 A Element 재사용</text>
  <text x="50" y="146.2" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">  → A의 State가 B에! (버그)</text>
  <text x="50" y="163" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1"></text>
  <text x="50" y="179.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">위치 3: 새 Element 생성</text>
  <rect x="370" y="55" width="300" height="150" rx="22.5" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="440" y="74.4" fill="#22c55e" font-family="Nunito, sans-serif" font-size="16" opacity="1">ValueKey 있음</text>
  <text x="390" y="95.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">[A(1), B(2), C(3)]</text>
  <text x="390" y="112.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">  → [NEW(4), A(1), B(2), C(3)]</text>
  <text x="390" y="129.39999999999998" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1"></text>
  <text x="390" y="146.2" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">id:1 → id:1 정확히 매칭</text>
  <text x="390" y="163" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">  (State 보존)</text>
  <text x="390" y="179.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1"></text>
  <text x="390" y="196.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">id:4: 새 Element 생성</text>
</svg>