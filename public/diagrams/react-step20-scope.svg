<svg xmlns="http://www.w3.org/2000/svg" width="600" height="506" viewBox="20 -20 530 447">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="530" height="447" rx="12" fill="#141414"/>
  <text x="100" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Step 20 — 다루는 범위</text>
  <rect x="50" y="50" width="470" height="221" rx="33.15" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="60" y="72.4" fill="#22c55e" font-family="Nunito, sans-serif" font-size="16" opacity="1">다루는 것</text>
  <text x="65" y="96.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· Server Component vs Client Component의 차이</text>
  <text x="65" y="118.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· &quot;use client&quot; / &quot;use server&quot; 지시어</text>
  <text x="65" y="140.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· RSC의 렌더링 과정 (직렬화, 전송, 조합)</text>
  <text x="65" y="162.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· RSC가 번들 크기와 성능에 미치는 영향</text>
  <text x="65" y="184.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· Server/Client 경계 설계 전략</text>
  <text x="65" y="206.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· RSC와 SSR의 차이 (가장 혼동하기 쉬운 개념)</text>
  <text x="65" y="228.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· Server Actions (&quot;use server&quot; 함수)</text>
  <text x="65" y="250.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· 합성(Composition) 패턴과 RSC</text>
  <rect x="50" y="286" width="470" height="111" rx="16.65" fill="#5c1a1a" stroke="#ef4444" stroke-width="1" opacity="1"/>
  <text x="60" y="308.4" fill="#ef4444" font-family="Nunito, sans-serif" font-size="16" opacity="1">다루지 않는 것</text>
  <text x="65" y="332.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· Next.js App Router 구현 상세 (Step 21)</text>
  <text x="65" y="354.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· 데이터 캐싱 전략 상세 (Step 23)</text>
  <text x="65" y="376.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· 배포 인프라 (Step 40~41)</text>
</svg>