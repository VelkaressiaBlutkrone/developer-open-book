<svg xmlns="http://www.w3.org/2000/svg" width="760" height="366" viewBox="20 -20 760 366">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="760" height="366" rx="12" fill="#141414"/>
  <text x="50" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">Dart의 메모리 관리</text>
  <rect x="50" y="60" width="700" height="55" rx="8.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="400" y="91.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">Young Space (New Generation)  →  새로 생성된 객체. Minor GC로 빠르게 수거</text>
  <rect x="50" y="127" width="700" height="55" rx="8.25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="400" y="158.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">Old Space (Old Generation)  →  오래 살아남은 객체. Major GC로 수거</text>
  <rect x="50" y="194" width="700" height="55" rx="8.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="400" y="225.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">Garbage Collector (GC)  →  참조 없는 객체를 자동 해제</text>
  <rect x="50" y="261" width="700" height="55" rx="8.25" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
  <text x="400" y="292.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">루트 참조  →  Static 변수, 스택 변수, 글로벌 변수</text>
</svg>