<svg xmlns="http://www.w3.org/2000/svg" width="600" height="565" viewBox="20 -20 520 490">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="520" height="490" rx="12" fill="#141414"/>
  <text x="80" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">메모이제이션 도구의 관계</text>
  <text x="60" y="62.6" fill="#ef4444" font-family="Nunito, sans-serif" font-size="14" opacity="1">문제: 부모가 재렌더링될 때 자식도 재렌더링된다</text>
  <rect x="50" y="80" width="460" height="100" rx="15" fill="#5c1a1a" stroke="#ef4444" stroke-width="1" opacity="1"/>
  <text x="60" y="101.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">Parent (재렌더링됨)</text>
  <text x="70" y="122.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">const data = expensiveCalc(items);  ← 매번 재계산</text>
  <text x="70" y="140.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">const handler = () =&gt; { ... };      ← 매번 새 함수</text>
  <text x="70" y="160.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">&lt;Child data={data} onClick={handler} /&gt;</text>
  <rect x="100" y="200" width="360" height="45" rx="6.75" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1" opacity="1"/>
  <text x="110" y="217.6" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="14" opacity="1">Child (React.memo인데도 재렌더링!)</text>
  <text x="110" y="235.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">Props가 변했다고 판단됨 (참조가 다르므로)</text>
  <text x="60" y="279.4" fill="#22c55e" font-family="Nunito, sans-serif" font-size="16" opacity="1">해결:</text>
  <rect x="50" y="290" width="460" height="30" rx="4.5" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="280" y="308.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">① useMemo(expensiveCalc, [items]) → data 참조 안정화</text>
  <rect x="50" y="330" width="460" height="30" rx="4.5" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="1"/>
  <text x="280" y="348.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">② useCallback(handler, [deps]) → handler 참조 안정화</text>
  <rect x="50" y="370" width="460" height="30" rx="4.5" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="280" y="388.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">③ React.memo(Child) → Props 비교로 재렌더링 건너뛰기</text>
  <rect x="50" y="410" width="460" height="30" rx="4.5" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="280" y="428.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">→ ①②로 참조 안정화 + ③으로 비교 = 재렌더링 방지</text>
</svg>