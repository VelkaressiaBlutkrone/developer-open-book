<svg xmlns="http://www.w3.org/2000/svg" width="600" height="374" viewBox="-10 -20 482.5 301">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="482.5" height="301" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">&quot;이 State를 어디에 둘 것인가?&quot;</text>
  <rect x="20" y="45" width="422.5" height="206" rx="30.9" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="231.25" y="87.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">하나의 컴포넌트만 사용하는가?</text>
  <text x="231.25" y="106" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">YES → 해당 컴포넌트에 둔다</text>
  <text x="231.25" y="124.19999999999999" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">부모-자식 관계에서만 사용하는가?</text>
  <text x="231.25" y="142.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">YES → 부모에 두고 Props로 전달</text>
  <text x="231.25" y="160.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">형제 컴포넌트가 공유하는가?</text>
  <text x="231.25" y="178.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">YES → 가장 가까운 공통 부모로 끌어올린다 ★</text>
  <text x="231.25" y="197" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">먼 거리의 컴포넌트들이 공유하는가?</text>
  <text x="231.25" y="215.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Context API (Step 25) 또는 전역 상태 관리 (Step 26)</text>
</svg>