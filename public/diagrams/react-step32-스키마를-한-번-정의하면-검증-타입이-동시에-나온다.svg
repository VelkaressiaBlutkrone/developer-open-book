<svg xmlns="http://www.w3.org/2000/svg" width="600" height="931" viewBox="-10 -15 565 877">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="565" height="877" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">&quot;스키마를 한 번 정의하면 검증 + 타입이 동시에 나온다&quot;</text>
  <rect x="20" y="50" width="505" height="782" rx="75.75" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">기존 방식 (검증과 타입을 따로 관리):</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// 1. TypeScript 타입 정의</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">interface User {</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">name: string;</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">email: string;</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">age: number;</text>
  <text x="40" y="239.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">}</text>
  <text x="40" y="265.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// 2. 검증 로직을 별도로 작성 (중복!)</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">function validate(data) {</text>
  <text x="40" y="317.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">if (typeof data.name !== 'string') throw Error();</text>
  <text x="40" y="343.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">if (!data.email.includes('@')) throw Error();</text>
  <text x="40" y="369.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">if (data.age &lt; 0 || data.age &gt; 150) throw Error();</text>
  <text x="40" y="395.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">}</text>
  <text x="40" y="421.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// 문제: 타입 정의와 검증 로직이 분리 → 불일치 위험!</text>
  <text x="40" y="447.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Zod 방식 (하나의 스키마에서 둘 다):</text>
  <text x="40" y="473.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">const userSchema = z.object({</text>
  <text x="40" y="499.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">name: z.string().min(1, '이름을 입력하세요'),</text>
  <text x="40" y="525.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">email: z.string().email('유효한 이메일을 입력하세요'),</text>
  <text x="40" y="551.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">age: z.number().min(0).max(150),</text>
  <text x="40" y="577.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">});</text>
  <text x="40" y="603.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// 스키마에서 타입을 자동 추출!</text>
  <text x="40" y="629.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">type User = z.infer&lt;typeof userSchema&gt;;</text>
  <text x="40" y="655.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// { name: string; email: string; age: number; }</text>
  <text x="40" y="681.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">// 동일한 스키마로 런타임 검증!</text>
  <text x="40" y="707.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">userSchema.parse(data);  // 실패 시 ZodError throw</text>
  <text x="40" y="733.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">// 하나의 스키마 = 타입 + 검증 → 불일치 불가능! ★</text>
</svg>