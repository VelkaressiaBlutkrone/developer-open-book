<svg xmlns="http://www.w3.org/2000/svg" width="600" height="470" viewBox="-20 -20 586.6 459.6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-20" y="-20" width="586.6" height="459.6" rx="12" fill="#141414"/>
  <text x="10" y="22.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">시나리오: 1000개의 리스트 항목을 업데이트해야 할 때</text>
  <text x="10" y="47.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">┌────────────────────────────────────────────┐</text>
  <text x="10" y="72.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│  Stack Reconciler                          │</text>
  <text x="10" y="97.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│                                            │</text>
  <text x="10" y="122.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│  메인 스레드:                               │</text>
  <text x="10" y="150.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│</text>
  <rect x="220" y="135" width="300" height="20" rx="0" fill="#555555" stroke="#a0a0a0" stroke-width="2" opacity="1"/>
  <rect x="220" y="135" width="300" height="20" rx="0" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="530" y="148.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">│</text>
  <text x="10" y="177.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│  ↑ 렌더링 시작            렌더링 완료 ↑     │</text>
  <text x="10" y="202.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│  |←──── 200ms 동안 메인 스레드 점유 ────→|   │</text>
  <text x="10" y="227.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│                                            │</text>
  <text x="10" y="252.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│  이 200ms 동안:                            │</text>
  <text x="10" y="277.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│  · 사용자의 키보드 입력을 처리할 수 없다     │</text>
  <text x="10" y="302.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│  · 애니메이션이 멈춘다                      │</text>
  <text x="10" y="327.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│  · 클릭에 반응하지 않는다                   │</text>
  <text x="10" y="352.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">│  · 화면이 &quot;얼어붙은&quot; 것처럼 느껴진다        │</text>
  <text x="10" y="377.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">└────────────────────────────────────────────┘</text>
  <text x="10" y="402.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">사용자 체감: &quot;앱이 버벅인다&quot;, &quot;반응이 없다&quot;</text>
</svg>