<svg xmlns="http://www.w3.org/2000/svg" width="600" height="685" viewBox="-10 -20 360 411">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="360" height="411" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Controlled Component</text>
  <rect x="20" y="45" width="300" height="316" rx="45" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="170" y="97.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">React State  value  → &lt;input&gt;</text>
  <text x="170" y="115.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">↑</text>
  <text x="170" y="133.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">onChange</text>
  <text x="170" y="151.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· State가 input의 값을 &quot;제어&quot;한다</text>
  <text x="170" y="170.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· input은 State에 종속된다</text>
  <text x="170" y="188.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· &quot;React가 주인, input이 하인&quot;</text>
  <text x="170" y="206.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Uncontrolled Component</text>
  <text x="170" y="224.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">&lt;input&gt;  자체 관리 (DOM 내부 상태)</text>
  <text x="170" y="242.89999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">↑</text>
  <text x="170" y="261.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">ref로 필요할 때 값을 읽어옴</text>
  <text x="170" y="279.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· DOM이 input의 값을 자체 관리한다</text>
  <text x="170" y="297.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· React는 값을 제어하지 않는다</text>
  <text x="170" y="315.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· &quot;input이 자유, React는 관찰자&quot;</text>
</svg>