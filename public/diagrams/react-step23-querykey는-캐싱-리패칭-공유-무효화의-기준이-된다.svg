<svg xmlns="http://www.w3.org/2000/svg" width="701" height="747" viewBox="-10 -15 701 747">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="701" height="747" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">queryKey는 캐싱, 리패칭, 공유, 무효화의 기준이 된다</text>
  <rect x="20" y="50" width="641" height="652" rx="96.14999999999999" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">규칙 1: 배열 형태 (v5부터 필수)</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">queryKey: ['users']</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">queryKey: ['users', userId]</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">queryKey: ['users', userId, 'posts']</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">queryKey: ['products', { category: 'electronics', sort: 'price' }]</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">규칙 2: 계층적으로 설계한다</text>
  <text x="40" y="239.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">['users']                    → 모든 사용자 목록</text>
  <text x="40" y="265.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">['users', 42]                → 42번 사용자 상세</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">['users', 42, 'posts']       → 42번 사용자의 게시글</text>
  <text x="40" y="317.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">['users', 42, 'posts', 7]    → 42번 사용자의 7번 게시글</text>
  <text x="40" y="343.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">규칙 3: 필터/정렬 조건을 queryKey에 포함한다</text>
  <text x="40" y="369.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">['products', { category, sort, page }]</text>
  <text x="40" y="395.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ category, sort, page가 바뀌면 새 쿼리로 취급</text>
  <text x="40" y="421.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ 이전 조건의 캐시는 별도로 유지</text>
  <text x="40" y="447.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">규칙 4: queryFn에서 사용하는 모든 변수를 queryKey에 포함한다</text>
  <text x="40" y="473.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">// ❌ userId가 queryKey에 없으면 캐시가 섞임!</text>
  <text x="40" y="499.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">queryKey: ['user'],</text>
  <text x="40" y="525.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">queryFn: () =&gt; fetchUser(userId)</text>
  <text x="40" y="551.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">// ✅ userId를 queryKey에 포함</text>
  <text x="40" y="577.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">queryKey: ['users', userId],</text>
  <text x="40" y="603.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">queryFn: () =&gt; fetchUser(userId)</text>
</svg>