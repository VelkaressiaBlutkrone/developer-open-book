<svg xmlns="http://www.w3.org/2000/svg" width="780" height="280" viewBox="20 -20 780 280">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="780" height="280" rx="12" fill="#141414"/>
  <text x="150" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">extends / abstract / implements 비교</text>
  <rect x="50" y="70" width="220" height="160" rx="24" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="120" y="98" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">extends</text>
  <text x="65" y="133.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">부모의 구현을</text>
  <text x="65" y="154.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">물려받아</text>
  <text x="65" y="175.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">재사용 + 확장</text>
  <rect x="300" y="70" width="220" height="160" rx="24" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
  <text x="365" y="98" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">abstract</text>
  <text x="315" y="133.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">무엇을 해야 하는가</text>
  <text x="315" y="154.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">계약 정의</text>
