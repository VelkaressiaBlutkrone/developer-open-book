<svg xmlns="http://www.w3.org/2000/svg" width="729" height="389" viewBox="-10 -20 729 389">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="729" height="389" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">#### TDZ (Temporal Dead Zone)</text>
  <rect x="20" y="45" width="669" height="294" rx="44.1" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="354.5" y="95.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">```javascript</text>
  <text x="354.5" y="113.60000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// var — 호이스팅 시 undefined로 초기화</text>
  <text x="354.5" y="131.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">console.log(a); // undefined (에러 아님!)</text>
  <text x="354.5" y="150" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">var a = 5;</text>
  <text x="354.5" y="168.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// let/const — 호이스팅되지만 초기화되지 않음 (TDZ)</text>
  <text x="354.5" y="186.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">console.log(b); // ReferenceError: Cannot access 'b' before initialization</text>
  <text x="354.5" y="204.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">let b = 5;</text>
  <text x="354.5" y="222.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// TDZ 구간 시각화</text>
  <text x="354.5" y="241" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">//  TDZ 시작 (선언은 호이스팅됨)</text>
  <text x="354.5" y="259.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">//  console.log(b);  ← 여기서 접근하면 에러</text>
  <text x="354.5" y="277.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">//  ...</text>
  <text x="354.5" y="295.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">//  let b = 5;  ← TDZ 종료, 초기화됨</text>
</svg>