<svg xmlns="http://www.w3.org/2000/svg" width="600" height="552" viewBox="20 -20 510 469">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="510" height="469" rx="12" fill="#141414"/>
  <text x="100" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Step 11 — 다루는 범위</text>
  <rect x="50" y="50" width="450" height="221" rx="33.15" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="60" y="72.4" fill="#22c55e" font-family="Nunito, sans-serif" font-size="16" opacity="1">다루는 것</text>
  <text x="65" y="96.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· useEffect의 실행 타이밍과 렌더링 파이프라인에서의 위치</text>
  <text x="65" y="118.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· 의존성 배열의 3가지 형태와 동작 원리</text>
  <text x="65" y="140.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· Cleanup 함수의 타이밍과 패턴</text>
  <text x="65" y="162.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· 무한 루프 발생 케이스와 방지법</text>
  <text x="65" y="184.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· useEffect 안에서의 async 패턴</text>
  <text x="65" y="206.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· useEffect vs useLayoutEffect</text>
  <text x="65" y="228.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· &quot;useEffect가 필요 없는&quot; 케이스 판별</text>
  <text x="65" y="250.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· 실전 부수 효과 패턴 (패칭, 타이머, 이벤트, DOM)</text>
  <rect x="50" y="286" width="450" height="133" rx="19.95" fill="#5c1a1a" stroke="#ef4444" stroke-width="1" opacity="1"/>
  <text x="60" y="308.4" fill="#ef4444" font-family="Nunito, sans-serif" font-size="16" opacity="1">다루지 않는 것</text>
  <text x="65" y="332.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· useRef 상세 (Step 12)</text>
  <text x="65" y="354.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· TanStack Query 등 데이터 패칭 라이브러리 (Step 23)</text>
  <text x="65" y="376.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· Suspense 기반 패칭 (Step 30)</text>
  <text x="65" y="398.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· Error Boundary (Step 17)</text>
</svg>