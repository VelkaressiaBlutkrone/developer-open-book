<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="-10 -15 565 565">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="565" height="565" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">2xx 성공:</text>
  <rect x="20" y="50" width="505" height="470" rx="70.5" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">200 OK           → 요청 성공 (GET, PUT, PATCH, DELETE)</text>
  <text x="40" y="109.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">201 Created      → 리소스 생성 성공 (POST)</text>
  <text x="40" y="135.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">204 No Content   → 성공했으나 응답 본문 없음 (DELETE)</text>
  <text x="40" y="161.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">4xx 클라이언트 에러:</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">400 Bad Request  → 잘못된 요청 형식</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">401 Unauthorized → 인증 필요 (로그인 안 됨)</text>
  <text x="40" y="239.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">403 Forbidden    → 권한 없음 (로그인은 됐지만 접근 불가)</text>
  <text x="40" y="265.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">404 Not Found    → 리소스 없음</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">409 Conflict     → 충돌 (중복 등)</text>
  <text x="40" y="317.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">422 Unprocessable → 유효성 검증 실패</text>
  <text x="40" y="343.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">5xx 서버 에러:</text>
  <text x="40" y="369.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">500 Internal Server Error → 서버 내부 오류</text>
  <text x="40" y="395.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">502 Bad Gateway    → 게이트웨이 오류</text>
  <text x="40" y="421.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">503 Service Unavailable → 서비스 일시 중단</text>
</svg>