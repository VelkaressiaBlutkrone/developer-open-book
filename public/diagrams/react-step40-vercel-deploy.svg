<svg xmlns="http://www.w3.org/2000/svg" width="680" height="424" viewBox="20 -10 680 424">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-10" width="680" height="424" rx="12" fill="#141414"/>
  <text x="210" y="39.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Vercel 배포 전략</text>
  <rect x="50" y="60" width="620" height="94" rx="14.1" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="360" y="111.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">CI 파이프라인 (Vercel 자동 실행)</text>
  <text x="70" y="112.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· GitHub Push/PR → 자동 빌드 트리거</text>
  <text x="70" y="134.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· lint → typecheck → test → build</text>
  <rect x="50" y="164" width="620" height="116" rx="17.4" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="360" y="226.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">배포 환경</text>
  <text x="70" y="216.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· PR → Preview 배포 (고유 URL)</text>
  <text x="70" y="238.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· main 머지 → Production 배포</text>
  <text x="70" y="260.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 환경 변수 분리 (Preview / Production)</text>
  <rect x="50" y="290" width="620" height="94" rx="14.1" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="360" y="341.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">롤백</text>
  <text x="70" y="342.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 대시보드에서 이전 배포 선택 → Promote</text>
  <text x="70" y="364.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 수 초 이내 복원 가능</text>
</svg>