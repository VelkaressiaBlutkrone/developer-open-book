<svg xmlns="http://www.w3.org/2000/svg" width="600" height="544" viewBox="20 -20 429.6 389.6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="429.6" height="389.6" rx="12" fill="#141414"/>
  <text x="50" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">ConnectionState 값과 의미</text>
  <rect x="50" y="60" width="150" height="40" rx="6" fill="#1a4d4d" stroke="#06b6d4" stroke-width="2" opacity="1"/>
  <text x="125" y="84" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">none</text>
  <text x="220" y="77.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">future가 null인 경우</text>
  <rect x="50" y="115" width="150" height="40" rx="6" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
  <text x="125" y="139" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">waiting</text>
  <text x="220" y="132.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">Future가 아직 완료되지 않음 (로딩 중)</text>
  <rect x="50" y="170" width="150" height="40" rx="6" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="125" y="194" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">active</text>
  <text x="220" y="187.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">Stream이 활성 상태 (데이터 방출 중)</text>
  <rect x="50" y="225" width="150" height="40" rx="6" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="125" y="249" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">done</text>
  <text x="220" y="242.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">Future 완료 또는 Stream 종료</text>
  <text x="50" y="302.6" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="14" opacity="1">FutureBuilder:  none → waiting → done</text>
  <text x="50" y="332.6" fill="#22c55e" font-family="Nunito, sans-serif" font-size="14" opacity="1">StreamBuilder:  none → waiting → active → (done)</text>
</svg>