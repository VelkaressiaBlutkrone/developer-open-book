<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="20 -20 760 300.2">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="760" height="300.2" rx="12" fill="#141414"/>
  <text x="100" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">명시적 vs 암시적 애니메이션</text>
  <rect x="50" y="60" width="320" height="45" rx="6.75" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="210" y="87" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="18">명시적(Explicit)</text>
  <rect x="430" y="60" width="320" height="45" rx="6.75" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="590" y="87" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="18">암시적(Implicit)</text>
  <text x="60" y="131.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">AnimationController 직접 제어</text>
  <text x="440" y="131.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">상태 변경 → 자동 전환</text>
  <text x="60" y="159.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">시작·정지·반복·방향 수동 조작</text>
  <text x="440" y="159.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">setState()로 값 변경하면 자동</text>
  <text x="60" y="187.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">복잡한 커스텀 효과에 적합</text>
  <text x="440" y="187.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">단순 상태 변화 UI에 적합</text>
  <text x="60" y="215.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">코드량 많음</text>
  <text x="440" y="215.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">코드량 적음</text>
  <text x="60" y="243.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">예: 로딩 스피너, 복잡한 시퀀스</text>
  <text x="440" y="243.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">예: 버튼 크기, 색상 전환, 패딩</text>
</svg>