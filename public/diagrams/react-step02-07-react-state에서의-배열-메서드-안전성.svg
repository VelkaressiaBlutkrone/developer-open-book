<svg xmlns="http://www.w3.org/2000/svg" width="600" height="602" viewBox="-10 -20 431.5 433">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="431.5" height="433" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">React State에서의 배열 메서드 안전성</text>
  <rect x="20" y="45" width="371.5" height="338" rx="50.699999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="205.75" y="99.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">✅ 새 배열 반환  ❌ 원본 변경 (주의!)</text>
  <text x="205.75" y="117.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(안전)  (직접 사용 금지)</text>
  <text x="205.75" y="135.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">map()  push(), pop()</text>
  <text x="205.75" y="153.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">filter()  shift(), unshift()</text>
  <text x="205.75" y="172" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">slice()  splice()</text>
  <text x="205.75" y="190.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">concat()  sort() — [...arr].sort()로 우회</text>
  <text x="205.75" y="208.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">flat()  reverse() — [...arr].reverse()</text>
  <text x="205.75" y="226.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">toSorted() ★  fill()</text>
  <text x="205.75" y="244.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">toReversed() ★  arr[i] = x — map()으로 우회</text>
  <text x="205.75" y="263" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">toSpliced() ★</text>
  <text x="205.75" y="281.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">★ ES2023 메서드 — 원본을 변경하지 않는 새 버전</text>
  <text x="205.75" y="299.40000000000003" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">.sort()  → .toSorted()</text>
  <text x="205.75" y="317.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">.reverse()  → .toReversed()</text>
  <text x="205.75" y="335.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">.splice()  → .toSpliced()</text>
</svg>