<svg xmlns="http://www.w3.org/2000/svg" width="600" height="437" viewBox="-10 -20 533.5 389">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="533.5" height="389" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Synchronous Rendering (React 17 이전 기본)</text>
  <rect x="20" y="45" width="473.5" height="294" rx="44.1" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="256.75" y="95.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  <text x="256.75" y="113.60000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">렌더링 시작  → 렌더링 완료 → Commit → Paint</text>
  <text x="256.75" y="131.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">|←  중단 불가, 한 번에 처리  →|</text>
  <text x="256.75" y="150" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">문제: 200ms 렌더링 동안 사용자 입력 처리 불가</text>
  <text x="256.75" y="168.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Concurrent Rendering (React 18+)</text>
  <text x="256.75" y="186.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  <text x="256.75" y="204.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">렌더링 시작  → 일시 중단 → 입력 처리 → 재개  → 완료 → Commit → Paint</text>
  <text x="256.75" y="222.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">|←  5ms  →|  ↑ 브라우저  |←  5ms  →|</text>
  <text x="256.75" y="241" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">에게 양보</text>
  <text x="256.75" y="259.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 렌더링을 작은 조각(~5ms)으로 나눈다</text>
  <text x="256.75" y="277.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 각 조각 사이에 브라우저가 다른 작업을 처리할 수 있다</text>
  <text x="256.75" y="295.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 더 급한 업데이트가 오면 현재 작업을 중단하고 급한 것을 먼저 처리</text>
</svg>