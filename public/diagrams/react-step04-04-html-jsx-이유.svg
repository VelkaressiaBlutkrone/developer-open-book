<svg xmlns="http://www.w3.org/2000/svg" width="600" height="440" viewBox="-10 -20 440 323">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="440" height="323" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">HTML  JSX  이유</text>
  <rect x="20" y="45" width="380" height="228" rx="34.199999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="210" y="89.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">class  className  class는 JS 예약어</text>
  <text x="210" y="107.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">for  htmlFor  for는 JS 예약어</text>
  <text x="210" y="126.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">tabindex  tabIndex  camelCase 규칙</text>
  <text x="210" y="144.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">onclick  onClick  camelCase 규칙</text>
  <text x="210" y="162.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">onchange  onChange  camelCase 규칙</text>
  <text x="210" y="180.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">maxlength  maxLength  camelCase 규칙</text>
  <text x="210" y="198.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">style=&quot;...&quot;  style={{...}}  객체 형태로 전달</text>
  <text x="210" y="217.10000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">checked (HTML)  defaultChecked  비제어 컴포넌트</text>
  <text x="210" y="235.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">value (HTML)  defaultValue  비제어 컴포넌트</text>
