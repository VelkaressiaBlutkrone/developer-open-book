<svg xmlns="http://www.w3.org/2000/svg" width="601.5" height="455" viewBox="-10 -20 601.5 455">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="601.5" height="455" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">React는 항상 두 개의 Fiber 트리를 유지한다</text>
  <rect x="20" y="45" width="541.5" height="360" rx="54" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="290.75" y="101.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Current Tree  WorkInProgress Tree</text>
  <text x="290.75" y="119.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(현재 화면에 반영된 트리)  (새 렌더링을 위한 작업 트리)</text>
  <text x="290.75" y="137.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">App  ←alternate→  App</text>
  <text x="290.75" y="155.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">state: old  state: new</text>
  <text x="290.75" y="173.89999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Counter  ←alternate→  Counter</text>
  <text x="290.75" y="192.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">count: 0  count: 1</text>
  <text x="290.75" y="210.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">동작 과정:</text>
  <text x="290.75" y="228.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">1. State 변경 트리거</text>
  <text x="290.75" y="246.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">2. Current Tree를 기반으로 WorkInProgress Tree 생성 (Render Phase)</text>
  <text x="290.75" y="264.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 변경이 없는 Fiber는 재사용 (복사하지 않음)</text>
  <text x="290.75" y="283.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 변경이 있는 Fiber만 새로 생성</text>
  <text x="290.75" y="301.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">3. WorkInProgress Tree가 완성되면 Current로 교체 (Commit Phase)</text>
  <text x="290.75" y="319.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· &quot;포인터 전환&quot;으로 한 순간에 교체 (Double Buffering)</text>
  <text x="290.75" y="337.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 사용자는 불완전한 중간 상태를 보지 않는다</text>
  <text x="290.75" y="355.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">4. 이전 Current Tree는 다음 렌더링의 WorkInProgress로 재활용</text>
</svg>