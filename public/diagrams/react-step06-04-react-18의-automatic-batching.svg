<svg xmlns="http://www.w3.org/2000/svg" width="788.5" height="741" viewBox="-10 -20 788.5 741">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="788.5" height="741" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">#### React 18의 Automatic Batching</text>
  <rect x="20" y="45" width="728.5" height="646" rx="96.89999999999999" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="384.25" y="125.80000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">React 17까지는 이벤트 핸들러 안에서만 Batching이 동작했다. React 18부터는 **모든 상황에서** 자동으로 Batching된다.</text>
  <text x="384.25" y="144" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">```jsx</text>
  <text x="384.25" y="162.20000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">function AsyncBatching() {</text>
  <text x="384.25" y="180.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">const [count, setCount] = useState(0);</text>
  <text x="384.25" y="198.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">const [flag, setFlag] = useState(false);</text>
  <text x="384.25" y="216.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">const handleClick = () =&gt; {</text>
  <text x="384.25" y="235" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">//  이벤트 핸들러</text>
  <text x="384.25" y="253.20000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// React 17 ✅, React 18 ✅ → 항상 Batching됨</text>
  <text x="384.25" y="271.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setCount((c) =&gt; c + 1);</text>
  <text x="384.25" y="289.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setFlag((f) =&gt; !f);</text>
  <text x="384.25" y="307.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// → 1번의 렌더링</text>
  <text x="384.25" y="326" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">//  Promise 콜백</text>
  <text x="384.25" y="344.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">fetch(&quot;/api/data&quot;).then(() =&gt; {</text>
  <text x="384.25" y="362.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setCount((c) =&gt; c + 1);</text>
  <text x="384.25" y="380.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setFlag((f) =&gt; !f);</text>
  <text x="384.25" y="398.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// React 17: 2번의 렌더링 ❌</text>
  <text x="384.25" y="417" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// React 18: 1번의 렌더링 ✅ (Automatic Batching)</text>
  <text x="384.25" y="435.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">});</text>
  <text x="384.25" y="453.40000000000003" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">//  setTimeout</text>
  <text x="384.25" y="471.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setTimeout(() =&gt; {</text>
  <text x="384.25" y="489.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setCount((c) =&gt; c + 1);</text>
  <text x="384.25" y="508" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setFlag((f) =&gt; !f);</text>
  <text x="384.25" y="526.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// React 17: 2번의 렌더링 ❌</text>
  <text x="384.25" y="544.4000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// React 18: 1번의 렌더링 ✅ (Automatic Batching)</text>
  <text x="384.25" y="562.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">}, 1000);</text>
  <text x="384.25" y="580.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">};</text>
  <text x="384.25" y="599" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">return &lt;button onClick={handleClick}&gt;{count}&lt;/button&gt;;</text>
  <text x="384.25" y="617.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">}</text>
</svg>