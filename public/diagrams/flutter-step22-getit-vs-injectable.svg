<svg xmlns="http://www.w3.org/2000/svg" width="760" height="272" viewBox="20 -20 760 272.2">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="760" height="272.2" rx="12" fill="#141414"/>
  <text x="100" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">GetIt 수동 등록 vs injectable 자동 등록</text>
  <rect x="50" y="60" width="320" height="45" rx="6.75" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="210" y="87" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="18">GetIt 수동 등록</text>
  <rect x="430" y="60" width="320" height="45" rx="6.75" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="590" y="87" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="18">injectable + GetIt</text>
  <text x="60" y="131.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">직접 registerSingleton 호출</text>
  <text x="440" y="131.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">@injectable 어노테이션</text>
  <text x="60" y="159.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">등록 코드를 수동 관리</text>
  <text x="440" y="159.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">build_runner로 자동 생성</text>
  <text x="60" y="187.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">소규모 프로젝트에 적합</text>
  <text x="440" y="187.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">대규모 프로젝트에 적합</text>
  <text x="60" y="215.7" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="13" opacity="1">등록 누락 가능</text>
  <text x="440" y="215.7" fill="#22c55e" font-family="Nunito, sans-serif" font-size="13" opacity="1">컴파일 타임 안전성</text>
</svg>