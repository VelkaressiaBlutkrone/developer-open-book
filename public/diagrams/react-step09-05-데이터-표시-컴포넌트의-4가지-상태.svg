<svg xmlns="http://www.w3.org/2000/svg" width="600" height="612" viewBox="-10 -20 360 367">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="360" height="367" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">데이터 표시 컴포넌트의 4가지 상태</text>
  <rect x="20" y="45" width="300" height="272" rx="40.8" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="170" y="93.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">1. Loading (로딩 중)</text>
  <text x="170" y="111.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 데이터를 가져오는 중</text>
  <text x="170" y="129.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 스피너 또는 스켈레톤 UI 표시</text>
  <text x="170" y="148.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">2. Error (에러 발생)</text>
  <text x="170" y="166.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 데이터 로드 실패</text>
  <text x="170" y="184.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 에러 메시지 + 재시도 버튼</text>
  <text x="170" y="202.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">3. Empty (데이터 없음)</text>
  <text x="170" y="220.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 로드는 성공했지만 결과가 없음</text>
  <text x="170" y="239.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· &quot;결과 없음&quot; 메시지 + 안내</text>
  <text x="170" y="257.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">4. Data (데이터 표시)</text>
  <text x="170" y="275.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 정상적으로 데이터 표시</text>
</svg>