<svg xmlns="http://www.w3.org/2000/svg" width="600" height="568" viewBox="20 -20 500 473">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="500" height="473" rx="12" fill="#141414"/>
  <text x="80" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">Custom Hook 개념 지도</text>
  <text x="60" y="62.6" fill="#ef4444" font-family="Nunito, sans-serif" font-size="14" opacity="1">문제: 컴포넌트에 로직이 혼재</text>
  <rect x="50" y="75" width="240" height="75" rx="11.25" fill="#5c1a1a" stroke="#ef4444" stroke-width="1" opacity="1"/>
  <text x="60" y="92.6" fill="#ef4444" font-family="Nunito, sans-serif" font-size="14" opacity="1">UserProfile</text>
  <text x="65" y="110.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">· 패칭 로직 (State + Effect)</text>
  <text x="65" y="128.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">· 에러 처리 / UI 렌더링 (JSX)</text>
  <text x="185" y="162.8" fill="#22c55e" font-family="Nunito, sans-serif" font-size="12" opacity="1">추출</text>
  <text x="60" y="192.6" fill="#22c55e" font-family="Nunito, sans-serif" font-size="14" opacity="1">해결: 관심사 분리</text>
  <rect x="50" y="205" width="180" height="70" rx="10.5" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="60" y="222.6" fill="#22c55e" font-family="Nunito, sans-serif" font-size="14" opacity="1">useFetch()</text>
  <text x="65" y="240.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">· 패칭 State</text>
  <text x="65" y="258.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">· Effect + 에러 처리</text>
  <rect x="270" y="205" width="220" height="70" rx="10.5" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="280" y="222.6" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="14" opacity="1">UserProfile</text>
  <text x="285" y="240.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">· UI 렌더링만</text>
  <text x="285" y="258.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">· const {data} = useFetch(url)</text>
  <text x="55" y="301.7" fill="#06b6d4" font-family="Nunito, sans-serif" font-size="13" opacity="1">재사용:</text>
  <text x="55" y="320.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">ProductDetail, OrderList, CommentThread...</text>
  <text x="55" y="351.7" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13" opacity="1">합성 패턴:</text>
  <rect x="50" y="360" width="430" height="28" rx="4.2" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="55" y="375.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">useDebounce + useFetch → useSearch</text>
  <rect x="50" y="395" width="430" height="28" rx="4.2" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="55" y="410.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">useIntersectionObserver + usePaginatedFetch → useInfiniteScroll</text>
</svg>