<svg xmlns="http://www.w3.org/2000/svg" width="600" height="665" viewBox="-10 -15 556.5 617">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="556.5" height="617" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">isLoading vs isFetching — 미묘하지만 중요한 차이</text>
  <rect x="20" y="50" width="496.5" height="522" rx="74.475" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">isLoading: true</text>
  <text x="40" y="109.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 캐시에 데이터가 없을 때의 첫 로딩</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 스피너를 보여줘야 하는 시점</text>
  <text x="40" y="161.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 이전 데이터가 없으므로 표시할 것이 없다</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">isFetching: true</text>
  <text x="40" y="213.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 어떤 이유로든 네트워크 요청이 진행 중</text>
  <text x="40" y="239.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 캐시에 데이터가 있어도 백그라운드 리패칭 중이면 true</text>
  <text x="40" y="265.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· &quot;업데이트 중&quot; 인디케이터를 보여줄 수 있는 시점</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">조합:</text>
  <text x="40" y="317.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">isLoading=true,  isFetching=true  → 첫 로딩 중</text>
  <text x="40" y="343.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">isLoading=false, isFetching=true  → 캐시 있음 + 리패칭 중</text>
  <text x="40" y="369.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">isLoading=false, isFetching=false → 최신 데이터 표시 중</text>
  <text x="40" y="395.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">UI 전략:</text>
  <text x="40" y="421.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">isLoading → &lt;Spinner /&gt; (빈 화면 대신 로딩 표시)</text>
  <text x="40" y="447.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">!isLoading &amp;&amp; isFetching → 데이터 표시 + 작은 인디케이터</text>
  <text x="40" y="473.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">!isFetching → 데이터만 표시</text>
</svg>