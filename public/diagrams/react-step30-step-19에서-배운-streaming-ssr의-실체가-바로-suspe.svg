<svg xmlns="http://www.w3.org/2000/svg" width="630" height="717" viewBox="-10 -20 630 717">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="630" height="717" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Step 19에서 배운 Streaming SSR의 실체가 바로 Suspense이다</text>
  <rect x="20" y="45" width="570" height="622" rx="85.5" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Step 19에서 배운 Streaming SSR의 실체가 바로 Suspense이다</text>
  <text x="40" y="104.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">서버에서:</text>
  <text x="40" y="131.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. React가 컴포넌트 트리를 렌더링한다</text>
  <text x="40" y="161.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. &lt;Suspense&gt; 경계를 만나면:</text>
  <text x="40" y="189.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 자식이 suspend하면 → fallback의 HTML을 먼저 전송</text>
  <text x="40" y="215.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 자식이 완료되면 → 실제 HTML을 &quot;청크&quot;로 추가 전송</text>
  <text x="40" y="243.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. 각 Suspense 경계가 독립적으로 스트리밍된다</text>
  <text x="40" y="272.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">클라이언트에서:</text>
  <text x="40" y="299.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. fallback HTML이 먼저 표시된다 (스켈레톤)</text>
  <text x="40" y="329.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. 서버에서 청크가 도착하면 fallback을 실제 콘텐츠로 교체</text>
  <text x="40" y="359.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">6. 해당 영역만 Selective Hydration (Step 19)</text>
  <text x="40" y="388.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Suspense 경계 = Streaming의 청크 단위 = Hydration의 단위</text>
  <text x="40" y="414.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;A_Skeleton /&gt;}&gt;</text>
  <text x="40" y="440.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;ComponentA /&gt;                    ← 청크 1: A가 준비되면 전송</text>
  <text x="40" y="466.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="492.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;Suspense fallback={&lt;B_Skeleton /&gt;}&gt;</text>
  <text x="40" y="518.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;ComponentB /&gt;                    ← 청크 2: B가 준비되면 전송 (A와 독립)</text>
  <text x="40" y="544.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">&lt;/Suspense&gt;</text>
  <text x="40" y="569.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ A가 200ms, B가 500ms면</text>
  <text x="40" y="595.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ A의 HTML이 200ms에 도착, B의 스켈레톤이 계속 표시</text>
  <text x="40" y="621.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ B의 HTML이 500ms에 도착, 스켈레톤이 교체</text>
  <text x="40" y="647.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ &quot;점진적으로 채워지는&quot; 페이지 경험!</text>
</svg>