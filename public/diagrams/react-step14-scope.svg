<svg xmlns="http://www.w3.org/2000/svg" width="600" height="506" viewBox="20 -20 530 447">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="530" height="447" rx="12" fill="#141414"/>
  <text x="100" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Step 14 — 다루는 범위</text>
  <rect x="50" y="50" width="470" height="199" rx="29.849999999999998" fill="#1a4d2e" stroke="#22c55e" stroke-width="1" opacity="1"/>
  <text x="60" y="72.4" fill="#22c55e" font-family="Nunito, sans-serif" font-size="16" opacity="1">다루는 것</text>
  <text x="65" y="96.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· useMemo: 비용이 큰 계산 결과 캐싱</text>
  <text x="65" y="118.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· useCallback: 함수 참조 안정화</text>
  <text x="65" y="140.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· React.memo: Props 비교로 컴포넌트 재렌더링 건너뛰기</text>
  <text x="65" y="162.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· 세 도구의 관계와 결합 패턴</text>
  <text x="65" y="184.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· &quot;언제 쓰지 말아야 하는가&quot; — 과도한 최적화의 비용</text>
  <text x="65" y="206.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· React Profiler를 활용한 측정 기반 판단</text>
  <text x="65" y="228.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· React Compiler가 메모이제이션에 미치는 영향</text>
  <rect x="50" y="264" width="470" height="133" rx="19.95" fill="#5c1a1a" stroke="#ef4444" stroke-width="1" opacity="1"/>
  <text x="60" y="286.4" fill="#ef4444" font-family="Nunito, sans-serif" font-size="16" opacity="1">다루지 않는 것</text>
  <text x="65" y="310.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· 가상화(Virtualization) — windowing 기법</text>
  <text x="65" y="332.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· Web Worker 활용</text>
  <text x="65" y="354.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· 서버 사이드 최적화 (Step 19~21)</text>
  <text x="65" y="376.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">· 번들 최적화, Tree Shaking (Step 39)</text>
</svg>