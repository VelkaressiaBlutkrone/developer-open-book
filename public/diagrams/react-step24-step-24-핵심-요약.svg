<svg xmlns="http://www.w3.org/2000/svg" width="600" height="1155" viewBox="-10 -20 494 951">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="494" height="951" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Step 24 핵심 요약</text>
  <rect x="20" y="45" width="434" height="856" rx="65.1" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="15" opacity="1">Step 24 핵심 요약</text>
  <text x="40" y="105.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. 3계층 API 아키텍처 = 관심사 분리의 실천</text>
  <text x="40" y="133.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Layer 1 (HTTP): apiClient, 인터셉터, 에러 표준화</text>
  <text x="40" y="159.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Layer 2 (Service): 도메인별 API 함수, URL 캡슐화</text>
  <text x="40" y="185.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Layer 3 (Hook): TanStack Query 연동, 캐싱 전략</text>
  <text x="40" y="211.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Layer 4 (Component): UI만 담당, Hook의 반환값만 사용</text>
  <text x="40" y="239.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. 변경 영향을 최소화한다</text>
  <text x="40" y="267.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ URL 변경 → 서비스만 수정</text>
  <text x="40" y="293.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 인증 방식 변경 → HTTP만 수정</text>
  <text x="40" y="319.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 캐싱 전략 변경 → Hook만 수정</text>
  <text x="40" y="345.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ UI 변경 → 컴포넌트만 수정</text>
  <text x="40" y="373.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. 에러를 분류하여 각각 다르게 처리한다</text>
  <text x="40" y="401.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 네트워크: 재시도 + &quot;연결 확인&quot; 안내</text>
  <text x="40" y="427.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ HTTP 4xx: 상태 코드별 다른 대응</text>
  <text x="40" y="453.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 비즈니스: 서버 메시지를 사용자에게 표시</text>
  <text x="40" y="479.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 검증: 필드별 인라인 에러</text>
  <text x="40" y="505.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ ApiError 클래스로 표준화</text>
  <text x="40" y="533.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. 인증 토큰은 인터셉터로 자동 관리한다</text>
  <text x="40" y="561.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 요청 인터셉터: Authorization 헤더 자동 추가</text>
  <text x="40" y="587.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 응답 인터셉터: 401 → 토큰 갱신 → 원래 요청 재시도</text>
  <text x="40" y="613.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ Refresh Queue: 동시 401 시 갱신 1회만</text>
  <text x="40" y="641.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. QueryClient로 전역 에러 처리를 설정한다</text>
  <text x="40" y="669.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ retry: 4xx는 재시도 안 함, 5xx/네트워크만 재시도</text>
  <text x="40" y="695.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ mutations.onError: 전역 토스트 알림</text>
  <text x="40" y="721.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 에러 로깅/모니터링 연동</text>
  <text x="40" y="749.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">6. queryKey Factory로 캐시 키를 중앙 관리한다</text>
  <text x="40" y="777.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ userKeys.all, .list(filters), .detail(id)</text>
  <text x="40" y="803.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 계층적 invalidation으로 정확한 캐시 갱신</text>
  <text x="40" y="831.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">7. 로딩/에러 UI를 일관된 패턴으로 제공한다</text>
  <text x="40" y="859.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ QueryStateHandler 래퍼 또는 Error Boundary 통합</text>
  <text x="40" y="885.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">→ 스켈레톤, 에러 상태, 빈 상태의 재사용 가능 컴포넌트</text>
</svg>