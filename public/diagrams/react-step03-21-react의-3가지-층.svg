<svg xmlns="http://www.w3.org/2000/svg" width="600" height="736" viewBox="-10 -20 389 477">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="389" height="477" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">React의 3가지 층</text>
  <rect x="20" y="45" width="329" height="382" rx="49.35" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="184.5" y="103" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Layer 1: 컴포넌트 모델 (변하지 않는 핵심)</text>
  <text x="184.5" y="121.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 함수 컴포넌트</text>
  <text x="184.5" y="139.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Props와 State</text>
  <text x="184.5" y="157.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 선언적 UI</text>
  <text x="184.5" y="175.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 단방향 데이터 흐름</text>
  <text x="184.5" y="194" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Phase 1~2에서 학습</text>
  <text x="184.5" y="212.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Layer 2: 렌더링 엔진 (지속적으로 진화)</text>
  <text x="184.5" y="230.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Virtual DOM → Fiber Architecture</text>
  <text x="184.5" y="248.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 동기 렌더링 → Concurrent Rendering</text>
  <text x="184.5" y="266.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 클라이언트 전용 → Server Components</text>
  <text x="184.5" y="285" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Phase 1 Step 10, Phase 3에서 학습</text>
  <text x="184.5" y="303.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Layer 3: 생태계 도구 (빠르게 변화)</text>
  <text x="184.5" y="321.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 라우팅, 상태 관리, 스타일링 등</text>
  <text x="184.5" y="339.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 트렌드가 1~2년 주기로 변화</text>
  <text x="184.5" y="357.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 원리를 이해하면 도구 전환에 유연</text>
  <text x="184.5" y="376" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ Phase 3~7에서 학습</text>
</svg>