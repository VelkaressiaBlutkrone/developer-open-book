<svg xmlns="http://www.w3.org/2000/svg" width="600" height="672" viewBox="-10 -20 406 455">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="406" height="455" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Step 03 핵심 개념 관계도</text>
  <rect x="20" y="45" width="346" height="360" rx="51.9" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="193" y="101.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">웹 렌더링 방식</text>
  <text x="193" y="119.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">MPA → SPA(CSR) → SSR → SSG/ISR → RSC</text>
  <text x="193" y="137.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">React의 정체성</text>
  <text x="193" y="155.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">라이브러리 (UI만 담당) ←  IoC로 프레임워크와 구분</text>
  <text x="193" y="173.89999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">부족한 영역을 생태계가 보완</text>
  <text x="193" y="192.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">라우팅  React Router, TanStack Router</text>
  <text x="193" y="210.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">데이터  TanStack Query, SWR, Axios</text>
  <text x="193" y="228.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">상태  Zustand, Redux Toolkit, Jotai</text>
  <text x="193" y="246.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">폼  React Hook Form + Zod</text>
  <text x="193" y="264.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">스타일  Tailwind CSS, CSS Modules</text>
  <text x="193" y="283.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">타입  TypeScript</text>
  <text x="193" y="301.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">테스트  Vitest, RTL, Playwright</text>
  <text x="193" y="319.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">빌드/배포  Vite, Vercel, GitHub Actions</text>
  <text x="193" y="337.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">메타 프레임워크 = React + 생태계 통합 패키지</text>
  <text x="193" y="355.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Next.js, Remix, Gatsby</text>
</svg>