<svg xmlns="http://www.w3.org/2000/svg" width="600" height="590" viewBox="-10 -20 440 433">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="440" height="433" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Step 07 핵심 개념 관계도</text>
  <rect x="20" y="45" width="380" height="338" rx="50.699999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="210" y="99.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">렌더링 #N의 Element 트리  렌더링 #N+1의 Element 트리</text>
  <text x="210" y="117.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Reconciliation</text>
  <text x="210" y="135.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(Diff 알고리즘)</text>
  <text x="210" y="153.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">두 가지 휴리스틱:</text>
  <text x="210" y="172" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">1. 타입 다르면 → 전체 교체 (Unmount+Mount)</text>
  <text x="210" y="190.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">2. key로 자식 식별 → 이동/삽입/삭제 판단</text>
  <text x="210" y="208.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">같은 위치 + 같은 타입</text>
  <text x="210" y="226.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 컴포넌트 보존, Props만 갱신, State 유지</text>
  <text x="210" y="244.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">key 변경</text>
  <text x="210" y="263" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 강제 Unmount + 새로 Mount = State 리셋</text>
  <text x="210" y="281.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="210" y="299.40000000000003" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">변경 목록 (Changeset)</text>
  <text x="210" y="317.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Commit Phase</text>
  <text x="210" y="335.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ 실제 DOM에 최소 변경만 반영</text>
</svg>