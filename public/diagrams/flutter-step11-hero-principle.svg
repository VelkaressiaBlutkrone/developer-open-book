  <text x="340" y="186" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Hero가 오버레이 레이어로 올라옴</text>
  <defs><marker id="arrow-a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555555"/></marker></defs>
  <path d="M340,200 L340,220" fill="none" stroke="#555555" stroke-width="2" opacity="1" marker-end="url(#arrow-a3)"/>
  <rect x="100" y="220" width="480" height="35" rx="5.25" fill="#1a4d4d" stroke="#06b6d4" stroke-width="2" opacity="1"/>
  <text x="340" y="241" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">화면 A 위치·크기 → 화면 B 위치·크기 보간(interpolation)</text>
  <defs><marker id="arrow-a4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555555"/></marker></defs>
  <path d="M340,255 L340,275" fill="none" stroke="#555555" stroke-width="2" opacity="1" marker-end="url(#arrow-a4)"/>
  <rect x="180" y="275" width="320" height="35" rx="5.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="340" y="296" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">전환 완료: Hero가 화면 B에 안착</text>
