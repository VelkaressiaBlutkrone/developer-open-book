<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="70 -20 540 360">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="70" y="-20" width="540" height="360" rx="12" fill="#141414"/>
  <text x="130" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Hero 애니메이션 동작 원리</text>
  <rect x="180" y="55" width="320" height="35" rx="5.25" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="340" y="76" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Navigator.push() 호출</text>
  <defs><marker id="arrow-a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555555"/></marker></defs>
  <path d="M340,90 L340,110" fill="none" stroke="#555555" stroke-width="2" opacity="1" marker-end="url(#arrow-a1)"/>
  <rect x="130" y="110" width="420" height="35" rx="5.25" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="340" y="131" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">동일 tag의 Hero 위젯을 두 화면에서 탐색</text>
  <defs><marker id="arrow-a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555555"/></marker></defs>
  <path d="M340,145 L340,165" fill="none" stroke="#555555" stroke-width="2" opacity="1" marker-end="url(#arrow-a2)"/>
