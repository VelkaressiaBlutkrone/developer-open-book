<svg xmlns="http://www.w3.org/2000/svg" width="600" height="744" viewBox="-10 -15 539.5 669">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="539.5" height="669" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">❌ 계층 없이 각 컴포넌트에서 직접 API 호출</text>
  <rect x="20" y="50" width="479.5" height="574" rx="71.925" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">UserList.jsx:</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">fetch('https://api.example.com/users', {</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">headers: { 'Authorization': `Bearer ${token}` }</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">})</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">UserProfile.jsx:</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">fetch('https://api.example.com/users/42', {</text>
  <text x="40" y="239.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">headers: { 'Authorization': `Bearer ${token}` }</text>
  <text x="40" y="265.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">})</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">OrderList.jsx:</text>
  <text x="40" y="317.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">fetch('https://api.example.com/orders', {</text>
  <text x="40" y="343.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">headers: { 'Authorization': `Bearer ${token}` }</text>
  <text x="40" y="369.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">})</text>
  <text x="40" y="395.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">문제:</text>
  <text x="40" y="421.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· baseURL이 30개 파일에 하드코딩 → URL 변경 시 30곳 수정</text>
  <text x="40" y="447.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 인증 헤더가 30곳에서 반복 → 토큰 로직 변경 시 30곳 수정</text>
  <text x="40" y="473.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 에러 처리가 30곳에서 제각각 → 일관성 없는 UX</text>
  <text x="40" y="499.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· API 스펙 변경 시 영향 범위를 파악하기 어렵다</text>
  <text x="40" y="525.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 테스트 시 모든 컴포넌트에서 fetch를 모킹해야 한다</text>
</svg>