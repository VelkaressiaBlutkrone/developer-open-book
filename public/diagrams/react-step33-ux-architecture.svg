<svg xmlns="http://www.w3.org/2000/svg" width="680" height="402" viewBox="20 -10 680 402">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-10" width="680" height="402" rx="12" fill="#141414"/>
  <text x="210" y="39.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">폼 UX 아키텍처</text>
  <rect x="50" y="60" width="620" height="94" rx="14.1" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="360" y="111.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">검증 계층</text>
  <text x="70" y="112.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 클라이언트 검증 (Zod Schema) → 서버 검증 (API)</text>
  <text x="70" y="134.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 형식 검증, 필수값, 범위 → 중복 확인, 비즈니스 규칙</text>
  <rect x="50" y="164" width="620" height="94" rx="14.1" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="360" y="215.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">피드백 계층</text>
  <text x="70" y="216.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 시각적: 빨간 테두리, 에러 텍스트, 아이콘</text>
  <text x="70" y="238.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 프로그래밍적: aria-invalid, aria-describedby, role=&quot;alert&quot;</text>
  <rect x="50" y="268" width="620" height="94" rx="14.1" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="360" y="319.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">상태 관리 (RHF)</text>
  <text x="70" y="320.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· mode/reValidateMode → errors, isSubmitting, isValid</text>
  <text x="70" y="342.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· isDirty, dirtyFields → 에러 표시, 저장 표시, 진행률</text>
</svg>