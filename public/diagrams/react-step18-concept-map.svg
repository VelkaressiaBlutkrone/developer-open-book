  <text x="235" y="218.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">useParams()</text>
  <text x="235" y="235.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">useSearchParams()</text>
  <text x="235" y="252.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">useLocation()</text>
