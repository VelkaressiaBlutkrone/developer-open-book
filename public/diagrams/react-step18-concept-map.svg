  <rect x="180" y="300" width="250" height="30" rx="4.5" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="305" y="318.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">&lt;Outlet/&gt; ← 자식 Route 렌더링 위치</text>
