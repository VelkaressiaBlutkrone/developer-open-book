  <text x="65" y="218.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">&lt;Link&gt;</text>
  <text x="65" y="235.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="12" opacity="1">&lt;NavLink&gt;</text>
