  <text x="335" y="141.9" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="11" opacity="1">&lt;Route path=&quot;*&quot; /&gt;     ← 404</text>
  <rect x="50" y="180" width="150" height="100" rx="15" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="1"/>
