<svg xmlns="http://www.w3.org/2000/svg" width="675.5" height="461" viewBox="-10 -15 675.5 461">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="675.5" height="461" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">요구사항:</text>
  <rect x="20" y="50" width="615.5" height="366" rx="54.9" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· JSONPlaceholder API 사용 (https://jsonplaceholder.typicode.com)</text>
  <text x="40" y="109.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 게시글 CRUD:</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">- GET /posts → 게시글 목록 조회</text>
  <text x="40" y="161.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">- GET /posts/:id → 개별 게시글 조회</text>
  <text x="40" y="187.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">- POST /posts → 새 게시글 생성</text>
  <text x="40" y="213.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">- PATCH /posts/:id → 게시글 수정</text>
  <text x="40" y="239.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">- DELETE /posts/:id → 게시글 삭제</text>
  <text x="40" y="265.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 4가지 UI 상태 (idle, loading, error, success) 처리</text>
  <text x="40" y="291.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 에러 핸들링 (response.ok 체크, try/catch)</text>
  <text x="40" y="317.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· AbortController로 컴포넌트 언마운트 시 요청 취소</text>
</svg>