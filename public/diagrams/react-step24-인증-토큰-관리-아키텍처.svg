<svg xmlns="http://www.w3.org/2000/svg" width="600" height="781" viewBox="-10 -20 553.5 720.6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="553.5" height="720.6" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">인증 토큰 관리 아키텍처</text>
  <rect x="20" y="45" width="493.5" height="622" rx="74.02499999999999" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">인증 토큰 관리 아키텍처</text>
  <text x="40" y="104.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">로그인:</text>
  <text x="40" y="131.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. 사용자가 이메일/비밀번호 입력</text>
  <text x="40" y="161.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. POST /auth/login → { accessToken, refreshToken }</text>
  <text x="40" y="191.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. 토큰을 저장 (localStorage 또는 httpOnly Cookie)</text>
  <text x="40" y="221.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. 이후 모든 요청에 자동으로 Authorization 헤더 추가 (인터셉터)</text>
  <text x="40" y="250.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">토큰 갱신:</text>
  <text x="40" y="277.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. 요청 → 401 Unauthorized 응답</text>
  <text x="40" y="307.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. 인터셉터가 401 감지</text>
  <text x="40" y="337.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. POST /auth/refresh → { 새 accessToken }</text>
  <text x="40" y="367.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. 새 토큰 저장</text>
  <text x="40" y="397.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. 원래 요청을 새 토큰으로 재시도</text>
  <text x="40" y="427.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">6. 갱신 실패 → 로그아웃 + 로그인 페이지 이동</text>
  <text x="40" y="456.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">다중 요청 동시 401 처리:</text>
  <text x="40" y="481.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 요청 A, B, C가 동시에 401을 받을 때</text>
  <text x="40" y="507.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 토큰 갱신은 한 번만 실행</text>
  <text x="40" y="533.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 나머지 요청은 갱신 완료 후 재시도</text>
  <text x="40" y="560.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">⚠️ 보안 고려:</text>
  <text x="40" y="585.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· accessToken: 짧은 유효기간 (15분~1시간)</text>
  <text x="40" y="611.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· refreshToken: 긴 유효기간 (7일~30일)</text>
  <text x="40" y="637.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· httpOnly Cookie가 localStorage보다 안전 (XSS 방어)</text>
  <text x="40" y="663.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· CSRF 방어도 고려 필요</text>
</svg>