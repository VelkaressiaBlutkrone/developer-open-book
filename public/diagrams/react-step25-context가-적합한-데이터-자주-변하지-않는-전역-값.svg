<svg xmlns="http://www.w3.org/2000/svg" width="600" height="902" viewBox="-10 -15 514 773">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="514" height="773" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">✅ Context가 적합한 데이터 (자주 변하지 않는 전역 값)</text>
  <rect x="20" y="50" width="454" height="678" rx="68.1" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 테마 (light/dark) — 변경 빈도: 매우 낮음</text>
  <text x="40" y="109.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 인증 정보 (현재 사용자) — 변경 빈도: 로그인/로그아웃 시</text>
  <text x="40" y="135.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 로케일/언어 설정 — 변경 빈도: 거의 없음</text>
  <text x="40" y="161.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 기능 플래그 (feature flags) — 변경 빈도: 배포 시</text>
  <text x="40" y="187.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 라우터 정보 (React Router가 내부적으로 Context 사용)</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">공통점:</text>
  <text x="40" y="239.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 변경 빈도가 낮다</text>
  <text x="40" y="265.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 앱 전체에서 필요하다</text>
  <text x="40" y="291.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 변경 시 전체 리렌더링이 수용 가능하다</text>
  <text x="40" y="317.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">❌ Context가 부적합한 데이터 (자주 변하는 상태)</text>
  <text x="40" y="343.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 폼 입력값 — 키 입력마다 변경</text>
  <text x="40" y="369.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 마우스 위치 — 지속적으로 변경</text>
  <text x="40" y="395.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 애니메이션 값 — 프레임마다 변경</text>
  <text x="40" y="421.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 자주 업데이트되는 목록 데이터</text>
  <text x="40" y="447.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 여러 컴포넌트가 각각 다른 부분만 필요한 복잡한 상태</text>
  <text x="40" y="473.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">이유: Context value 변경 → 모든 소비자 리렌더링</text>
  <text x="40" y="499.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">자주 변하면 성능 문제 발생!</text>
  <text x="40" y="525.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">❌ Context가 부적합한 상황 (Server State)</text>
  <text x="40" y="551.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 서버 데이터 (API 응답) — TanStack Query (Step 23)</text>
  <text x="40" y="577.5" fill="#ef4444" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 캐싱, 리패칭, 에러 재시도가 필요한 데이터</text>
  <text x="40" y="603.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· &quot;Server State를 Context에 넣으려 하지 마라&quot;</text>
  <text x="40" y="629.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">→ TanStack Query가 자체적으로 전역 캐시를 관리한다</text>
</svg>