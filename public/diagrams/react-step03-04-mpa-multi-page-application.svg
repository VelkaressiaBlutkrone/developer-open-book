<svg xmlns="http://www.w3.org/2000/svg" width="600" height="886" viewBox="-10 -20 457 675">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="457" height="675" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">MPA (Multi Page Application)</text>
  <rect x="20" y="45" width="397" height="580" rx="59.55" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="218.5" y="120.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">사용자가 /about 클릭</text>
  <text x="218.5" y="138.29999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="218.5" y="156.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">브라우저 → 서버에 /about 요청</text>
  <text x="218.5" y="174.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="218.5" y="192.89999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">서버가 about.html 전체를 생성·응답</text>
  <text x="218.5" y="211.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="218.5" y="229.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">브라우저가 기존 페이지를 버리고 새 HTML을 처음부터 렌더링</text>
  <text x="218.5" y="247.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="218.5" y="265.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">화면 깜빡임 (White Flash) 발생</text>
  <text x="218.5" y="283.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">CSS, JS 다시 로드</text>
  <text x="218.5" y="302.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">이전 페이지의 상태(스크롤 위치, 입력값 등) 소실</text>
  <text x="218.5" y="320.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">SPA (Single Page Application)</text>
  <text x="218.5" y="338.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">최초 로드:</text>
  <text x="218.5" y="356.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">브라우저 → 서버에 index.html 요청</text>
  <text x="218.5" y="374.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">서버가 빈 HTML + JS 번들 응답</text>
  <text x="218.5" y="393.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">브라우저가 JS를 실행하여 화면 구성</text>
  <text x="218.5" y="411.29999999999995" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">이후 페이지 이동:</text>
  <text x="218.5" y="429.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">사용자가 /about 클릭</text>
  <text x="218.5" y="447.70000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="218.5" y="465.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">JavaScript가 URL을 /about으로 변경 (History API)</text>
  <text x="218.5" y="484.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">서버 요청 없이 클라이언트에서 화면 교체</text>
  <text x="218.5" y="502.29999999999995" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="218.5" y="520.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">필요한 데이터만 API로 요청 (JSON)</text>
  <text x="218.5" y="538.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">화면 깜빡임 없음</text>
  <text x="218.5" y="556.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">이전 상태 유지 가능</text>
</svg>