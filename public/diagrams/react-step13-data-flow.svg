<svg xmlns="http://www.w3.org/2000/svg" width="600" height="508" viewBox="20 -20 520 440">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="520" height="440" rx="12" fill="#141414"/>
  <text x="80" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">useReducer 데이터 흐름</text>
  <rect x="180" y="55" width="200" height="32" rx="4.8" fill="#5c3d1a" stroke="#f59e0b" stroke-width="1" opacity="1"/>
  <text x="280" y="74.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">사용자 액션 (클릭, 입력)</text>
  <rect x="150" y="110" width="260" height="45" rx="6.75" fill="#1e3a5f" stroke="#4a9eed" stroke-width="1" opacity="1"/>
  <text x="155" y="127.6" fill="#4a9eed" font-family="Nunito, sans-serif" font-size="14" opacity="1">이벤트 핸들러</text>
  <text x="155" y="145.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">dispatch({ type, payload })</text>
  <rect x="100" y="180" width="360" height="80" rx="12" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="110" y="199.4" fill="#22c55e" font-family="Nunito, sans-serif" font-size="16" opacity="1">Reducer 함수</text>
  <text x="110" y="221.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">(currentState, action) → newState</text>
  <text x="110" y="240.8" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="12" opacity="1">switch (action.type) { case ... }</text>
  <rect x="170" y="285" width="220" height="35" rx="5.25" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1" opacity="1"/>
  <text x="280" y="305.75" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13">재렌더링 → 새 State로 UI 갱신</text>
  <rect x="50" y="340" width="460" height="50" rx="7.5" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1" opacity="1"/>
  <text x="60" y="358.7" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="13" opacity="1">핵심: 컴포넌트는 &quot;무엇이 일어났는가&quot;만 dispatch</text>
  <text x="60" y="378.7" fill="#8b5cf6" font-family="Nunito, sans-serif" font-size="13" opacity="1">&quot;어떻게 State가 변하는가&quot;는 reducer가 결정 → 관심사 분리</text>
</svg>