<svg xmlns="http://www.w3.org/2000/svg" width="621.5" height="353" viewBox="-10 -20 621.5 353">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="621.5" height="353" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Step 22의 한계              TanStack Query의 해결</text>
  <rect x="20" y="45" width="561.5" height="258" rx="38.699999999999996" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Step 22의 한계              TanStack Query의 해결</text>
  <text x="40" y="105.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. Race Condition           → 자동 요청 취소 + 최신 응답만 반영</text>
  <text x="40" y="135.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. 캐싱 부재               → queryKey 기반 자동 캐싱 + 공유</text>
  <text x="40" y="165.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. Stale Data              → staleTime + 자동 백그라운드 리패칭</text>
  <text x="40" y="195.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. Waterfall               → Prefetching + Parallel Queries</text>
  <text x="40" y="225.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. 에러 재시도             → 자동 재시도 (exponential backoff)</text>
  <text x="40" y="255.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">6. 낙관적 업데이트         → onMutate + 롤백 내장</text>
  <text x="40" y="285.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">7. 보일러플레이트          → useQuery 한 줄로 대체</text>
</svg>