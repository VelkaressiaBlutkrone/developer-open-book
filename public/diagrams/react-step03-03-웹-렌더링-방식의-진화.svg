<svg xmlns="http://www.w3.org/2000/svg" width="600" height="756" viewBox="-10 -20 448.5 565">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="448.5" height="565" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">웹 렌더링 방식의 진화</text>
  <rect x="20" y="45" width="388.5" height="470" rx="58.275" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="214.25" y="110.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">MPA  전통적 서버 렌더링 (PHP, JSP, Django 템플릿)</text>
  <text x="214.25" y="128.79999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 매 페이지 이동 시 전체 HTML 새로 로드</text>
  <text x="214.25" y="147" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">JavaScript의 발전</text>
  <text x="214.25" y="165.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="214.25" y="183.39999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">SPA  클라이언트에서 페이지 전환 (React, Vue, Angular)</text>
  <text x="214.25" y="201.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(CSR)  · 첫 로드 시 빈 HTML + JS 번들 다운로드</text>
  <text x="214.25" y="219.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 이후 JS가 화면을 동적으로 구성</text>
  <text x="214.25" y="238" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">SEO, 초기 로딩 문제 대두</text>
  <text x="214.25" y="256.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="214.25" y="274.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">SSR  서버에서 HTML 생성 + 클라이언트에서 Hydration</text>
  <text x="214.25" y="292.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 빠른 첫 화면 + 상호작용 가능</text>
  <text x="214.25" y="310.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">정적 콘텐츠는 매번 렌더링할 필요 없음</text>
  <text x="214.25" y="329" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="214.25" y="347.2" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">SSG  빌드 시 HTML 미리 생성</text>
  <text x="214.25" y="365.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(ISR)  · 가장 빠른 응답 속도</text>
  <text x="214.25" y="383.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">서버/클라이언트 경계를 컴포넌트 단위로 관리</text>
  <text x="214.25" y="401.79999999999995" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">▼</text>
  <text x="214.25" y="420" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">RSC  React Server Components (최신)</text>
  <text x="214.25" y="438.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 컴포넌트별로 서버/클라이언트 실행 결정</text>
  <text x="214.25" y="456.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Streaming SSR과 결합</text>
</svg>