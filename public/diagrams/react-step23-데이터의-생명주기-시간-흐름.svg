<svg xmlns="http://www.w3.org/2000/svg" width="600" height="918" viewBox="-10 -15 522.5 799">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-15" width="522.5" height="799" rx="12" fill="#141414"/>
  <text x="30" y="34.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">데이터의 생명주기 (시간 흐름)</text>
  <rect x="20" y="50" width="462.5" height="704" rx="69.375" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="83.5" fill="#22c55e" font-family="Nunito, sans-serif" font-size="15" opacity="1">t=0     쿼리 성공 → 캐시에 저장 (status: fresh ★)</text>
  <text x="40" y="109.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">↓</text>
  <text x="40" y="135.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">t=staleTime  캐시가 &quot;stale&quot;(오래됨)로 전환</text>
  <text x="40" y="161.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">↓  이 시점부터 리패칭 트리거가 작동</text>
  <text x="40" y="187.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">↓  (윈도우 포커스, 컴포넌트 마운트 등)</text>
  <text x="40" y="213.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">↓</text>
  <text x="40" y="239.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">t=?     컴포넌트 언마운트 (이 queryKey를 사용하는 컴포넌트가 없음)</text>
  <text x="40" y="265.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">↓  캐시는 &quot;비활성(inactive)&quot;이지만 아직 존재</text>
  <text x="40" y="291.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">↓</text>
  <text x="40" y="317.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">t=?+gcTime  캐시 삭제 (가비지 컬렉션)</text>
  <text x="40" y="343.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">더 이상 캐시에 없음 → 다음 요청 시 처음부터 로딩</text>
  <text x="40" y="369.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">staleTime = 0 (기본값):</text>
  <text x="40" y="395.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 캐시 저장 즉시 stale 상태</text>
  <text x="40" y="421.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 컴포넌트 마운트할 때마다 백그라운드 리패칭</text>
  <text x="40" y="447.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 가장 최신 데이터를 보장하지만 요청이 많아짐</text>
  <text x="40" y="473.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">staleTime = 60000 (1분):</text>
  <text x="40" y="499.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 1분간은 캐시를 그대로 사용 (리패칭 안 함)</text>
  <text x="40" y="525.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 1분 후부터 리패칭 트리거에 반응</text>
  <text x="40" y="551.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· &quot;이 데이터는 1분간은 변하지 않을 것이다&quot;라는 선언</text>
  <text x="40" y="577.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">staleTime = Infinity:</text>
  <text x="40" y="603.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 캐시를 영원히 fresh로 유지 (자동 리패칭 없음)</text>
  <text x="40" y="629.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 수동으로 invalidateQueries해야만 갱신</text>
  <text x="40" y="655.5" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="15" opacity="1">· 거의 변하지 않는 데이터에 적합 (국가 코드 목록 등)</text>
</svg>