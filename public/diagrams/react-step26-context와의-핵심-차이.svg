<svg xmlns="http://www.w3.org/2000/svg" width="600" height="550" viewBox="-10 -20 475.40000000000003 436">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="475.40000000000003" height="436" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Context와의 핵심 차이</text>
  <rect x="20" y="50" width="280" height="336" rx="42" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.4"/>
  <text x="35" y="77.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">Context와의 핵심 차이</text>
  <text x="35" y="103.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">Context:</text>
  <text x="35" y="129.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">const { count, increment, reset } = useAppContext();</text>
  <text x="35" y="155.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">// count가 변하면 → 이 컴포넌트 리렌더링</text>
  <text x="35" y="181.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">// count만 사용해도, increment/reset을 가진 다른 컴포넌트도 리렌더링!</text>
  <text x="35" y="207.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">Zustand:</text>
  <text x="35" y="233.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">const count = useCounterStore(state =&gt; state.count);</text>
  <text x="35" y="259.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">// count가 변할 때만 이 컴포넌트 리렌더링 ★</text>
  <text x="35" y="285.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">// 다른 컴포넌트가 reset만 구독하면 count 변경에 무반응!</text>
  <text x="35" y="311.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">원리: Zustand는 각 컴포넌트가 &quot;구독한 부분&quot;만 추적하고</text>
  <text x="35" y="337.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14" opacity="1">그 부분이 변할 때만 해당 컴포넌트를 리렌더링한다</text>
</svg>