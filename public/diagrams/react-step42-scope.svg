  <text x="80" y="204.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· React 개발자 성장 로드맵</text>
  <text x="80" y="226.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 자가 수준 진단 체크리스트</text>
  <text x="80" y="248.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 사례 연구 (실전 프로젝트 통합 패턴)</text>
  <rect x="60" y="252" width="600" height="86" rx="12.9" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
