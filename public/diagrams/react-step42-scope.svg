  <rect x="20" y="-20" width="680" height="397.6" rx="12" fill="#141414"/>
  <rect x="50" y="10" width="620" height="336" rx="50.4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="360" y="183" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20">Step 42 — 종합 프로젝트 + 마무리</text>
  <rect x="60" y="50" width="600" height="196" rx="29.4" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="360" y="152" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="16">다루는 것</text>
  <text x="80" y="94.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 42단계 전체 통합 복습</text>
  <text x="80" y="116.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 기술 스택 최종 정리</text>
  <text x="80" y="138.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 핵심 원칙 10선</text>
  <text x="80" y="160.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 종합 프로젝트 아이디어와 체크리스트</text>
