<svg xmlns="http://www.w3.org/2000/svg" width="600" height="547" viewBox="-10 -20 533.5 486">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="533.5" height="486" rx="12" fill="#141414"/>
  <rect x="20" y="10" width="473.5" height="426" rx="63.9" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="256.75" y="71.80000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">상황: 프로젝트가 A 패키지만 설치했는데, A가 B를 의존한다</text>
  <text x="256.75" y="90.00000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">npm (평탄화)</text>
  <text x="256.75" y="108.20000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">node_modules/</text>
  <text x="256.75" y="126.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">A/</text>
  <text x="256.75" y="144.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">B/  ← A의 의존성이지만 평탄화로 최상위에 노출</text>
  <text x="256.75" y="162.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 코드에서 import B 가 동작함 (package.json에 B를 선언하지 않았는데!)</text>
  <text x="256.75" y="181" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· A가 업데이트되어 B를 더 이상 사용하지 않으면?</text>
  <text x="256.75" y="199.20000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">→ B가 사라져서 코드가 깨짐 (Phantom Dependency 버그)</text>
  <text x="256.75" y="217.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">pnpm</text>
  <text x="256.75" y="235.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">node_modules/</text>
  <text x="256.75" y="253.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">.pnpm/</text>
  <text x="256.75" y="272" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">A@1.0.0/</text>
  <text x="256.75" y="290.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">node_modules/B/  ← B는 A 내부에만 존재</text>
  <text x="256.75" y="308.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">B@2.0.0/</text>
  <text x="256.75" y="326.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">A → .pnpm/A@1.0.0/</text>
  <text x="256.75" y="344.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· import B → 실패! (최상위에 B가 없음)</text>
  <text x="256.75" y="363" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· package.json에 명시적으로 추가해야만 사용 가능</text>
  <text x="256.75" y="381.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 의존성 관계가 정직하게 유지됨</text>
</svg>