<svg xmlns="http://www.w3.org/2000/svg" width="600" height="672" viewBox="-10 -20 406 455">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="406" height="455" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">다루는 것</text>
  <rect x="20" y="45" width="346" height="360" rx="51.9" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="193" y="101.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· useState의 동작 원리</text>
  <text x="193" y="119.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· State는 스냅샷이다 (Snapshot 모델)</text>
  <text x="193" y="137.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Batching과 State 업데이트 큐</text>
  <text x="193" y="155.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Updater Function (함수형 업데이트)</text>
  <text x="193" y="173.89999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Stale Closure 문제와 해결</text>
  <text x="193" y="192.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· StrictMode의 이중 실행</text>
  <text x="193" y="210.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· State 초기화 전략 (Lazy Initialization)</text>
  <text x="193" y="228.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· State 설계 원칙과 안티 패턴</text>
  <text x="193" y="246.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 객체/배열 State의 Immutable 업데이트</text>
  <text x="193" y="264.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· bailout 최적화와 Object.is</text>
  <text x="193" y="283.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">다루지 않는 것</text>
  <text x="193" y="301.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· useReducer (Step 13)</text>
  <text x="193" y="319.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· useEffect (Step 11)</text>
  <text x="193" y="337.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· useMemo / useCallback (Step 14)</text>
  <text x="193" y="355.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Context에 의한 State 공유 (Step 25)</text>
</svg>