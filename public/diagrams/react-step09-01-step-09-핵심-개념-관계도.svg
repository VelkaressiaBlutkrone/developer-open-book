<svg xmlns="http://www.w3.org/2000/svg" width="600" height="668" viewBox="-10 -20 448.5 499">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="448.5" height="499" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Step 09 핵심 개념 관계도</text>
  <rect x="20" y="45" width="388.5" height="404" rx="58.275" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="214.25" y="104.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">조건부 렌더링 (6가지 패턴)</text>
  <text x="214.25" y="123.10000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">if/else 조기 반환 (Guard Clause)</text>
  <text x="214.25" y="141.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">삼항 연산자 (A ? B : C)</text>
  <text x="214.25" y="159.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">&amp;&amp; 연산자 (조건 &amp;&amp; 요소)</text>
  <text x="214.25" y="177.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">주의: 0, NaN은 화면에 표시됨!</text>
  <text x="214.25" y="195.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">|| 연산자 (폴백 값)</text>
  <text x="214.25" y="214.10000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">?? 연산자 (null/undefined만 체크)</text>
  <text x="214.25" y="232.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">변수/함수 추출</text>
  <text x="214.25" y="250.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">리스트 렌더링</text>
  <text x="214.25" y="268.70000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">array.map(item =&gt; &lt;Component key={id} /&gt;)</text>
  <text x="214.25" y="286.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">key: 고유 식별자 (Step 7 복습)</text>
  <text x="214.25" y="305.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">파생 리스트: filter → sort → map (원본 불변)</text>
  <text x="214.25" y="323.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">4가지 UI 상태</text>
  <text x="214.25" y="341.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">로딩 중 → 스피너/스켈레톤</text>
  <text x="214.25" y="359.70000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">에러 발생 → 에러 메시지 + 재시도</text>
  <text x="214.25" y="377.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">빈 상태 → Empty State + 행동 유도</text>
  <text x="214.25" y="396.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">데이터 표시 → 리스트/콘텐츠</text>
</svg>