<svg xmlns="http://www.w3.org/2000/svg" width="600" height="599" viewBox="-10 -20 562 561">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="562" height="561" rx="12" fill="#141414"/>
  <text x="30" y="29.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">수동 패칭의 한계           TanStack Query의 해결</text>
  <rect x="20" y="45" width="502" height="466" rx="69.89999999999999" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="0.3"/>
  <text x="40" y="78.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">수동 패칭의 한계           TanStack Query의 해결</text>
  <text x="40" y="105.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">1. Race Condition         queryKey 변경 시 이전 요청 자동</text>
  <text x="40" y="134.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">취소. 최신 queryKey의 응답만 반영</text>
  <text x="40" y="161.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">2. 캐싱 부재             queryKey 기반 자동 캐싱.</text>
  <text x="40" y="190.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">같은 key를 사용하는 컴포넌트는</text>
  <text x="40" y="216.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">요청 1번, 결과 공유</text>
  <text x="40" y="243.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">3. Stale Data             staleTime 후 자동 리패칭.</text>
  <text x="40" y="272.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">윈도우 포커스, 재연결 시 갱신</text>
  <text x="40" y="299.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">4. Waterfall              Parallel Queries 자동 병렬 실행.</text>
  <text x="40" y="328.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">Prefetching으로 사전 로드</text>
  <text x="40" y="355.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">5. 에러 재시도            retry 옵션으로 자동 재시도.</text>
  <text x="40" y="384.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">exponential backoff 내장</text>
  <text x="40" y="411.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">6. 낙관적 업데이트        onMutate → setQueryData →</text>
  <text x="40" y="440.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">onError rollback 패턴 내장</text>
  <text x="40" y="467.4" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="16" opacity="1">7. 보일러플레이트         useQuery 한 줄로 loading/error/</text>
  <text x="40" y="496.5" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15" opacity="1">data 자동 관리</text>
</svg>