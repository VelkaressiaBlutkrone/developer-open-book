<svg xmlns="http://www.w3.org/2000/svg" width="600" height="663" viewBox="-10 -20 372 411">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="372" height="411" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">다루는 것</text>
  <rect x="20" y="45" width="312" height="316" rx="46.8" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="176" y="97.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Props의 본질과 내부 전달 메커니즘</text>
  <text x="176" y="115.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Immutable 패턴의 이론적 근거</text>
  <text x="176" y="133.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 단방향 데이터 흐름의 설계 철학</text>
  <text x="176" y="151.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 콜백 Props 패턴 (자식 → 부모)</text>
  <text x="176" y="170.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Lifting State Up (상태 끌어올리기)</text>
  <text x="176" y="188.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· children prop과 합성(Composition)</text>
  <text x="176" y="206.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Props Drilling 문제와 해결 방향</text>
  <text x="176" y="224.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Props 변경과 재렌더링의 관계</text>
  <text x="176" y="242.89999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">다루지 않는 것</text>
  <text x="176" y="261.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· useState 상세 (Step 6)</text>
  <text x="176" y="279.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· React.memo 최적화 (Step 14)</text>
  <text x="176" y="297.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· Context API (Step 25)</text>
  <text x="176" y="315.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">· 전역 상태 관리 (Step 26)</text>
</svg>