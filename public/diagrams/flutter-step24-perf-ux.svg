<svg xmlns="http://www.w3.org/2000/svg" width="760" height="299" viewBox="20 -20 760 299">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-20" width="760" height="299" rx="12" fill="#141414"/>
  <text x="50" y="31.6" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="24" opacity="1">렌더링 성능과 사용자 경험</text>
  <rect x="50" y="60" width="700" height="55" rx="8.25" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="400" y="91.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">16ms 이내 프레임 렌더링  →  60fps 유지 → 매끄러운 스크롤</text>
  <rect x="50" y="127" width="700" height="55" rx="8.25" fill="#5c1a1a" stroke="#ef4444" stroke-width="2" opacity="1"/>
  <text x="400" y="158.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">프레임 드롭 발생  →  스크롤 끊김, 애니메이션 버벅임</text>
  <rect x="50" y="194" width="700" height="55" rx="8.25" fill="#5c3d1a" stroke="#f59e0b" stroke-width="2" opacity="1"/>
  <text x="400" y="225.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="15">장시간 빌드  →  앱 반응 지연 → 사용자 이탈</text>
</svg>