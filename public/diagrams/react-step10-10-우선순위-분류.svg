<svg xmlns="http://www.w3.org/2000/svg" width="618.5" height="653" viewBox="-10 -20 618.5 653">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="618.5" height="653" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">우선순위 분류</text>
  <rect x="20" y="45" width="558.5" height="558" rx="83.7" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="299.25" y="118.20000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">우선순위  트리거  특성</text>
  <text x="299.25" y="136.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Immediate  사용자 입력 (타이핑,  즉시 처리</text>
  <text x="299.25" y="154.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(긴급)  클릭, 키보드)  중단 불가</text>
  <text x="299.25" y="172.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Transition  useTransition으로  중단 가능</text>
  <text x="299.25" y="191" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(전환)  래핑된 업데이트  낮은 우선순위</text>
  <text x="299.25" y="209.20000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Default  일반 setState  보통 우선순위</text>
  <text x="299.25" y="227.40000000000003" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">(기본)</text>
  <text x="299.25" y="245.60000000000002" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">시나리오: 검색어 입력 + 검색 결과 렌더링</text>
  <text x="299.25" y="263.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// React 18 이전: 모든 업데이트가 같은 우선순위</text>
  <text x="299.25" y="282" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">const handleChange = (e) =&gt; {</text>
  <text x="299.25" y="300.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setQuery(e.target.value);  // 입력 필드 업데이트</text>
  <text x="299.25" y="318.40000000000003" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setFilteredResults(search(e.target.value));  // 대규모 리스트 필터링</text>
  <text x="299.25" y="336.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// 두 업데이트가 같은 렌더링에서 처리</text>
  <text x="299.25" y="354.8" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// 리스트 필터링이 오래 걸리면 입력 필드도 느려짐!</text>
  <text x="299.25" y="373" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">};</text>
  <text x="299.25" y="391.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// React 18: useTransition으로 우선순위 분리</text>
  <text x="299.25" y="409.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">const [isPending, startTransition] = useTransition();</text>
  <text x="299.25" y="427.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">const handleChange = (e) =&gt; {</text>
  <text x="299.25" y="445.80000000000007" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setQuery(e.target.value);  // 긴급: 입력 필드 즉시 반영</text>
  <text x="299.25" y="464" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">startTransition(() =&gt; {</text>
  <text x="299.25" y="482.20000000000005" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">setFilteredResults(search(e.target.value));  // 전환: 나중에 처리 OK</text>
  <text x="299.25" y="500.4" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">});</text>
  <text x="299.25" y="518.6" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">// 입력 필드는 즉시 반영, 리스트는 여유 있을 때 업데이트</text>
  <text x="299.25" y="536.8000000000001" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">};</text>
</svg>