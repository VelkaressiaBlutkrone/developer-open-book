<svg xmlns="http://www.w3.org/2000/svg" width="600" height="560" viewBox="-10 -20 440 411">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="-10" y="-20" width="440" height="411" rx="12" fill="#141414"/>
  <text x="20" y="28" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="20" opacity="1">Webpack (기존 방식)</text>
  <rect x="20" y="45" width="380" height="316" rx="47.4" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="210" y="97.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">개발 서버 시작 시:</text>
  <text x="210" y="115.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">모든 파일 스캔 → 의존성 그래프 구축 → 전체 번들 생성 → 서버 시작</text>
  <text x="210" y="133.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">시간: 수 초 ~ 수십 초 (프로젝트 규모에 비례)</text>
  <text x="210" y="151.9" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">파일 변경 시:</text>
  <text x="210" y="170.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">변경 감지 → 관련 모듈 재번들 → HMR 전송</text>
  <text x="210" y="188.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">시간: 수백 ms ~ 수 초</text>
  <text x="210" y="206.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">Vite (ESModule 기반)</text>
  <text x="210" y="224.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">개발 서버 시작 시:</text>
  <text x="210" y="242.89999999999998" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">서버 즉시 시작 → 브라우저가 요청한 파일만 변환하여 제공</text>
  <text x="210" y="261.1" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">시간: 수백 ms (프로젝트 규모와 거의 무관)</text>
  <text x="210" y="279.3" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">파일 변경 시:</text>
  <text x="210" y="297.5" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">변경 감지 → 해당 모듈 1개만 변환 → HMR 전송</text>
  <text x="210" y="315.7" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="14">시간: 수십 ms (거의 즉시)</text>
</svg>