<svg xmlns="http://www.w3.org/2000/svg" width="680" height="512" viewBox="20 -10 680 512">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  </style>
  <rect x="20" y="-10" width="680" height="512" rx="12" fill="#141414"/>
  <text x="210" y="39.8" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="22" opacity="1">Vite의 두 가지 모드</text>
  <rect x="50" y="60" width="620" height="138" rx="20.7" fill="#1e3a5f" stroke="#4a9eed" stroke-width="2" opacity="1"/>
  <text x="360" y="133.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">개발 모드 (npm run dev)</text>
  <text x="70" y="112.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 번들링 없이 Native ESM으로 브라우저에 직접 제공</text>
  <text x="70" y="134.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· ESBuild로 TypeScript/JSX를 즉시 변환 (Go 기반)</text>
  <text x="70" y="156.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 의존성은 Pre-bundling (node_modules → ESM 변환)</text>
  <text x="70" y="178.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· HMR: 변경된 모듈만 교체 → 즉각 반영</text>
  <rect x="50" y="208" width="620" height="138" rx="20.7" fill="#1a4d2e" stroke="#22c55e" stroke-width="2" opacity="1"/>
  <text x="360" y="281.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">프로덕션 빌드 (npm run build)</text>
  <text x="70" y="260.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Rollup으로 번들링 (Tree Shaking, 코드 분할, 최적화)</text>
  <text x="70" y="282.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 최적화된 청크 파일 생성</text>
  <text x="70" y="304.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· CSS 추출, 에셋 해싱, 압축</text>
  <text x="70" y="326.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· dist/ 폴더에 정적 파일 출력</text>
  <rect x="50" y="356" width="620" height="116" rx="17.4" fill="#2d1b69" stroke="#8b5cf6" stroke-width="2" opacity="1"/>
  <text x="360" y="418.25" text-anchor="middle" fill="#e5e5e5" font-family="Nunito, sans-serif" font-size="17">왜 두 도구를 사용하는가?</text>
  <text x="70" y="408.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· ESBuild: 변환 빠름, 코드 분할/Tree Shaking 미성숙</text>
  <text x="70" y="430.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· Rollup: 프로덕션 최적화에 가장 성숙</text>
  <text x="70" y="452.6" fill="#a0a0a0" font-family="Nunito, sans-serif" font-size="14" opacity="1">· 개발은 속도, 프로덕션은 최적화에 최적의 도구</text>
</svg>